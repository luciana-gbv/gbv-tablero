<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBV · Tablero de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#F5F3EE;--surface:#FFFFFF;--border:#E2DDD6;--text:#1A1916;--muted:#7A7570;--accent:#2D5A3D;--danger:#C0392B;--warning:#D4890A;--success:#2D5A3D;--info:#1A4A6B;--font-disp:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{font-family:var(--font-disp);font-size:2rem;color:var(--accent);margin-bottom:.25rem}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:2rem;letter-spacing:.08em;text-transform:uppercase}
.login-card label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem}
.login-card input{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;background:var(--bg);color:var(--text);outline:none;margin-bottom:1rem;transition:border-color .15s}
.login-card input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.login-error{font-size:.8rem;color:var(--danger);margin-top:.75rem;text-align:center}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--font-disp);font-size:1.25rem;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-user{font-size:.8rem;color:var(--muted)}
.badge-role{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;background:#E8F0EB;color:var(--accent)}
.btn-logout{font-size:.8rem;padding:4px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body)}
.btn-logout:hover{background:var(--bg);color:var(--text)}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto}
.nav-tab{padding:.85rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);transition:all .15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:1.5rem;max-width:1100px;margin:0 auto;width:100%}
.section-heading{font-family:var(--font-disp);font-size:1.5rem;color:var(--text);margin-bottom:.25rem}
.section-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.metric-label{font-size:.75rem;color:var(--muted);margin-bottom:.4rem}
.metric-value{font-family:var(--font-disp);font-size:1.8rem;color:var(--text);line-height:1}
.metric-sub{font-size:.75rem;margin-top:.3rem}
.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--muted)}
.alert{padding:.75rem 1rem;border-radius:var(--radius);font-size:.85rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.6rem}
.alert-warning{background:#FEF3CD;color:#7A5A00;border:1px solid #F5D97E}
.alert-danger{background:#FDECEA;color:#8B1C1C;border:1px solid #F5B7B1}
.alert-success{background:#E8F5EC;color:#1A4A2A;border:1px solid #A8D5B5}
.alert-info{background:#E8F0F8;color:#1A3A5C;border:1px solid #A8C4DE}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.6rem .9rem;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:.75rem .9rem;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-ok{background:#E8F5EC;color:#1A4A2A}
.badge-pend{background:#FEF3CD;color:#7A5A00}
.badge-late{background:#FDECEA;color:#8B1C1C}
.badge-na{background:var(--bg);color:var(--muted)}
.badge-info{background:#E8F0F8;color:#1A3A5C}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:.35rem}
.form-input,.form-select,.form-textarea{width:100%;padding:.6rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.88rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.auto-result{font-size:.85rem;font-weight:500;color:var(--accent);background:#E8F0EB;padding:.4rem .75rem;border-radius:var(--radius);display:inline-block;margin-top:.4rem}
.btn{padding:.6rem 1.1rem;border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{opacity:.88;background:var(--accent)}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.two-col{display:grid;grid-template-columns:210px 1fr;gap:1.5rem}
.sidebar-nav{display:flex;flex-direction:column;gap:2px}
.sidebar-item{padding:.6rem .85rem;border-radius:var(--radius);font-size:.84rem;color:var(--muted);cursor:pointer;border:none;background:transparent;text-align:left;font-family:var(--font-body);transition:all .12s}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{background:#E8F0EB;color:var(--accent);font-weight:500}
.sidebar-section{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:.75rem .85rem .3rem}
.ind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.75rem}
.ind-card.done{border-color:#A8D5B5;background:#F4FAF6}
.ind-name{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.25rem}
.ind-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
.pill-alert{background:#FDECEA;color:#8B1C1C}
.ind-formula{font-size:.78rem;color:var(--muted);margin-bottom:.75rem;font-style:italic;line-height:1.5}
.upload-zone{border:1px dashed var(--border);border-radius:var(--radius);padding:.75rem 1rem;text-align:center;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);background:#F4FAF6}
.sub-entry-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.5rem}
.sub-entry-title{font-size:.82rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.sub-entry-meta{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.inline-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.puesto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.65rem}
.puesto-nombre{font-size:.88rem;font-weight:500;color:var(--text)}
.puesto-hab{font-size:.78rem;color:var(--muted);margin:.2rem 0}
.puesto-estado{font-size:.78rem;color:var(--text);margin-top:.4rem;line-height:1.5;padding:.5rem .75rem;background:var(--bg);border-radius:var(--radius)}
.tab-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{font-size:.82rem;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body);transition:all .12s}
.tab-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.bar-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;font-size:.83rem}
.bar-label{min-width:140px;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--success)}
.msg-ok{font-size:.78rem;color:var(--success);margin-top:.4rem}
.msg-err{font-size:.78rem;color:var(--danger);margin-top:.4rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.locked{text-align:center;padding:3rem 1rem;color:var(--muted)}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.metrics-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GBV</div>
    <div class="login-sub">Tablero de Comando</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">GBV</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-name"></span>
      <span class="badge-role" id="topbar-role"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div id="alerta-banner"></div>
  <div class="main" id="main-content"><div class="loading">Cargando...</div></div>
</div>

<script>
const SUPA_URL='https://qwnlwpvpmlthshtofkzr.supabase.co';
const SUPA_KEY='sb_publishable_Wcf8KQPElBsMKmRF3kaD8Q_o7k5dXGT';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentUser=null,currentProfile=null,currentTab='resumen';
let allCampos=[],allUnidades=[],allIndicadores=[],misCampos=[];
let selectedCampo=null,selectedCat=null;
const ROL_LABELS={programador:'Programador',directorio:'Directorio',coo:'COO',operativo:'Operativo',encargado_campo:'Encargado de campo'};
const CAT_LABELS={gestion:'Gestión',financiero:'Financiero',comercial:'Comercial',productivo_global:'Productivo · Global',productivo_cria:'Productivo · Cría',productivo_recria:'Productivo · Recría',productivo_feedlot:'Productivo · Feedlot',alimenticio:'Alimenticio',sanitario:'Sanitario',mejoramiento_genetico:'Mejoramiento genético',ecologia:'Ecología',rrhh:'RRHH',inmuebles_urbanos:'Inmuebles Urbanos'};
const CAT_ICONS={gestion:'📋',financiero:'📊',comercial:'📈',productivo_global:'🐄',productivo_cria:'🐮',productivo_recria:'🐂',productivo_feedlot:'🌽',alimenticio:'🌾',sanitario:'💉',mejoramiento_genetico:'🧬',ecologia:'🌿',rrhh:'👥',inmuebles_urbanos:'🏢'};

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Completá email y contraseña.';return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent='Email o contraseña incorrectos.';return;}
  await initApp(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  currentUser=null;currentProfile=null;
}

async function initApp(user){
  currentUser=user;
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=profile;
  if(!currentProfile){document.getElementById('login-error').textContent='No se encontró tu perfil.';return;}
  const[{data:campos},{data:unidades},{data:indicadores}]=await Promise.all([
    sb.from('campos').select('*,unidades_negocio(nombre)'),
    sb.from('unidades_negocio').select('*').order('orden'),
    sb.from('indicadores').select('*').eq('activo',true).order('orden')
  ]);
  allCampos=campos||[];allUnidades=unidades||[];allIndicadores=indicadores||[];
  if(currentProfile.rol==='encargado_campo'){
    const{data:asignados}=await sb.from('encargados_campo').select('campo_id').eq('user_id',user.id).eq('activo',true);
    const ids=(asignados||[]).map(a=>a.campo_id);
    misCampos=allCampos.filter(c=>ids.includes(c.id));
  }else{misCampos=allCampos;}
  if(misCampos.length>0)selectedCampo=misCampos[0].id;
  const cats=[...new Set(allIndicadores.map(i=>i.categoria))];
  if(cats.length>0)selectedCat=cats[0];
  document.getElementById('login-screen').style.display='none';
  const appEl=document.getElementById('app');
  appEl.style.display='flex';appEl.style.flexDirection='column';
  document.getElementById('topbar-name').textContent=(currentProfile.nombre||'')+' '+(currentProfile.apellido||'');
  document.getElementById('topbar-role').textContent=ROL_LABELS[currentProfile.rol]||currentProfile.rol;
  buildNav();
  await mostrarAlertas();
  renderTab('resumen');
}

async function mostrarAlertas(){
  const hoy=new Date();
  const maniana=new Date(hoy); maniana.setDate(maniana.getDate()+1);
  const anio=hoy.getFullYear();

  // Cargar entries del año
  const{data:entries}=await sb.from('entries')
    .select('indicador_id,periodo_fecha')
    .gte('periodo_fecha',`${anio}-01-01`)
    .lte('periodo_fecha',`${anio}-12-31`);
  const cargados=new Set((entries||[]).map(e=>e.indicador_id+'_'+e.periodo_fecha));

  // Calcular vencimientos
  const vencidos=[], manana=[], enSemana=[];
  allIndicadores.forEach(ind=>{
    const fechas=getVencimientosAnio(ind,anio);
    fechas.forEach(f=>{
      const key=ind.id+'_'+f.toISOString().split('T')[0];
      if(cargados.has(key)) return;
      const diff=Math.ceil((f-hoy)/(1000*60*60*24));
      if(diff<0) vencidos.push({...ind,fecha_venc:f,diff});
      else if(diff===0||diff===1) manana.push({...ind,fecha_venc:f,diff});
      else if(diff<=7) enSemana.push({...ind,fecha_venc:f,diff});
    });
  });

  // Para directorio/COO: ver también quién no cumplió
  let incumplidoresHtml='';
  if(['programador','directorio','coo'].includes(currentProfile.rol)&&vencidos.length>0){
    incumplidoresHtml=`<button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #8B1C1C;background:transparent;color:#8B1C1C;cursor:pointer;margin-left:.5rem">Ver en calendario →</button>`;
  }

  // Construir banner
  const alertaDiv=document.getElementById('alerta-banner');
  if(!alertaDiv) return;

  let html='';
  if(vencidos.length>0){
    html+=`<div class="alert alert-danger" style="margin:0 1.5rem;margin-top:.75rem">
      ⚠ <strong>${vencidos.length} indicador${vencidos.length>1?'es':''} vencido${vencidos.length>1?'s':''} sin cargar</strong>
      — ${vencidos.slice(0,3).map(v=>v.nombre).join(', ')}${vencidos.length>3?` y ${vencidos.length-3} más`:''}
      ${incumplidoresHtml}
    </div>`;
  }
  if(manana.length>0){
    html+=`<div class="alert alert-warning" style="margin:0 1.5rem;margin-top:.5rem">
      ⏰ <strong>${manana.length} indicador${manana.length>1?'es':''}</strong> vence${manana.length>1?'n':''} hoy o mañana
      — ${manana.slice(0,3).map(v=>v.nombre).join(', ')}${manana.length>3?` y ${manana.length-3} más`:''}
      <button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #7A5A00;background:transparent;color:#7A5A00;cursor:pointer;margin-left:.5rem">Ver →</button>
    </div>`;
  }
  if(enSemana.length>0&&vencidos.length===0&&manana.length===0){
    html+=`<div class="alert alert-info" style="margin:0 1.5rem;margin-top:.75rem">
      📅 <strong>${enSemana.length} indicador${enSemana.length>1?'es':''}</strong> vence${enSemana.length>1?'n':''} esta semana
      <button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #1A3A5C;background:transparent;color:#1A3A5C;cursor:pointer;margin-left:.5rem">Ver →</button>
    </div>`;
  }
  alertaDiv.innerHTML=html;
}

const TAB_DEFS=[
  {id:'resumen',label:'Resumen',roles:['programador','directorio','coo','operativo','encargado_campo']},
  {id:'carga',label:'Carga de datos',roles:['programador','coo','operativo','encargado_campo']},
  {id:'calendario',label:'Calendario',roles:['programador','directorio','coo','operativo','encargado_campo']},
  {id:'bandeja',label:'Bandeja de entrada',roles:['programador','directorio','coo']},
  {id:'puestos',label:'Puestos',roles:['programador','directorio','coo']},
  {id:'historico',label:'Históricos',roles:['programador','directorio','coo','operativo']},
  {id:'admin',label:'Administración',roles:['programador','coo']},
];

function buildNav(){
  const nav=document.getElementById('nav-tabs');nav.innerHTML='';
  TAB_DEFS.filter(t=>t.roles.includes(currentProfile.rol)).forEach(t=>{
    const btn=document.createElement('button');
    btn.className='nav-tab'+(t.id===currentTab?' active':'');
    btn.textContent=t.label;btn.dataset.tab=t.id;
    btn.onclick=()=>renderTab(t.id);nav.appendChild(btn);
  });
}

function setActiveTab(id){
  currentTab=id;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
}

function renderTab(tab){
  setActiveTab(tab);
  document.getElementById('main-content').innerHTML='<div class="loading">Cargando...</div>';
  if(tab==='resumen')renderResumen();
  if(tab==='carga')renderCarga();
  if(tab==='calendario')renderCalendario();
  if(tab==='bandeja')renderBandeja();
  if(tab==='puestos')renderPuestos();
  if(tab==='historico')renderHistorico();
  if(tab==='admin')renderAdmin();
}

// ── RESUMEN ──
async function renderResumen(){
  const{data:entries}=await sb.from('entries')
    .select('*,indicadores(nombre,categoria),profiles(nombre,apellido),campos(nombre)')
    .order('created_at',{ascending:false}).limit(20);
  const thisMonth=entries?entries.filter(e=>new Date(e.created_at)>new Date(new Date().setDate(1))).length:0;
  const main=document.getElementById('main-content');
  main.innerHTML=`
    <div class="section-heading">Resumen</div>
    <div class="section-sub">Vista general · ${new Date().toLocaleDateString('es-AR',{month:'long',year:'numeric'})}</div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Unidades de negocio</div><div class="metric-value">${allUnidades.length}</div></div>
      <div class="metric-card"><div class="metric-label">Campos</div><div class="metric-value">${allCampos.length}</div></div>
      <div class="metric-card"><div class="metric-label">Indicadores</div><div class="metric-value">${allIndicadores.length}</div></div>
      <div class="metric-card"><div class="metric-label">Cargas este mes</div><div class="metric-value">${thisMonth}</div><div class="metric-sub up">registros</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Últimas cargas</div>
      ${entries&&entries.length>0?`<div class="table-wrap"><table>
        <thead><tr><th>Indicador</th><th>Categoría</th><th>Valor</th><th>Campo</th><th>Cargado por</th><th>Período</th></tr></thead>
        <tbody>${entries.map(e=>`<tr>
          <td>${e.indicadores?.nombre||'—'}</td>

async function loadIndicatorsPanel(){
  const panel=document.getElementById('indicators-panel');
  if(!panel)return;
  panel.innerHTML='<div class="loading">Cargando...</div>';
  const filtered=allIndicadores.filter(i=>i.categoria===selectedCat);

  // Filtrar unidades permitidas para esta categoría
  const{data:catUnidades}=await sb.from('categoria_unidades')
    .select('unidad_negocio_id')
    .eq('categoria',selectedCat);
  const unidadesPermitidas=(catUnidades||[]).map(cu=>cu.unidad_negocio_id);

  // Si la unidad seleccionada no está permitida, cambiar a la primera permitida
  if(unidadesPermitidas.length>0&&!unidadesPermitidas.includes(selectedUnidad)){
    selectedUnidad=unidadesPermitidas[0];
  }

  // Actualizar sidebar para mostrar solo unidades permitidas
  const navEl=document.getElementById('unidad-nav');
  if(navEl){
    const unidadesFiltradas=allUnidades.filter(u=>unidadesPermitidas.includes(u.id));
    navEl.innerHTML=unidadesFiltradas.map(u=>{
      const campitos=allCampos.filter(c=>c.unidad_negocio_id===u.id);
      const has=campitos.reduce((a,c)=>a+(c.hectareas||0),0);
      return`<button class="sidebar-item ${u.id===selectedUnidad?'active':''}" onclick="selectUnidadNav('${u.id}',this)">
        <span>${u.nombre}</span>
        ${has>0?`<span style="font-size:.7rem;color:var(--muted)">${has.toLocaleString('es-AR')} ha</span>`:''}
      </button>`;
    }).join('');
  }

  // Unidad seleccionada y sus campos
  const unidad=allUnidades.find(u=>u.id===selectedUnidad);
  const camposUnidad=allCampos.filter(c=>c.unidad_negocio_id===selectedUnidad);
  const hasTotal=camposUnidad.reduce((a,c)=>a+(c.hectareas||0),0);

  // Medidores y rodados de todos los campos de la unidad
  let medidores=[],rodados=[],rodadosBsAs=[];
  if(camposUnidad.length>0){
    const campoIds=camposUnidad.map(c=>c.id);
    const{data:m}=await sb.from('medidores_luz').select('*').in('campo_id',campoIds).eq('activo',true);
    medidores=m||[];
  }
  // Rodados filtrados por unidad de negocio
  const{data:r}=await sb.from('rodados').select('*,campos(nombre)').eq('unidad_negocio_id',selectedUnidad).eq('activo',true);
  rodados=r||[];
  // Rodados de Administración BA para operativos
  if(['operativo','programador'].includes(currentProfile.rol)){
    const{data:rb}=await sb.from('rodados').select('*').is('campo_id',null).eq('activo',true);
    rodadosBsAs=rb||[];
  }

  if(filtered.length===0){panel.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No hay indicadores en esta categoría.</div></div>';return;}
  if(selectedCat==='rrhh'&&!['programador','directorio','coo'].includes(currentProfile.rol)){
    panel.innerHTML='<div class="card"><div class="locked"><div style="font-size:2rem;margin-bottom:.75rem">🔒</div><div style="font-size:.85rem">Esta sección es solo para el Directorio.</div></div></div>';return;
  }
  // Limpiar cache de variables al cambiar categoría
  _varCache={};
  const cards=await Promise.all(filtered.map(ind=>renderIndCardAsync(ind,unidad,hasTotal,medidores,rodados,rodadosBsAs)));
  panel.innerHTML=cards.join('');
}

// Cache de variables por indicador y valores pre-cargados por período
let _varCache={};
let _valCache={};  // { clave_periodo: valor }

async function getVariables(indId){
  if(_varCache[indId]) return _varCache[indId];
  const{data}=await sb.from('indicador_variables').select('*').eq('indicador_id',indId).order('orden');
  _varCache[indId]=data||[];
  return _varCache[indId];
}

// Buscar valores ya cargados para el mismo período y clave compartida
async function getValoresPeriodo(claves, periodo, unidadId){
  if(!claves.length||!periodo) return {};
  // Buscar en entry_variables entries del mismo período y unidad
  const{data}=await sb.from('entry_variables')
    .select('clave,valor,entries!inner(periodo_fecha,unidad_negocio_id)')
    .eq('entries.periodo_fecha', periodo)
    .eq('entries.unidad_negocio_id', unidadId)
    .in('clave', claves);
  const result={};
  (data||[]).forEach(ev=>{ if(!(ev.clave in result)) result[ev.clave]=ev.valor; });
  return result;
}

async function renderIndCardAsync(ind,unidad,hasTotal,medidores,rodados,rodadosBsAs){
  const id=ind.id;
  const alertText=ind.alerta_min!==null?`Alerta si < ${ind.alerta_min}`:ind.alerta_max!==null?`Alerta si > ${ind.alerta_max}`:'';
  const isMulti=['Consumos de luz por medidor','Kilometraje por camioneta'].includes(ind.nombre);
  const unidadId=unidad?.id||'';
  const unidadNombre=unidad?.nombre||'';
  const hoy=new Date().toISOString().split('T')[0];
  let inputHtml='';

  // INDICADORES POR CAMPO
  if(ind.por_campo){
    const camposUnidad=allCampos.filter(c=>c.unidad_negocio_id===unidadId);
    return`<div class="ind-card" id="ind-card-${id}">
      <div class="ind-name">${ind.nombre}</div>
      <div class="ind-meta">
        <span class="pill">${ind.periodicidad}</span>
        <span class="pill">${ind.unidad_medida}</span>
        ${alertText?`<span class="pill pill-alert">${alertText}</span>`:''}

      </div>
      ${ind.formula?`<div class="ind-formula">${ind.formula}</div>`:''}
      ${camposUnidad.length===0?`<div class="alert alert-info">No hay campos cargados para esta unidad.</div>`:
        camposUnidad.map(campo=>`
        <div class="sub-entry-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
            <div class="sub-entry-title">📍 ${campo.nombre}</div>
            ${campo.hectareas?`<span style="font-size:.75rem;color:var(--muted)">${campo.hectareas.toLocaleString('es-AR')} ha totales</span>`:''}
          </div>
          <div class="inline-row">
            <input type="number" class="form-input" id="val-campo-${id}-${campo.id}" placeholder="${ind.unidad_medida==='hectareas'?'Hectáreas':'Valor'}" step="any" style="flex:1"/>
            <input type="date" class="form-input" id="fecha-campo-${id}-${campo.id}" value="${hoy}" style="width:auto"/>
            <button class="btn btn-accent btn-sm" onclick="guardarEntryCampo('${id}','${campo.id}','${unidadId}')">Guardar</button>
          </div>
          <div id="msg-campo-${id}-${campo.id}"></div>
        </div>`).join('')}
    </div>`;
  }

  // ADJUNTOS
  if(ind.nombre==='Planilla de hacienda'||ind.nombre==='Inventario stocks'||(ind.requiere_adjunto&&!isMulti)){
    inputHtml=`<div class="upload-zone" onclick="document.getElementById('file-${id}').click()">↑ Adjuntar archivo (PDF, Excel, imagen)<input type="file" id="file-${id}" style="display:none" onchange="handleFile('${id}',this)"/></div><div id="file-name-${id}" class="form-hint"></div>`;

  // MEDIDORES
  }else if(ind.nombre==='Consumos de luz por medidor'){
    if(medidores.length===0){inputHtml=`<div class="alert alert-info">No hay medidores cargados para esta unidad.</div>`;}
    else{inputHtml=medidores.map(m=>`<div class="sub-entry-card">
      <div class="sub-entry-title">Medidor ${m.numero_medidor}</div>
      <div class="sub-entry-meta">${m.empresa||''}</div>
      <div class="inline-row">
        <input type="number" class="form-input" id="med-${id}-${m.id}" placeholder="kWh" style="width:140px" step="any"/>
        <span style="font-size:.78rem;color:var(--muted)">kWh</span>
        <button class="btn btn-accent btn-sm" onclick="guardarMedidor('${id}','${m.id}','${unidadId}')">Guardar</button>
      </div>
      <div id="msg-med-${id}-${m.id}"></div>
    </div>`).join('');}

  // RODADOS
  }else if(ind.nombre==='Kilometraje por camioneta'){
    const lista=rodados.length>0?rodados:rodadosBsAs;
    if(lista.length===0){inputHtml=`<div class="alert alert-info">No hay rodados cargados para esta unidad.</div>`;}
    else{inputHtml=lista.map(r=>`<div class="sub-entry-card">
      <div class="sub-entry-title">${r.patente} ${r.campos?.nombre?`<span style="font-size:.72rem;color:var(--muted)">· ${r.campos.nombre}</span>`:''}</div>
      <div class="sub-entry-meta">${r.descripcion||''}</div>
      <div class="inline-row">
        <input type="number" class="form-input" id="rod-km-${id}-${r.id}" placeholder="km actuales" style="width:150px"/>
        <div class="upload-zone" style="flex:1;padding:.4rem .75rem;font-size:.75rem" onclick="document.getElementById('odo-${r.id}').click()">📷 Foto odómetro<input type="file" id="odo-${r.id}" accept="image/*" style="display:none"/></div>
        <button class="btn btn-accent btn-sm" onclick="guardarKm('${id}','${r.id}','${unidadId}')">Guardar</button>

  return`<div class="ind-card" id="ind-card-${id}">
    <div class="ind-name">${ind.nombre}</div>
    <div class="ind-meta">
      <span class="pill">${ind.periodicidad}</span>

      <button class="btn btn-accent" onclick="guardarEntryVars('${id}','${unidadId}')">Guardar</button>
    </div>
    <div id="msg-${id}"></div>`:`<div class="form-group" style="margin-top:.75rem"><label class="form-label">Período (aplica a todos)</label><input type="date" class="form-input" id="fecha-${id}" value="${hoy}" style="width:auto"/></div>`}
  </div>`;
}

// Cuando cambia la fecha, re-buscar valores pre-cargados
async function onFechaChange(indId, unidadId){
  const fecha=document.getElementById('fecha-'+indId)?.value;
  if(!fecha) return;
  const vars=await getVariables(indId);
  const inputVars=vars.filter(v=>!v.es_calculado);
  const claves=inputVars.map(v=>v.clave);
  const preCargados=await getValoresPeriodo(claves, fecha, unidadId);
  inputVars.forEach(v=>{
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    if(!inp) return;
    const preval=preCargados[v.clave];
    if(preval!==undefined){
      inp.value=preval;
      inp.readOnly=true;
      inp.style.background='#F4FAF6';
      inp.style.borderColor='#A8D5B5';
      inp.title='Este valor ya fue cargado para este período';
    } else {
      inp.readOnly=false;
      inp.style.background='';
      inp.style.borderColor='';
      inp.title='';
    }
  });
  calcVars(indId);
}

// Calcular resultado automático
async function calcVars(indId){
  const vars=await getVariables(indId);
  const calcVar=vars.find(v=>v.es_calculado);
  if(!calcVar) return;
  const inputVars=vars.filter(v=>!v.es_calculado);
  const vals={};
  let completo=true;
  inputVars.forEach(v=>{
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    const val=parseFloat(inp?.value);
    if(isNaN(val)||val===0) completo=false;
    vals[v.clave]=val||0;
  });
  const el=document.getElementById('calc-result-'+indId);
  if(!el) return;
  if(!completo){el.innerHTML='';return;}
  try{
    let formula=calcVar.formula_resultado;
    Object.entries(vals).forEach(([k,v])=>{ formula=formula.replaceAll(k, v); });
    const resultado=Function('"use strict";return ('+formula+')')();
    el.innerHTML=`<span class="auto-result">= <strong>${isNaN(resultado)?'—':resultado.toFixed(4)}</strong> ${calcVar.unidad||''}</span>`;
  }catch(e){el.innerHTML='';}
}

// Guardar entry con variables individuales
async function guardarEntryVars(indId, unidadId){
  const msgEl=document.getElementById('msg-'+indId);
  if(msgEl){msgEl.textContent='Guardando...';msgEl.className='form-hint';}
  const fecha=document.getElementById('fecha-'+indId)?.value;
  if(!fecha){if(msgEl){msgEl.textContent='Seleccioná una fecha.';msgEl.className='msg-err';}return;}

  const vars=await getVariables(indId);
  const inputVars=vars.filter(v=>!v.es_calculado);
  const calcVar=vars.find(v=>v.es_calculado);

  // Si no hay variables definidas, usar input simple
  if(vars.length===0){
    const valEl=document.getElementById('val-'+indId);
    const valor=parseFloat(valEl?.value)||null;
    const{error}=await sb.from('entries').insert({indicador_id:indId,unidad_negocio_id:unidadId||null,user_id:currentUser.id,valor,periodo_fecha:fecha});
    if(error){if(msgEl){msgEl.textContent='Error: '+error.message;msgEl.className='msg-err';}}
    else{if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}document.getElementById('ind-card-'+indId)?.classList.add('done');setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);}
    return;
  }

  // Calcular valor final
  const vals={};
  for(const v of inputVars){
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    vals[v.clave]=parseFloat(inp?.value)||0;
  }
  let valorFinal=null;
  if(calcVar){
    try{
      let formula=calcVar.formula_resultado;
      Object.entries(vals).forEach(([k,v])=>{formula=formula.replaceAll(k,v);});
      valorFinal=parseFloat(Function('"use strict";return ('+formula+')')().toFixed(6));
    }catch(e){}
  }

  // Insertar entry
  const{data:entry,error:e1}=await sb.from('entries').insert({
    indicador_id:indId,unidad_negocio_id:unidadId||null,
    user_id:currentUser.id,valor:valorFinal,periodo_fecha:fecha
  }).select().single();
  if(e1){if(msgEl){msgEl.textContent='Error: '+e1.message;msgEl.className='msg-err';}return;}

  // Guardar variables individuales
  const entryVars=inputVars.map(v=>({entry_id:entry.id,variable_id:v.id,clave:v.clave,valor:vals[v.clave]}));
  if(calcVar) entryVars.push({entry_id:entry.id,variable_id:calcVar.id,clave:calcVar.clave,valor:valorFinal||0});
  await sb.from('entry_variables').insert(entryVars);

  if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}
  document.getElementById('ind-card-'+indId)?.classList.add('done');
  // Limpiar cache de valores para que el pre-llenado se actualice
  _valCache={};
  setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);
}

function handleFile(id,input){const f=input.files[0];if(f){const el=document.getElementById('file-name-'+id);if(el)el.textContent='✓ '+f.name;}}

async function guardarEntryCampo(indId,campoId,unidadId){
  const inp=document.getElementById(`val-campo-${indId}-${campoId}`);
  const fechaEl=document.getElementById(`fecha-campo-${indId}-${campoId}`);
  const msgEl=document.getElementById(`msg-campo-${indId}-${campoId}`);
  const valor=parseFloat(inp?.value);
  const fecha=fechaEl?.value;
  if(!valor){if(msgEl){msgEl.textContent='Ingresá un valor.';msgEl.className='msg-err';}return;}
  if(!fecha){if(msgEl){msgEl.textContent='Seleccioná una fecha.';msgEl.className='msg-err';}return;}
  const{error}=await sb.from('entries').insert({
    indicador_id:indId,campo_id:campoId,unidad_negocio_id:unidadId||null,
    user_id:currentUser.id,valor,periodo_fecha:fecha
  });
  if(error){if(msgEl){msgEl.textContent='Error: '+error.message;msgEl.className='msg-err';}}
  else{
    if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}
    if(inp)inp.value='';
    setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);
  }
}

async function guardarEntry(indId,unidadId){

async function marcarVisto(entryId,btn){
  btn.disabled=true;
  btn.textContent='Guardando...';

  // Obtener entry actual para no pisar el array
  const{data:entry}=await sb.from('entries').select('visto_por').eq('id',entryId).single();
  const vistoActual=entry?.visto_por||[];

  if(vistoActual.includes(currentUser.id)){
    btn.textContent='👁️ Visto';return;
  }

  const{error}=await sb.from('entries')
    .update({visto_por:[...vistoActual,currentUser.id]})
    .eq('id',entryId);

  if(error){btn.disabled=false;btn.textContent='👁️ Marcar visto';return;}

  // Actualizar visual
  const row=document.getElementById('entry-row-'+entryId);
  if(row){row.style.opacity='0.6';}
  btn.textContent='👁️ Visto';
  btn.style.background='#E8F5EC';
  btn.style.color='#1A4A2A';
  btn.style.borderColor='#A8D5B5';

  // Actualizar contador de pendientes
  setTimeout(()=>renderBandeja(),1500);
}

async function renderCalendario(){
  const main=document.getElementById('main-content');
  main.innerHTML='<div class="loading">Cargando...</div>';

  const hoy=new Date();
  const anio=hoy.getFullYear();
  const mesActual=hoy.getMonth(); // 0-based

  // Cargar indicadores con vencimientos
  const{data:indicadores}=await sb.from('indicadores')
    .select('*').eq('activo',true).order('categoria').order('orden');

  // Generar todos los vencimientos del año
  const vencimientos=[];
  (indicadores||[]).forEach(ind=>{
    const fechas=getVencimientosAnio(ind, anio);
    fechas.forEach(f=>vencimientos.push({...ind, fecha_venc:f}));
  });

  // Cargar entries del año para saber cuáles ya fueron cargados
  const{data:entries}=await sb.from('entries')
    .select('indicador_id,periodo_fecha,user_id')
    .gte('periodo_fecha', `${anio}-01-01`)
    .lte('periodo_fecha', `${anio}-12-31`);
  const cargados=new Set((entries||[]).map(e=>e.indicador_id+'_'+e.periodo_fecha));

  // Agrupar por mes
  const porMes={};
  for(let m=0;m<12;m++) porMes[m]=[];
  vencimientos.forEach(v=>{
    const mes=v.fecha_venc.getMonth();
    if(porMes[mes]) porMes[mes].push(v);
  });

  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Próximos vencimientos (30 días)
  const en30dias=new Date(hoy); en30dias.setDate(en30dias.getDate()+30);
  const proximos=vencimientos.filter(v=>v.fecha_venc>=hoy&&v.fecha_venc<=en30dias)
    .sort((a,b)=>a.fecha_venc-b.fecha_venc);

  // Vencidos sin cargar
  const vencidosSinCargar=vencimientos.filter(v=>{
    if(v.fecha_venc>hoy) return false;
    const periodoKey=v.id+'_'+v.fecha_venc.toISOString().split('T')[0];
    return !cargados.has(periodoKey);
  });

  main.innerHTML=`
    <div class="section-heading">Calendario de vencimientos</div>
    <div class="section-sub">${anio} · ${indicadores?.length||0} indicadores configurados</div>

    ${vencidosSinCargar.length>0?`
    <div class="alert alert-danger" style="margin-bottom:1rem">
      ⚠ <strong>${vencidosSinCargar.length} indicador${vencidosSinCargar.length>1?'es':''}</strong> vencido${vencidosSinCargar.length>1?'s':''} sin cargar
    </div>`:''}

    ${proximos.length>0?`
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-title">⏰ Próximos 30 días (${proximos.length} vencimientos)</div>
      ${proximos.slice(0,10).map(v=>{
        const diasRestantes=Math.ceil((v.fecha_venc-hoy)/(1000*60*60*24));
        const urgente=diasRestantes<=7;
        return`<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.83rem">
          <span style="min-width:90px;font-weight:500;color:${urgente?'var(--danger)':'var(--warning)'}">
            ${v.fecha_venc.toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}
          </span>
          <span style="flex:1;color:var(--text);cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="irACarga('${v.categoria}','${v.id}')" title="Ir a cargar">${v.nombre}</span>
          <span class="badge badge-na">${CAT_LABELS[v.categoria]||v.categoria}</span>
          <span style="font-size:.75rem;color:${urgente?'var(--danger)':'var(--muted)'}">
            ${diasRestantes===0?'Hoy':diasRestantes===1?'Mañana':`En ${diasRestantes} días`}
          </span>
        </div>`;
      }).join('')}
      ${proximos.length>10?`<div style="font-size:.78rem;color:var(--muted);margin-top:.5rem">Y ${proximos.length-10} más...</div>`:''}
    </div>`:''}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">
      ${MESES.map((mes,idx)=>{
        const esMesActual=idx===mesActual;
        const esPasado=idx<mesActual;
        const venc=porMes[idx]||[];
        const cargadosDelMes=venc.filter(v=>cargados.has(v.id+'_'+v.fecha_venc.toISOString().split('T')[0])).length;
        const pendientes=venc.length-cargadosDelMes;

        return`<div class="card" style="${esMesActual?'border-color:var(--accent);':esPasado?'opacity:0.7':''}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
            <div style="font-weight:500;font-size:.95rem;color:${esMesActual?'var(--accent)':'var(--text)'}">${mes} ${anio}</div>
            <div style="display:flex;gap:.4rem">
              ${venc.length>0?`<span class="badge badge-na">${venc.length} venc.</span>`:''}
              ${pendientes>0&&!esPasado?`<span class="badge badge-pend">${pendientes} pend.</span>`:''}
              ${cargadosDelMes>0?`<span class="badge badge-ok">${cargadosDelMes} ✓</span>`:''}
            </div>
          </div>
          ${venc.length===0?`<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:.5rem 0">Sin vencimientos</div>`:
            venc.sort((a,b)=>a.fecha_venc-b.fecha_venc).map(v=>{
              const key=v.id+'_'+v.fecha_venc.toISOString().split('T')[0];
              const cargado=cargados.has(key);
              const vencido=v.fecha_venc<hoy&&!cargado;
              return`<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem">
                <span style="min-width:28px;color:var(--muted);font-weight:500">${v.fecha_venc.getDate()}</span>
                <span style="flex:1;color:${vencido?'var(--danger)':cargado?'var(--muted)':'var(--text)'};${cargado?'text-decoration:line-through':''}"
                  ${!cargado?`onclick="irACarga('${v.categoria}','${v.id}')" style="cursor:pointer;${vencido?'color:var(--danger)':'color:var(--text)'};text-decoration:underline dotted;text-underline-offset:2px" title="Ir a cargar este indicador"`:''}
                >${v.nombre}</span>
                ${cargado?'<span style="color:var(--success);font-size:.75rem">✓</span>':
                  vencido?'<span style="color:var(--danger);font-size:.75rem">●</span>':'<span style="color:var(--muted);font-size:.75rem;cursor:pointer" onclick="irACarga(\''+v.categoria+'\',\''+v.id+'\')">→</span>'}
              </div>`;
            }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

function getVencimientosAnio(ind, anio){
  const fechas=[];
  const dia=ind.vencimiento_dia||15;

  if(ind.periodicidad==='mensual'||ind.periodicidad==='semanal'){
    // Mensual: vence día 5 de cada mes
    for(let m=0;m<12;m++){
      fechas.push(new Date(anio,m,dia));
    }
  } else if(ind.periodicidad==='trimestral'){
    // Vence el 15 de abril, julio, octubre, enero
    [[0,15],[3,15],[6,15],[9,15]].forEach(([m,d])=>{
      const f=new Date(anio,m+3===12?0:m+3, d);
      if(m+3===12) f.setFullYear(anio+1);
      fechas.push(new Date(anio, m===9?0:m+3, d));
    });
    // Simplificado: 15 de cada mes que cierra trimestre
    fechas.length=0;
    [3,6,9].forEach(m=>fechas.push(new Date(anio,m,15)));
    fechas.push(new Date(anio+1,0,15));
  } else if(ind.periodicidad==='semestral'){
    const tipo=ind.periodo_inicio||'semestral_ene_dic';
    if(tipo==='semestral_ago_feb'){
      fechas.push(new Date(anio,1,15));  // 15 febrero
      fechas.push(new Date(anio,7,15));  // 15 agosto
    } else {
      fechas.push(new Date(anio,2,15));  // 15 marzo
      fechas.push(new Date(anio,8,15));  // 15 septiembre
    }
  } else if(ind.periodicidad==='anual'){
    const mes=(ind.vencimiento_mes||3)-1; // 0-based
    fechas.push(new Date(anio,mes,dia));
    // Si el período es julio-junio, vence en septiembre
    if(ind.periodo_inicio==='julio') fechas.push(new Date(anio,8,15));
  }

  return fechas.filter(f=>!isNaN(f.getTime()));
}

            <td>${ultimo.periodo_fecha?new Date(ultimo.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
      <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);font-size:.82rem;color:var(--muted)">
        Total campos: ${Object.keys(porCampo).length} · Total valor: ${Object.values(porCampo).reduce((a,d)=>a+(d.entries[d.entries.length-1]?.valor||0),0).toLocaleString('es-AR')} ${indData?.unidad_medida||''}
      </div>
    </div>`;
  }

  const labels=entriesConValor.map(e=>e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'2-digit'}):'—');
  const dataVals=entriesConValor.map(e=>e.valor);
  const mediaNum=parseFloat(media);

  resEl.innerHTML=`
    ${consolidadoHtml}
    <div class="metrics-grid" style="margin-bottom:1rem">
      <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${entries.length}</div></div>
      <div class="metric-card"><div class="metric-label">Promedio</div><div class="metric-value">${media??'—'}</div><div class="metric-sub neutral">${indData?.unidad_medida||''}</div></div>
      <div class="metric-card"><div class="metric-label">Máximo</div><div class="metric-value">${vals.length?Math.max(...vals).toFixed(2):'—'}</div></div>
      <div class="metric-card"><div class="metric-label">Mínimo</div><div class="metric-value">${vals.length?Math.min(...vals).toFixed(2):'—'}</div></div>
    </div>

    ${entriesConValor.length>1?`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${indData?.nombre||'Indicador'} · evolución histórica</div>
      <div style="position:relative;height:260px"><canvas id="chart-historico"></canvas></div>
      <div style="display:flex;gap:1rem;margin-top:.75rem;font-size:.75rem;color:var(--muted);flex-wrap:wrap">
        <span>─ Valor real</span>
        <span style="opacity:.6">- - Promedio</span>
        ${alertMin!==null?`<span style="color:var(--danger)">- - Mínimo esperado (${alertMin})</span>`:''}
        ${alertMax!==null?`<span style="color:var(--warning)">- - Máximo esperado (${alertMax})</span>`:''}
      </div>
    </div>`:''}

    <div class="card">
      <div class="card-title">${indData?.nombre||'Indicador'} · registros</div>
      <div class="tab-row" style="margin-bottom:.75rem">
        <button class="tab-btn active" onclick="histTab('tabla',this)">Tabla</button>
        <button class="tab-btn" onclick="histTab('variables',this)">Variables detalle</button>
      </div>
      <div id="hist-tabla">
        <div class="table-wrap"><table>
          <thead><tr><th>Período</th><th>Valor</th><th>Unidad / Campo</th><th>Cargado por</th><th>Estado</th></tr></thead>
          <tbody>${entries.slice().reverse().map(e=>{
            let estado='';
            if(e.valor!==null&&alertMin!==null&&e.valor<alertMin)estado='<span class="badge badge-late">Bajo mínimo</span>';
            else if(e.valor!==null&&alertMax!==null&&e.valor>alertMax)estado='<span class="badge badge-late">Sobre máximo</span>';
            else if(e.valor!==null)estado='<span class="badge badge-ok">Normal</span>';
            return`<tr>
              <td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
              <td><strong>${e.valor??'—'}</strong> <span style="color:var(--muted);font-size:.78rem">${indData?.unidad_medida||''}</span></td>
              <td>${e.unidades_negocio?.nombre||e.campos?.nombre||'—'}</td>
              <td>${(e.profiles?.nombre||'')+' '+(e.profiles?.apellido||'')}</td>
              <td>${estado}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>
      <div id="hist-variables" style="display:none">
        <div id="hist-vars-content" style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.85rem">Cargando variables...</div>
      </div>
    </div>`;

  // Renderizar gráfico
  if(entriesConValor.length>1){
    setTimeout(()=>{
      const ctx=document.getElementById('chart-historico');
      if(!ctx||typeof Chart==='undefined') return;
      const datasets=[
        {label:'Valor real',data:dataVals,borderColor:'#2D5A3D',backgroundColor:'rgba(45,90,61,0.08)',tension:0.3,fill:true,borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D5A3D',pointBorderColor:'#fff',pointBorderWidth:2},
        {label:'Promedio',data:dataVals.map(()=>mediaNum),borderColor:'#7A7570',borderDash:[6,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0}
      ];
      if(alertMin!==null) datasets.push({label:'Mínimo',data:dataVals.map(()=>alertMin),borderColor:'#C0392B',borderDash:[4,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0});
      if(alertMax!==null) datasets.push({label:'Máximo',data:dataVals.map(()=>alertMax),borderColor:'#D4890A',borderDash:[4,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0});
      new Chart(ctx,{
        type:'line',data:{labels,datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(2)||'—'} ${indData?.unidad_medida||''}`}}},
          scales:{
            y:{ticks:{font:{size:11},callback:v=>`${v} ${indData?.unidad_medida||''}`},grid:{color:'rgba(120,120,120,0.08)'}},
            x:{ticks:{font:{size:11},maxRotation:45},grid:{display:false}}
          }
        }
      });
    },100);
  }

  loadHistVariables(indId,entries);
}

function histTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('hist-tabla').style.display=tab==='tabla'?'block':'none';
  document.getElementById('hist-variables').style.display=tab==='variables'?'block':'none';
}

async function loadHistVariables(indId,entries){
  const vars=await getVariables(indId);
  const el=document.getElementById('hist-vars-content');
  if(!el) return;
  if(!vars.length){el.innerHTML='<div style="color:var(--muted)">Este indicador no tiene variables detalladas.</div>';return;}
  const entryIds=entries.map(e=>e.id);
  const{data:evs}=await sb.from('entry_variables').select('*').in('entry_id',entryIds);
  const evPorEntry={};
  (evs||[]).forEach(ev=>{if(!evPorEntry[ev.entry_id])evPorEntry[ev.entry_id]={};evPorEntry[ev.entry_id][ev.clave]=ev.valor;});
  const inputVars=vars.filter(v=>!v.es_calculado);
  const calcVar=vars.find(v=>v.es_calculado);
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Período</th>${inputVars.map(v=>`<th>${v.nombre} (${v.unidad||''})</th>`).join('')}${calcVar?`<th style="color:var(--accent)">${calcVar.nombre}</th>`:''}</tr></thead>
    <tbody>${entries.slice().reverse().map(e=>{
      const ev=evPorEntry[e.id]||{};
      return`<tr><td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
        ${inputVars.map(v=>`<td>${ev[v.clave]!==undefined?ev[v.clave].toLocaleString('es-AR'):'—'}</td>`).join('')}
        ${calcVar?`<td style="font-weight:500;color:var(--accent)">${e.valor!==null?e.valor.toFixed(4):'—'}</td>`:''}
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ── ADMIN ──
async function renderAdmin(){
  const main=document.getElementById('main-content');
  const[{data:profiles},{data:rodados},{data:medidores},{data:puestos}]=await Promise.all([
    sb.from('profiles').select('*').order('apellido'),
    sb.from('rodados').select('*,campos(nombre),unidades_negocio(nombre)').eq('activo',true),
    sb.from('medidores_luz').select('*,campos(nombre)').eq('activo',true),
    sb.from('puestos').select('*,campos(nombre)').eq('activo',true)
  ]);
  window._adminData={profiles,rodados,medidores,puestos};
  main.innerHTML=`
    <div class="section-heading">Administración</div>
    <div class="section-sub">Usuarios, campos y parametrización</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="adminTab('usuarios',this)">Usuarios</button>
      <button class="tab-btn" onclick="adminTab('campos',this)">Campos</button>
      <button class="tab-btn" onclick="adminTab('rodados',this)">Rodados</button>
      <button class="tab-btn" onclick="adminTab('medidores',this)">Medidores</button>
      <button class="tab-btn" onclick="adminTab('puestos-admin',this)">Puestos</button>
    </div>
    <div id="admin-panel">${renderAdminUsuarios(profiles||[])}</div>`;
}

function adminTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const{profiles,rodados,medidores,puestos}=window._adminData;
  const panel=document.getElementById('admin-panel');
  if(tab==='usuarios')panel.innerHTML=renderAdminUsuarios(profiles||[]);
  if(tab==='campos')panel.innerHTML=renderAdminCampos();
  if(tab==='rodados')panel.innerHTML=renderAdminRodados(rodados||[]);
  if(tab==='medidores')panel.innerHTML=renderAdminMedidores(medidores||[]);
  if(tab==='puestos-admin')panel.innerHTML=renderAdminPuestosTable(puestos||[]);
}

function renderAdminUsuarios(profiles){
  return`<div class="card"><div class="card-title">Usuarios (${profiles.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
      <tbody>${profiles.map(p=>`<tr>
        <td>${p.nombre||''} ${p.apellido||''} ${p.iniciales?`<span class="badge badge-na">${p.iniciales}</span>`:''}</td>
        <td style="color:var(--muted)">${p.email}</td>
        <td><span class="badge badge-ok">${ROL_LABELS[p.rol]||p.rol}</span></td>
        <td>${p.activo?'<span class="badge badge-ok">Activo</span>':'<span class="badge badge-late">Inactivo</span>'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}

function renderAdminCampos(){
  return`<div class="card"><div class="card-title">Campos por unidad de negocio</div>
    ${allUnidades.map(u=>{
      const uc=allCampos.filter(c=>c.unidad_negocio_id===u.id);
      return`<div style="margin-bottom:1rem">
        <div style="font-weight:500;font-size:.88rem;margin-bottom:.5rem">${u.nombre}</div>
        ${uc.map(c=>`<div style="display:flex;align-items:center;gap:.75rem;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.83rem">
          <span style="flex:1">${c.nombre}</span>
          <span style="color:var(--muted)">${c.hectareas?c.hectareas.toLocaleString('es-AR')+' ha':'sin ha'}</span>
        </div>`).join('')}
      </div>`;
    }).join('')}</div>`;
}

function renderAdminRodados(rodados){
  return`<div class="card"><div class="card-title">Rodados (${rodados.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Patente</th><th>Descripción</th><th>Campo</th><th>Unidad de negocio</th></tr></thead>
      <tbody>${rodados.map(r=>`<tr>
        <td><strong>${r.patente}</strong></td>
        <td style="color:var(--muted);font-size:.82rem">${r.descripcion||'—'}</td>
        <td>${r.campos?.nombre||'—'}</td>
        <td>${r.unidades_negocio?.nombre||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}

function renderAdminMedidores(medidores){
  return`<div class="card"><div class="card-title">Medidores de luz (${medidores.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Nº Medidor</th><th>Empresa</th><th>Campo</th></tr></thead>
      <tbody>${medidores.map(m=>`<tr>
        <td><strong>${m.numero_medidor||m.nombre}</strong></td>
        <td style="color:var(--muted)">${m.empresa||'—'}</td>
        <td>${m.campos?.nombre||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}

function renderAdminPuestosTable(puestos){
  return`<div class="card"><div class="card-title">Puestos y construcciones (${puestos.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Puesto</th><th>Campo</th><th>Habitantes</th><th>Estado 2025</th></tr></thead>
      <tbody>${puestos.map(p=>`<tr>
        <td><strong>${p.nombre}</strong></td>
        <td>${p.campos?.nombre||'—'}</td>
        <td style="color:var(--muted)">${p.habitantes||'—'}</td>
        <td style="color:var(--muted);max-width:280px;white-space:normal;font-size:.8rem">${p.estado_2025||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}

document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session?.user)await initApp(session.user);})();
</script>
