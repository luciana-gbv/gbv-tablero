<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%232D5A3D'/><text y='.9em' font-size='70' x='15' fill='white'>🌿</text></svg>"/>
<title>GBV · Tablero de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#F5F3EE;--surface:#FFFFFF;--border:#E2DDD6;--text:#1A1916;--muted:#7A7570;--accent:#2D5A3D;--danger:#C0392B;--warning:#D4890A;--success:#2D5A3D;--info:#1A4A6B;--font-disp:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;overflow-x:clip}body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:clip;max-width:100%}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{font-family:var(--font-disp);font-size:2rem;color:var(--accent);margin-bottom:.25rem}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:2rem;letter-spacing:.08em;text-transform:uppercase}
.login-card label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem}
.login-card input{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;background:var(--bg);color:var(--text);outline:none;margin-bottom:1rem;transition:border-color .15s}
.login-card input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.login-error{font-size:.8rem;color:var(--danger);margin-top:.75rem;text-align:center}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--font-disp);font-size:1.25rem;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-user{font-size:.8rem;color:var(--muted)}
.badge-role{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;background:#E8F0EB;color:var(--accent)}
.btn-logout{font-size:.8rem;padding:4px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body)}
.btn-logout:hover{background:var(--bg);color:var(--text)}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto}
.nav-tab{padding:.85rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);transition:all .15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:1.5rem;max-width:1100px;margin:0 auto;width:100%;overflow-x:clip}
#app{width:100%;max-width:100%;overflow-x:clip}
#alerta-banner{overflow-x:clip}
.section-heading{font-family:var(--font-disp);font-size:1.5rem;color:var(--text);margin-bottom:.25rem}
.section-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.metric-label{font-size:.75rem;color:var(--muted);margin-bottom:.4rem}
.metric-value{font-family:var(--font-disp);font-size:1.8rem;color:var(--text);line-height:1}
.metric-sub{font-size:.75rem;margin-top:.3rem}
.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--muted)}
.alert{padding:.75rem 1rem;border-radius:var(--radius);font-size:.85rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.6rem}
.alert-warning{background:#FEF3CD;color:#7A5A00;border:1px solid #F5D97E}
.alert-danger{background:#FDECEA;color:#8B1C1C;border:1px solid #F5B7B1}
.alert-success{background:#E8F5EC;color:#1A4A2A;border:1px solid #A8D5B5}
.alert-info{background:#E8F0F8;color:#1A3A5C;border:1px solid #A8C4DE}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.6rem .9rem;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:.75rem .9rem;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-ok{background:#E8F5EC;color:#1A4A2A}
.badge-pend{background:#FEF3CD;color:#7A5A00}
.badge-late{background:#FDECEA;color:#8B1C1C}
.badge-na{background:var(--bg);color:var(--muted)}
.badge-info{background:#E8F0F8;color:#1A3A5C}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:.35rem}
.form-input,.form-select,.form-textarea{width:100%;padding:.6rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.88rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.auto-result{font-size:.85rem;font-weight:500;color:var(--accent);background:#E8F0EB;padding:.4rem .75rem;border-radius:var(--radius);display:inline-block;margin-top:.4rem}
.btn{padding:.6rem 1.1rem;border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{opacity:.88;background:var(--accent)}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.two-col{display:grid;grid-template-columns:210px 1fr;gap:1.5rem}
.sidebar-nav{display:flex;flex-direction:column;gap:2px}
.sidebar-item{padding:.6rem .85rem;border-radius:var(--radius);font-size:.84rem;color:var(--muted);cursor:pointer;border:none;background:transparent;text-align:left;font-family:var(--font-body);transition:all .12s}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{background:#E8F0EB;color:var(--accent);font-weight:500}
.sidebar-section{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:.75rem .85rem .3rem}
.ind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.75rem}
.ind-card.done{border-color:#A8D5B5;background:#F4FAF6}
.ind-name{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.25rem}
.ind-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
.pill-alert{background:#FDECEA;color:#8B1C1C}
.ind-formula{font-size:.78rem;color:var(--muted);margin-bottom:.75rem;font-style:italic;line-height:1.5}
.upload-zone{border:1px dashed var(--border);border-radius:var(--radius);padding:.75rem 1rem;text-align:center;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);background:#F4FAF6}
.sub-entry-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.5rem}
.sub-entry-title{font-size:.82rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.sub-entry-meta{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.inline-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.puesto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.65rem}
.puesto-nombre{font-size:.88rem;font-weight:500;color:var(--text)}
.puesto-hab{font-size:.78rem;color:var(--muted);margin:.2rem 0}
.puesto-estado{font-size:.78rem;color:var(--text);margin-top:.4rem;line-height:1.5;padding:.5rem .75rem;background:var(--bg);border-radius:var(--radius)}
.tab-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{font-size:.82rem;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body);transition:all .12s}
.tab-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.bar-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;font-size:.83rem}
.bar-label{min-width:140px;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--success)}
.msg-ok{font-size:.78rem;color:var(--success);margin-top:.4rem}
.msg-err{font-size:.78rem;color:var(--danger);margin-top:.4rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.locked{text-align:center;padding:3rem 1rem;color:var(--muted)}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.metrics-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GBV</div>
    <div class="login-sub">Tablero de Comando</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">GBV</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-name"></span>
      <span class="badge-role" id="topbar-role"></span>
      <button onclick="mostrarCambiarPassword()" style="font-size:.72rem;padding:3px 8px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--font-body)">Cambiar contraseña</button>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div id="modal-password" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:var(--radius);padding:2rem;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
      <div style="font-size:1rem;font-weight:500;color:var(--text);margin-bottom:1rem">Cambiar contraseña</div>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <input type="password" class="form-input" id="nueva-pass" placeholder="Mínimo 8 caracteres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-input" id="confirmar-pass" placeholder="Repetí la contraseña"/>
      </div>
      <div id="msg-cambiar-pass" style="font-size:.8rem;margin-bottom:.75rem"></div>
      <div style="display:flex;gap:.75rem">
        <button class="btn btn-accent" onclick="guardarNuevaPassword()">Guardar</button>
        <button class="btn" onclick="cerrarModalPassword()">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div id="alerta-banner"></div>
  <div class="main" id="main-content"><div class="loading">Cargando...</div></div>
</div>

<script>
const SUPA_URL='https://qwnlwpvpmlthshtofkzr.supabase.co';
const SUPA_KEY='sb_publishable_Wcf8KQPElBsMKmRF3kaD8Q_o7k5dXGT';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentUser=null,currentProfile=null,currentTab='resumen';
let allCampos=[],allUnidades=[],allIndicadores=[],misCampos=[];
// Filtro de vencidos por responsable: veTodoIndicadores=true => sin filtro (ve todo);
// si no, misIndicadoresResp = Set de indicador_id de los que la persona es responsable.
let veTodoIndicadores=false, misIndicadoresResp=null;
let indicadorUnidades={};   // indicador_id -> Set(unidad_negocio_id): alcance por indicador (para la pantalla de Carga)
let veTodaCarga=false;      // true para quien ve/edita TODA la pantalla de Carga (programador + Federico)
const VE_TODA_CARGA_IDS=['65108928-ac45-4478-a8fc-fac2230999c7']; // Federico McMahon (agregar más user_id acá si hace falta)
function esMiIndicador(indId){ return veTodoIndicadores || (misIndicadoresResp && misIndicadoresResp.has(indId)); }
// ── Pantalla de Carga: cada uno ve/edita solo lo suyo (Federico y programador ven todo) ──
function esMiIndicadorCarga(indId){ return veTodaCarga || (misIndicadoresResp && misIndicadoresResp.has(indId)); }
// Unidades que la persona puede seleccionar en una categoría (según sus indicadores y el alcance)
function unidadesVisiblesCarga(cat){
  const visibles=allIndicadores.filter(i=>i.categoria===cat && esMiIndicadorCarga(i.id));
  const ids=new Set();
  visibles.forEach(i=>{ const us=indicadorUnidades[i.id]; if(us) us.forEach(u=>ids.add(u)); });
  let lista=allUnidades.filter(u=>ids.has(u.id));
  if(currentProfile.rol==='encargado_campo'){
    const misU=new Set(misCampos.map(c=>c.unidad_negocio_id));
    lista=lista.filter(u=>misU.has(u.id));
  }
  return lista;
}
// Categorías que la persona puede ver en Carga (donde tiene algún indicador visible)
function categoriasVisiblesCarga(){
  return [...new Set(allIndicadores.filter(i=>esMiIndicadorCarga(i.id)).map(i=>i.categoria))];
}
let currentPermisos={};
let selectedCampo=null,selectedCat=null;
const ROL_LABELS={programador:'Programador',directorio:'Directorio',coo:'COO',operativo:'Operativo',encargado_campo:'Encargado de campo',hacienda:'Hacienda',directorio_lectura:'Directorio (solo lectura)'};

function puedeEditar(modulo){
  if(currentProfile?.rol==='programador')return true; // failsafe: programador siempre puede, sin depender de la tabla
  return !!currentPermisos[modulo]?.puede_editar;
}
function puedeVer(modulo){
  if(currentProfile?.rol==='programador')return true;
  return !!currentPermisos[modulo]?.puede_ver;
}
function normalizarTexto(s){
  if(!s)return'';
  return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
const CAT_LABELS={gestion:'Gestión',financiero:'Financiero',comercial:'Comercial',productivo_global:'Productivo · Global',productivo_cria:'Productivo · Cría',productivo_recria:'Productivo · Recría',productivo_feedlot:'Productivo · Feedlot',alimenticio:'Alimenticio',sanitario:'Sanitario',mejoramiento_genetico:'Mejoramiento genético',ecologia:'Ecología',rrhh:'RRHH',inmuebles_urbanos:'Inmuebles Urbanos'};
const CAT_ICONS={gestion:'📋',financiero:'📊',comercial:'📈',productivo_global:'🐄',productivo_cria:'🐮',productivo_recria:'🐂',productivo_feedlot:'🌽',alimenticio:'🌾',sanitario:'💉',mejoramiento_genetico:'🧬',ecologia:'🌿',rrhh:'👥',inmuebles_urbanos:'🏢'};

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Completá email y contraseña.';return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent='Email o contraseña incorrectos.';return;}
  await initApp(data.user);
}

function mostrarCambiarPassword(){
  const modal=document.getElementById('modal-password');
  modal.style.display='flex';
  document.getElementById('nueva-pass').value='';
  document.getElementById('confirmar-pass').value='';
  document.getElementById('msg-cambiar-pass').textContent='';
}

function cerrarModalPassword(){
  document.getElementById('modal-password').style.display='none';
}

async function guardarNuevaPassword(){
  const nueva=document.getElementById('nueva-pass').value;
  const confirmar=document.getElementById('confirmar-pass').value;
  const msgEl=document.getElementById('msg-cambiar-pass');
  if(nueva.length<8){msgEl.textContent='La contraseña debe tener al menos 8 caracteres.';msgEl.style.color='var(--danger)';return;}
  if(nueva!==confirmar){msgEl.textContent='Las contraseñas no coinciden.';msgEl.style.color='var(--danger)';return;}
  msgEl.textContent='Guardando...';msgEl.style.color='var(--muted)';
  const{error}=await sb.auth.updateUser({password:nueva});
  if(error){msgEl.textContent='Error: '+error.message;msgEl.style.color='var(--danger)';}
  else{
    msgEl.textContent='✓ Contraseña actualizada correctamente';
    msgEl.style.color='var(--success)';
    setTimeout(()=>cerrarModalPassword(),2000);
  }
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  currentUser=null;currentProfile=null;
}

async function initApp(user){
  currentUser=user;
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=profile;
  if(!currentProfile){document.getElementById('login-error').textContent='No se encontró tu perfil.';return;}
  const[{data:campos},{data:unidades},{data:indicadores}]=await Promise.all([
    sb.from('campos').select('*,unidades_negocio(nombre)'),
    sb.from('unidades_negocio').select('*').order('orden'),
    sb.from('indicadores').select('*').eq('activo',true).order('orden')
  ]);
  allCampos=campos||[];allUnidades=unidades||[];allIndicadores=indicadores||[];
  // ── Quién ve qué vencidos: los 4 roles de control ven todo; el resto solo lo suyo ──
  veTodoIndicadores=['programador','directorio','coo','directorio_lectura'].includes(currentProfile.rol);
  // misIndicadoresResp se carga SIEMPRE (la pantalla de Carga lo usa para mostrar solo lo de cada uno)
  const{data:misResp}=await sb.from('indicador_responsables').select('indicador_id').eq('user_id',user.id);
  misIndicadoresResp=new Set((misResp||[]).map(r=>r.indicador_id));
  // Alcance por indicador (indicador_id -> unidades) para la pantalla de Carga
  const{data:alcanceRows}=await sb.from('indicador_unidades').select('indicador_id,unidad_negocio_id');
  indicadorUnidades={};
  (alcanceRows||[]).forEach(a=>{ (indicadorUnidades[a.indicador_id]=indicadorUnidades[a.indicador_id]||new Set()).add(a.unidad_negocio_id); });
  // Quién ve/edita TODA la carga: programador + Federico
  veTodaCarga = currentProfile.rol==='programador' || VE_TODA_CARGA_IDS.includes(user.id);
  const{data:permisos}=await sb.from('permisos_rol').select('modulo,puede_ver,puede_editar').eq('rol',currentProfile.rol);
  currentPermisos={};
  (permisos||[]).forEach(p=>{currentPermisos[p.modulo]={puede_ver:p.puede_ver,puede_editar:p.puede_editar};});
  if(currentProfile.rol==='encargado_campo'){
    const{data:asignados}=await sb.from('encargados_campo').select('campo_id').eq('user_id',user.id).eq('activo',true);
    const ids=(asignados||[]).map(a=>a.campo_id);
    misCampos=allCampos.filter(c=>ids.includes(c.id));
  }else{misCampos=allCampos;}
  if(misCampos.length>0)selectedCampo=misCampos[0].id;
  const cats=[...new Set(allIndicadores.map(i=>i.categoria))];
  if(cats.length>0)selectedCat=cats[0];
  document.getElementById('login-screen').style.display='none';
  const appEl=document.getElementById('app');
  appEl.style.display='flex';appEl.style.flexDirection='column';
  document.getElementById('topbar-name').textContent=(currentProfile.nombre||'')+' '+(currentProfile.apellido||'');
  document.getElementById('topbar-role').textContent=ROL_LABELS[currentProfile.rol]||currentProfile.rol;
  buildNav();
  await mostrarAlertas();
  renderTab(currentProfile.rol==='hacienda'?'hacienda':'resumen');
}

async function mostrarAlertas(){
  if(currentProfile.rol==='hacienda'){document.getElementById('alerta-banner').innerHTML='';return;}
  const hoy=new Date();
  const anio=hoy.getFullYear();
  const mes=hoy.getMonth()+1; // 1-based
  const dia=hoy.getDate();

  // ── Alertas de indicadores ──
  const{data:entries}=await sb.from('entries')
    .select('indicador_id,periodo_fecha')
    .gte('periodo_fecha',`${anio}-01-01`)
    .lte('periodo_fecha',`${anio}-12-31`);
  const cargados=new Set((entries||[]).map(e=>e.indicador_id+'_'+e.periodo_fecha));

  const vencidos=[], manana=[], enSemana=[];
  allIndicadores.forEach(ind=>{
    if(!esMiIndicador(ind.id)) return; // cada persona ve solo los suyos (los 4 roles de control ven todo)
    const fechas=getVencimientosAnio(ind,anio);
    fechas.forEach(f=>{
      const key=ind.id+'_'+f.toISOString().split('T')[0];
      if(cargados.has(key)) return;
      const diff=Math.ceil((f-hoy)/(1000*60*60*24));
      if(diff<0) vencidos.push({...ind,fecha_venc:f,diff});
      else if(diff===0||diff===1) manana.push({...ind,fecha_venc:f,diff});
      else if(diff<=7) enSemana.push({...ind,fecha_venc:f,diff});
    });
  });

  // ── Alertas de RRHH ──
  // Períodos: semana del 1° de junio (días 1-7) y semana del 1° de diciembre (días 1-7)
  const esSemanJunio = mes===6 && dia<=7;
  const esSemanaDict = mes===12 && dia<=7;
  const esSemanaCercaJunio = (mes===5 && dia>=25) || (mes===6 && dia<=7);
  const esSemanaCercaDic = (mes===11 && dia>=25) || (mes===12 && dia<=7);
  const periodoRRHH = mes<=6 ? `junio_${anio}` : `diciembre_${anio}`;
  const periodoLabel = mes<=6 ? `Junio ${anio}` : `Diciembre ${anio}`;

  let alertaRRHH = null;
  if(esSemanaCercaJunio || esSemanaCercaDic){
    // Ver cuántas evaluaciones pendientes tiene este usuario
    const{data:evalRel}=await sb.from('evaluadores_empleado')
      .select('empleado_id').eq('evaluador_user_id',currentUser.id).eq('activo',true);
    const empIds=(evalRel||[]).map(e=>e.empleado_id);

    if(empIds.length>0){
      const{data:evalsHechas}=await sb.from('evaluaciones')
        .select('empleado_id').eq('evaluador_user_id',currentUser.id)
        .eq('periodo',periodoRRHH).neq('estado','borrador');
      const hechasIds=new Set((evalsHechas||[]).map(e=>e.empleado_id));
      const pendientesRRHH=empIds.filter(id=>!hechasIds.has(id)).length;

      if(pendientesRRHH>0){
        const urgente=esSemanJunio||esSemanaDict;
        alertaRRHH={pendientes:pendientesRRHH, urgente, label:periodoLabel};
      }
    }
  }

  // Para directorio/COO: ver si hay evaluaciones sin aprobar
  let sinAprobar=0;
  if(puedeEditar('rrhh')&&['programador','directorio','coo'].includes(currentProfile.rol)&&(esSemanaCercaJunio||esSemanaCercaDic)){
    const{data:enviadas}=await sb.from('evaluaciones')
      .select('id').eq('periodo',periodoRRHH).eq('estado','enviado');
    sinAprobar=(enviadas||[]).length;
  }

  // Alerta de "preparar ronda": 1 semana ANTES de la ventana normal de evaluación,
  // para que programador/coo asignen evaluador a quien le falte antes de que la
  // alerta normal llegue a los evaluadores. Ventana normal: 25/may-7/jun y 25/nov-7/dic.
  // Esta alerta: 18/may-24/may y 18/nov-24/nov (la semana previa).
  const esSemanaPreparacion = (mes===5 && dia>=18 && dia<=24) || (mes===11 && dia>=18 && dia<=24);
  let alertaPrepararRonda = null;
  if(esSemanaPreparacion && ['programador','coo'].includes(currentProfile.rol)){
    const PUESTOS_ENCARGADO_CAMPO_AL=['encargado'];
    const PUESTOS_CAMPO_AUTOMATICOS_AL=['capataz','peon','puestero','tractorista'];
    const[{data:todosEmp},{data:fijosRel}]=await Promise.all([
      sb.from('empleados').select('id,area,unidad_negocio,puesto_codigo').eq('activo',true),
      sb.from('evaluadores_empleado').select('empleado_id').eq('activo',true)
    ]);
    const{data:asignadosPeriodo}=await sb.from('evaluadores_periodo').select('empleado_id').eq('periodo',periodoRRHH);
    const idsFijos=new Set((fijosRel||[]).map(r=>r.empleado_id));
    const idsAsignadosPeriodo=new Set((asignadosPeriodo||[]).map(r=>r.empleado_id));
    const sinAsignarCount=(todosEmp||[]).filter(e=>{
      if(idsFijos.has(e.id))return false;
      if(idsAsignadosPeriodo.has(e.id))return false;
      if(PUESTOS_CAMPO_AUTOMATICOS_AL.includes(e.puesto_codigo)){
        const tieneEncargado=(todosEmp||[]).some(o=>PUESTOS_ENCARGADO_CAMPO_AL.includes(o.puesto_codigo)&&o.unidad_negocio===e.unidad_negocio);
        if(tieneEncargado)return false;
      }
      return true;
    }).length;
    if(sinAsignarCount>0){
      alertaPrepararRonda={sinAsignar:sinAsignarCount,label:periodoLabel};
    }
  }

  // ── Construir banner ──
  const alertaDiv=document.getElementById('alerta-banner');
  if(!alertaDiv) return;

  let html='';

  // Alertas de indicadores
  if(vencidos.length>0){
    html+=`<div class="alert alert-danger" style="margin:0 1.5rem;margin-top:.75rem">
      ⚠ <strong>${vencidos.length} indicador${vencidos.length>1?'es':''} vencido${vencidos.length>1?'s':''} sin cargar</strong>
      — ${vencidos.slice(0,3).map(v=>v.nombre).join(', ')}${vencidos.length>3?` y ${vencidos.length-3} más`:''}
      <button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #8B1C1C;background:transparent;color:#8B1C1C;cursor:pointer;margin-left:.5rem">Ver →</button>
    </div>`;
  }
  if(manana.length>0){
    html+=`<div class="alert alert-warning" style="margin:0 1.5rem;margin-top:.5rem">
      ⏰ <strong>${manana.length} indicador${manana.length>1?'es':''}</strong> vence${manana.length>1?'n':''} hoy o mañana
      — ${manana.slice(0,3).map(v=>v.nombre).join(', ')}${manana.length>3?` y ${manana.length-3} más`:''}
      <button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #7A5A00;background:transparent;color:#7A5A00;cursor:pointer;margin-left:.5rem">Ver →</button>
    </div>`;
  }
  if(enSemana.length>0&&vencidos.length===0&&manana.length===0){
    html+=`<div class="alert alert-info" style="margin:0 1.5rem;margin-top:.75rem">
      📅 <strong>${enSemana.length} indicador${enSemana.length>1?'es':''}</strong> vence${enSemana.length>1?'n':''} esta semana
      <button onclick="renderTab('calendario')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #1A3A5C;background:transparent;color:#1A3A5C;cursor:pointer;margin-left:.5rem">Ver →</button>
    </div>`;
  }

  // Alertas de RRHH
  if(alertaRRHH){
    html+=`<div class="alert ${alertaRRHH.urgente?'alert-danger':'alert-warning'}" style="margin:0 1.5rem;margin-top:.5rem">
      👥 ${alertaRRHH.urgente?'⚠':'⏰'} <strong>Evaluaciones de desempeño · ${alertaRRHH.label}</strong> — 
      Tenés <strong>${alertaRRHH.pendientes} evaluación${alertaRRHH.pendientes>1?'es':''} pendiente${alertaRRHH.pendientes>1?'s':''}</strong> sin enviar
      <button onclick="renderTab('rrhh')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid ${alertaRRHH.urgente?'#8B1C1C':'#7A5A00'};background:transparent;color:${alertaRRHH.urgente?'#8B1C1C':'#7A5A00'};cursor:pointer;margin-left:.5rem">Ir a RRHH →</button>
    </div>`;
  }

  if(sinAprobar>0){
    html+=`<div class="alert alert-warning" style="margin:0 1.5rem;margin-top:.5rem">
      👥 <strong>${sinAprobar} evaluación${sinAprobar>1?'es':''} enviada${sinAprobar>1?'s':''}</strong> esperan aprobación del Directorio
      <button onclick="renderTab('rrhh')" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #7A5A00;background:transparent;color:#7A5A00;cursor:pointer;margin-left:.5rem">Aprobar →</button>
    </div>`;
  }

  if(alertaPrepararRonda){
    html+=`<div class="alert alert-warning" style="margin:0 1.5rem;margin-top:.5rem">
      🗓️ <strong>Preparar ronda de evaluación · ${alertaPrepararRonda.label}</strong> — 
      Quedan <strong>${alertaPrepararRonda.sinAsignar} empleado${alertaPrepararRonda.sinAsignar>1?'s':''} sin evaluador asignado</strong> para esta ronda, que empieza en pocos días
      <button onclick="renderTab('rrhh');setTimeout(()=>document.querySelector('[onclick*=preparar-ronda]')?.click(),300)" style="font-size:.75rem;padding:3px 10px;border-radius:var(--radius);border:1px solid #7A5A00;background:transparent;color:#7A5A00;cursor:pointer;margin-left:.5rem">Preparar →</button>
    </div>`;
  }

  alertaDiv.innerHTML=html;
}

function buildNav(){
  const nav=document.getElementById('nav-tabs');nav.innerHTML='';
  TAB_DEFS.filter(t=>t.roles.includes(currentProfile.rol)).forEach(t=>{
    const btn=document.createElement('button');
    btn.className='nav-tab'+(t.id===currentTab?' active':'');
    btn.textContent=t.label;btn.dataset.tab=t.id;
    btn.onclick=()=>renderTab(t.id);nav.appendChild(btn);
  });
}

function setActiveTab(id){
  currentTab=id;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
}

function renderTab(tab){
  setActiveTab(tab);
  document.getElementById('main-content').innerHTML='<div class="loading">Cargando...</div>';
  if(tab==='resumen')renderResumen();
  if(tab==='carga')renderCarga();
  if(tab==='calendario')renderCalendario();
  if(tab==='bandeja')renderBandeja();
  if(tab==='inmuebles')renderInmuebles();
  if(tab==='rrhh')renderRRHH();
  if(tab==='puestos')renderPuestos();
  if(tab==='historico')renderHistorico();
  if(tab==='hacienda')renderHacienda();
  if(tab==='admin')renderAdmin();
}

// ── APROBACIONES (COO / Joaquín aprueba indicadores de campo y ganadería) ──
const CATS_APROBACION=['productivo_global','productivo_cria','productivo_recria','productivo_feedlot','alimenticio','sanitario','mejoramiento_genetico','gestion','financiero'];

async function renderAprobaciones(targetId){
  const cont=document.getElementById(targetId||'main-content');
  if(!cont)return;
  cont.innerHTML='<div class="loading">Cargando...</div>';
  const{data:profs}=await sb.from('profiles').select('id,nombre,apellido');
  const nombreDe={}; (profs||[]).forEach(p=>nombreDe[p.id]=((p.nombre||'')+' '+(p.apellido||'')).trim()||'—');
  const{data:pend}=await sb.from('entries')
    .select('id,valor,valor_texto,periodo_fecha,created_at,user_id,estado,indicadores!inner(nombre,categoria,unidad_medida),unidades_negocio(nombre)')
    .eq('estado','pendiente')
    .in('indicadores.categoria',CATS_APROBACION)
    .order('created_at',{ascending:true});
  const lista=pend||[];

  let html=`<div class="section-sub">Revisá y aprobá los indicadores de campo y ganadería cargados</div>`;
  if(lista.length===0){
    html+=`<div class="card"><div style="text-align:center;padding:2.5rem;color:var(--muted)"><div style="font-size:2rem;margin-bottom:.5rem">✓</div><div>No hay indicadores pendientes de aprobación.</div></div></div>`;
    cont.innerHTML=html; return;
  }
  html+=`<div style="font-size:.8rem;color:var(--muted);margin-bottom:.75rem">${lista.length} pendiente${lista.length>1?'s':''} de aprobación</div>`;
  html+=lista.map(e=>{
    const val=e.valor!=null?Number(e.valor).toLocaleString('es-AR',{maximumFractionDigits:2}):(e.valor_texto||'—');
    const um=e.indicadores?.unidad_medida||'';
    const uni=e.unidades_negocio?.nombre||'—';
    const fecha=new Date(e.created_at).toLocaleDateString('es-AR');
    return `<div class="card" id="aprob-card-${e.id}" style="margin-bottom:.6rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap">
        <div>
          <div style="font-weight:600">${e.indicadores?.nombre||'—'}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:.15rem">${uni} · período ${e.periodo_fecha} · cargó ${nombreDe[e.user_id]||'—'} el ${fecha}</div>
        </div>
        <div style="font-size:1.3rem;font-weight:700;color:var(--accent);white-space:nowrap">${val} <span style="font-size:.7rem;color:var(--muted);font-weight:400">${um}</span></div>
      </div>
      <div id="aprob-msg-${e.id}" style="font-size:.8rem;margin-top:.4rem"></div>
      <div style="display:flex;gap:.5rem;margin-top:.6rem">
        <button class="btn btn-accent btn-sm" onclick="aprobarEntry('${e.id}')">✓ Aprobar</button>
        <button class="btn btn-sm" style="background:#F4E4E4;color:#8B1C1C" onclick="rechazarEntry('${e.id}')">✗ Rechazar</button>
      </div>
    </div>`;
  }).join('');
  cont.innerHTML=html;
}

async function aprobarEntry(id){
  const msg=document.getElementById('aprob-msg-'+id);
  const{error}=await sb.from('entries').update({estado:'aprobado',aprobado_por:currentUser.id,aprobado_en:new Date().toISOString(),motivo_rechazo:null}).eq('id',id);
  if(error){if(msg){msg.textContent='Error: '+error.message;msg.className='msg-err';}return;}
  const card=document.getElementById('aprob-card-'+id);
  if(card){card.style.transition='opacity .3s';card.style.opacity='0';setTimeout(()=>card.remove(),300);}
}

async function rechazarEntry(id){
  const motivo=prompt('Motivo del rechazo (obligatorio):');
  if(motivo===null) return;
  if(!motivo.trim()){alert('Tenés que escribir un motivo para rechazar.');return;}
  const msg=document.getElementById('aprob-msg-'+id);
  const{error}=await sb.from('entries').update({estado:'rechazado',aprobado_por:currentUser.id,aprobado_en:new Date().toISOString(),motivo_rechazo:motivo.trim()}).eq('id',id);
  if(error){if(msg){msg.textContent='Error: '+error.message;msg.className='msg-err';}return;}
  const card=document.getElementById('aprob-card-'+id);
  if(card){card.style.transition='opacity .3s';card.style.opacity='0';setTimeout(()=>card.remove(),300);}
}

  }

  const filtered=allIndicadores.filter(i=>
    i.categoria===selectedCat &&

        ${has>0?`<span style="font-size:.7rem;color:var(--muted)">${has.toLocaleString('es-AR')} ha</span>`:''}
      </button>`;
    }).join('');
  }

  // Unidad seleccionada y sus campos
  const unidad=allUnidades.find(u=>u.id===selectedUnidad);
  const camposUnidad=allCampos.filter(c=>c.unidad_negocio_id===selectedUnidad);
  const hasTotal=camposUnidad.reduce((a,c)=>a+(c.hectareas||0),0);

  // Medidores y rodados de todos los campos de la unidad
  let medidores=[],rodados=[],rodadosBsAs=[];
  if(camposUnidad.length>0){
    const campoIds=camposUnidad.map(c=>c.id);
    const{data:m}=await sb.from('medidores_luz').select('*').in('campo_id',campoIds).eq('activo',true);
    medidores=m||[];
  }
  // Rodados filtrados por unidad de negocio
  const{data:r}=await sb.from('rodados').select('*,campos(nombre)').eq('unidad_negocio_id',selectedUnidad).eq('activo',true);
  rodados=r||[];
  // Rodados de Administración BA para operativos
  if(['operativo','programador'].includes(currentProfile.rol)){
    const{data:rb}=await sb.from('rodados').select('*').is('campo_id',null).eq('activo',true);
    rodadosBsAs=rb||[];
  }

  if(filtered.length===0){panel.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No tenés indicadores para cargar en esta categoría y unidad.</div></div>';return;}
  // Limpiar cache al cambiar categoría
  _varCache={};
  _allVarsLoaded=false;
  _periodoValsCache={};

  // Precargar variables y valores del período en paralelo — solo 2 consultas
  const periodoRef=filtered.length>0?getPeriodoFijo(filtered[0]):'';
  await Promise.all([
    preloadVariables(filtered),
    preloadValoresPeriodo(periodoRef, selectedUnidad)
  ]);

  const periodoValsCache=_periodoValsCache[periodoRef+'_'+selectedUnidad]||{};

  // ── Opción B: ocultar los que ya se cargaron para su período actual (por indicador+unidad) ──
  const idsFiltered=filtered.map(i=>i.id);
  let cargadosSet=new Set();
  _rechazadosMap={};
  if(idsFiltered.length>0 && selectedUnidad){
    const{data:entradasU}=await sb.from('entries')
      .select('indicador_id,periodo_fecha,estado,motivo_rechazo')
      .eq('unidad_negocio_id', selectedUnidad)
      .in('indicador_id', idsFiltered);
    (entradasU||[]).forEach(e=>{
      if(e.estado==='rechazado'){ _rechazadosMap[e.indicador_id+'_'+e.periodo_fecha]=e.motivo_rechazo||''; }
      else { cargadosSet.add(e.indicador_id+'_'+e.periodo_fecha); }
    });

  // Los de varias entradas por unidad (medidor/rodado/por campo) no se ocultan
  const esMultiEntrada=(ind)=> ind.por_campo || ['Consumos de luz por medidor','Kilometraje por camioneta'].includes(ind.nombre);
  const estaCargado=(ind)=> !esMultiEntrada(ind) && cargadosSet.has(ind.id+'_'+getPeriodoFijo(ind));
  const pendientes=filtered.filter(i=>!estaCargado(i));
  const yaCargados=filtered.filter(i=>estaCargado(i));

  // Renderizar: pendientes normal; ya cargados en una sección al pie
  let html=pendientes.map(ind=>renderIndCard(ind,unidad,hasTotal,medidores,rodados,rodadosBsAs,_varCache,periodoValsCache)).join('');
  if(pendientes.length===0){
    html=`<div class="card"><div style="text-align:center;padding:1.5rem;color:var(--accent)"><div style="font-size:1.6rem;margin-bottom:.4rem">✓</div><div style="font-size:.9rem">¡Todo cargado en esta categoría y unidad!</div></div></div>`;
  }
  if(yaCargados.length>0){
    html+=`<div class="card" style="margin-top:.5rem">
      <div class="card-title">✓ Ya cargadas este período (${yaCargados.length})</div>
      <div style="margin-top:.4rem">
        ${yaCargados.map(ind=>`<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.85rem;color:var(--muted)"><span style="color:var(--accent)">✓</span> ${ind.nombre}</div>`).join('')}
      </div>
    </div>`;
  }
  panel.innerHTML=html;
}

// Cache de variables por indicador y valores pre-cargados por período
let _varCache={};
let _valCache={};  // { clave_periodo: valor }
let _allVarsLoaded=false;

async function preloadVariables(indicadores){
  if(_allVarsLoaded) return;
  const ids=indicadores.map(i=>i.id);
  const{data}=await sb.from('indicador_variables').select('*').in('indicador_id',ids).order('orden');
  (data||[]).forEach(v=>{
    if(!_varCache[v.indicador_id]) _varCache[v.indicador_id]=[];
    _varCache[v.indicador_id].push(v);
  });
  _allVarsLoaded=true;
}

async function getVariables(indId){
  if(_varCache[indId]!==undefined) return _varCache[indId];
  const{data}=await sb.from('indicador_variables').select('*').eq('indicador_id',indId).order('orden');
  _varCache[indId]=data||[];
  return _varCache[indId];
}

// Buscar valores ya cargados para el mismo período y clave compartida
let _periodoValsCache={};
let _rechazadosMap={};  // indicador_id+'_'+periodo -> motivo de rechazo (para avisar al responsable)

async function preloadValoresPeriodo(periodo, unidadId){
  const cacheKey=periodo+'_'+unidadId;
  if(_periodoValsCache[cacheKey]) return;
  if(!periodo||!unidadId){_periodoValsCache[cacheKey]={};return;}
  const{data}=await sb.from('entry_variables')
    .select('clave,valor,entries!inner(periodo_fecha,unidad_negocio_id,indicador_id)')
    .eq('entries.periodo_fecha', periodo)
    .eq('entries.unidad_negocio_id', unidadId);
  const result={};
  (data||[]).forEach(ev=>{ const k=ev.entries.indicador_id+'_'+ev.clave; if(!(k in result)) result[k]=ev.valor; });
  _periodoValsCache[cacheKey]=result;
}

async function getValoresPeriodo(indId, claves, periodo, unidadId){
  if(!claves.length||!periodo) return {};
  const cacheKey=periodo+'_'+unidadId;
  if(!_periodoValsCache[cacheKey]) await preloadValoresPeriodo(periodo, unidadId);
  const cache=_periodoValsCache[cacheKey]||{};
  const result={};
  claves.forEach(c=>{ const k=indId+'_'+c; if(k in cache) result[c]=cache[k]; });
  return result;
}

function getPeriodoFijo(ind){
  const hoy=new Date();
  const anio=hoy.getFullYear();
  const mes=hoy.getMonth(); // 0-based

  const per=ind.periodicidad;
  const periodoInicio=ind.periodo_inicio||'';

  // MENSUAL → último día del mes anterior
  if(per==='mensual'||per==='semanal'){
    const ultimoMesAnt=new Date(anio,mes,0); // día 0 = último día del mes anterior
    return ultimoMesAnt.toISOString().split('T')[0];
  }

  // TRIMESTRAL → último día del trimestre cerrado
  if(per==='trimestral'){
    // Trimestres: Q1=31mar, Q2=30jun, Q3=30sep, Q4=31dic
    const cierres=[[2,31],[5,30],[8,30],[11,31]];
    // Buscar el último trimestre cerrado
    for(let i=cierres.length-1;i>=0;i--){
      const[m,d]=cierres[i];
      if(mes>m||(mes===m&&hoy.getDate()>=15)){
        return`${anio}-${String(m+1).padStart(2,'0')}-${d}`;
      }
    }
    // Si estamos en Q1, el último trimestre fue Q4 del año anterior
    return`${anio-1}-12-31`;
  }

  // SEMESTRAL
  if(per==='semestral'){
    if(periodoInicio==='semestral_ago_feb'){
      // Períodos: Ene-Jun (vence 15 ago) y Jul-Dic (vence 15 feb)
      // Si estamos entre ago y ene → período fue Ene-Jun → 30/06
      // Si estamos entre feb y jul → período fue Jul-Dic año anterior → 31/12
      if(mes>=7||mes<=0) return`${mes>=7?anio:anio-1}-06-30`;
      return`${anio-1}-12-31`;
    } else {
      // semestral_ene_dic: Ene-Jun (vence 15 sep) y Jul-Dic (vence 15 mar)
      // Si estamos entre sep y dic → período fue Ene-Jun → 30/06
      // Si estamos entre mar y ago → período fue Jul-Dic año anterior → 31/12
      if(mes>=8) return`${anio}-06-30`;
      return`${anio-1}-12-31`;
    }
  }

  // ANUAL
  if(per==='anual'){
    if(periodoInicio==='julio'||periodoInicio?.includes('julio')){
      // Año fiscal Julio-Junio → 30/06 del año en curso o anterior
      if(mes>=6) return`${anio}-06-30`;
      return`${anio-1}-06-30`;
    } else {
      // Año calendario Enero-Diciembre → 31/12 del año anterior
      return`${anio-1}-12-31`;
    }
  }

  // Default: último día del mes anterior
  return new Date(anio,mes,0).toISOString().split('T')[0];
}

function getPeriodoRango(ind){
  const hoy=new Date();
  const anio=hoy.getFullYear();
  const mes=hoy.getMonth();
  const per=ind.periodicidad;
  const periodoInicio=ind.periodo_inicio||'';

  if(per==='mensual'||per==='semanal'){
    const inicioMes=new Date(anio,mes-1,1);
    const finMes=new Date(anio,mes,0);
    return{inicio:inicioMes,fin:finMes};
  }
  if(per==='trimestral'){
    const cierres=[[0,2,31],[3,5,30],[6,8,30],[9,11,31]];
    for(let i=cierres.length-1;i>=0;i--){
      const[mi,mf,d]=cierres[i];
      if(mes>mf||(mes===mf&&hoy.getDate()>=15)){
        return{inicio:new Date(anio,mi,1),fin:new Date(anio,mf,d)};
      }
    }
    return{inicio:new Date(anio-1,9,1),fin:new Date(anio-1,11,31)};
  }
  if(per==='semestral'){
    if(periodoInicio==='semestral_ago_feb'){
      if(mes>=7||mes<=0){
        const a=mes>=7?anio:anio-1;
        return{inicio:new Date(a,0,1),fin:new Date(a,5,30)};
      }
      return{inicio:new Date(anio-1,6,1),fin:new Date(anio-1,11,31)};
    } else {
      if(mes>=8) return{inicio:new Date(anio,0,1),fin:new Date(anio,5,30)};
      return{inicio:new Date(anio-1,6,1),fin:new Date(anio-1,11,31)};
    }
  }
  if(per==='anual'){
    if(periodoInicio==='julio'||periodoInicio?.includes('julio')){
      if(mes>=6) return{inicio:new Date(anio-1,6,1),fin:new Date(anio,5,30)};
      return{inicio:new Date(anio-2,6,1),fin:new Date(anio-1,5,30)};
    } else {
      return{inicio:new Date(anio-1,0,1),fin:new Date(anio-1,11,31)};
    }
  }
  const inicioMes=new Date(anio,mes-1,1);
  const finMes=new Date(anio,mes,0);
  return{inicio:inicioMes,fin:finMes};
}

function formatPeriodoLabel(fechaStr, ind){
  if(!fechaStr||!ind) {
    if(!fechaStr) return '—';
    const f=new Date(fechaStr+'T12:00:00');
    return f.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  }
  const rango=getPeriodoRango(ind);
  const opts={day:'2-digit',month:'short',year:'numeric'};
  const inicio=rango.inicio.toLocaleDateString('es-AR',opts);
  const fin=rango.fin.toLocaleDateString('es-AR',opts);
  return`${inicio} — ${fin}`;
}

// Cuando cambia la fecha, re-buscar valores pre-cargados
async function onFechaChange(indId, unidadId){
  const fecha=document.getElementById('fecha-'+indId)?.value;
  if(!fecha) return;
  const vars=await getVariables(indId);
  const inputVars=vars.filter(v=>!v.es_calculado);
  const claves=inputVars.map(v=>v.clave);
  const preCargados=await getValoresPeriodo(indId, claves, fecha, unidadId);
  inputVars.forEach(v=>{
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    if(!inp) return;
    const preval=preCargados[v.clave];
    if(preval!==undefined){
      inp.value=preval;
      inp.readOnly=true;
      inp.style.background='#F4FAF6';
      inp.style.borderColor='#A8D5B5';
      inp.title='Este valor ya fue cargado para este período';
    } else {
      inp.readOnly=false;
      inp.style.background='';
      inp.style.borderColor='';
      inp.title='';
    }
  });
  calcVars(indId);
}

// Calcular resultado automático
async function calcVars(indId){
  const vars=await getVariables(indId);
  const calcVar=vars.find(v=>v.es_calculado);
  if(!calcVar) return;
  const inputVars=vars.filter(v=>!v.es_calculado);
  const vals={};
  let completo=true;
  inputVars.forEach(v=>{
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    const val=parseFloat(inp?.value);
    if(isNaN(val)||val===0) completo=false;
    vals[v.clave]=val||0;
  });
  const el=document.getElementById('calc-result-'+indId);
  if(!el) return;
  if(!completo){el.innerHTML='';return;}
  try{
    let formula=calcVar.formula_resultado;
    Object.entries(vals).forEach(([k,v])=>{ formula=formula.replaceAll(k, v); });
    const resultado=Function('"use strict";return ('+formula+')')();
    el.innerHTML=`<span class="auto-result">= <strong>${isNaN(resultado)?'—':resultado.toFixed(4)}</strong> ${calcVar.unidad||''}</span>`;
  }catch(e){el.innerHTML='';}
}

// Guardar entry con variables individuales
async function guardarEntryVars(indId, unidadId, periodoFijo){
  const msgEl=document.getElementById('msg-'+indId);
  if(msgEl){msgEl.textContent='Guardando...';msgEl.className='form-hint';}
  if(!periodoFijo){if(msgEl){msgEl.textContent='Error: período no definido.';msgEl.className='msg-err';}return;}

  const vars=await getVariables(indId);
  const inputVars=vars.filter(v=>!v.es_calculado);
  const calcVar=vars.find(v=>v.es_calculado);

  // Si no hay variables definidas, usar input simple
  if(vars.length===0){
    const valEl=document.getElementById('val-'+indId);
    const valor=parseFloat(valEl?.value)||null;
    const{error}=await sb.from('entries').insert({indicador_id:indId,unidad_negocio_id:unidadId||null,user_id:currentUser.id,valor,periodo_fecha:periodoFijo});
    if(error){if(msgEl){msgEl.textContent='Error: '+error.message;msgEl.className='msg-err';}}
    else{if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}document.getElementById('ind-card-'+indId)?.classList.add('done');setTimeout(()=>{document.getElementById('ind-card-'+indId)?.remove();},1000);}
    return;
  }

  // Calcular valor final
  const vals={};
  for(const v of inputVars){
    const inp=document.getElementById(`var-${indId}-${v.clave}`);
    vals[v.clave]=parseFloat(inp?.value)||0;
  }
  let valorFinal=null;
  if(calcVar){
    try{
      let formula=calcVar.formula_resultado;
      Object.entries(vals).forEach(([k,v])=>{formula=formula.replaceAll(k,v);});
      valorFinal=parseFloat(Function('"use strict";return ('+formula+')')().toFixed(6));
    }catch(e){}
  }

  const{data:entry,error:e1}=await sb.from('entries').insert({
    indicador_id:indId,unidad_negocio_id:unidadId||null,
    user_id:currentUser.id,valor:valorFinal,periodo_fecha:periodoFijo
  }).select().single();
  if(e1){if(msgEl){msgEl.textContent='Error: '+e1.message;msgEl.className='msg-err';}return;}

  const entryVars=inputVars.map(v=>({entry_id:entry.id,variable_id:v.id,clave:v.clave,valor:vals[v.clave]}));
  if(calcVar) entryVars.push({entry_id:entry.id,variable_id:calcVar.id,clave:calcVar.clave,valor:valorFinal||0});
  await sb.from('entry_variables').insert(entryVars);

  if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}
  document.getElementById('ind-card-'+indId)?.classList.add('done');
  _valCache={};
  setTimeout(()=>{document.getElementById('ind-card-'+indId)?.remove();},1000);
}

    ${sinVer.length>0?`
    <div class="card" style="margin-bottom:1rem">

      <div id="bandeja-pendientes">
        ${sinVer.map(e=>renderBandejaRow(e,false)).join('')}

    </div>`:''}

    ${vistos.length>0?`
    <div class="card">
      <div class="card-title">✓ Ya vistos (${vistos.length})</div>

async function marcarVisto(entryId,btn){
  btn.disabled=true;
  btn.textContent='Guardando...';

  // Obtener entry actual para no pisar el array
  const{data:entry}=await sb.from('entries').select('visto_por').eq('id',entryId).single();
  const vistoActual=entry?.visto_por||[];

  if(vistoActual.includes(currentUser.id)){
    btn.textContent='👁️ Visto';return;
  }

  const{error}=await sb.from('entries')
    .update({visto_por:[...vistoActual,currentUser.id]})
    .eq('id',entryId);

  if(error){btn.disabled=false;btn.textContent='👁️ Marcar visto';return;}

  // Actualizar visual
  const row=document.getElementById('entry-row-'+entryId);
  if(row){row.style.opacity='0.6';}
  btn.textContent='👁️ Visto';
  btn.style.background='#E8F5EC';
  btn.style.color='#1A4A2A';
  btn.style.borderColor='#A8D5B5';

  // Actualizar contador de pendientes
  setTimeout(()=>renderBandeja(),1500);
}

function irACarga(categoria, indId){
  selectedCat=categoria;
  renderTab('carga');
  // Después de renderizar, hacer scroll al indicador específico
  setTimeout(()=>{
    const el=document.getElementById('ind-card-'+indId);
    if(el){
      el.scrollIntoView({behavior:'smooth',block:'center'});
      el.style.outline='2px solid var(--accent)';
      setTimeout(()=>el.style.outline='',2000);
    }
  },800);
}

async function renderCalendario(){
  const main=document.getElementById('main-content');
  main.innerHTML='<div class="loading">Cargando...</div>';

  const hoy=new Date();
  const anio=hoy.getFullYear();
  const mesActual=hoy.getMonth(); // 0-based

  // Cargar indicadores con vencimientos
  const{data:indicadores}=await sb.from('indicadores')
    .select('*').eq('activo',true).order('categoria').order('orden');

  // Generar todos los vencimientos del año (solo de los indicadores que la persona ve)
  const vencimientos=[];
  (indicadores||[]).forEach(ind=>{
    if(!esMiIndicador(ind.id)) return; // mismo criterio que el cartel de alertas
    const fechas=getVencimientosAnio(ind, anio);
    fechas.forEach(f=>vencimientos.push({...ind, fecha_venc:f}));
  });

  // Cargar entries del año para saber cuáles ya fueron cargados
  const{data:entries}=await sb.from('entries')
    .select('indicador_id,periodo_fecha,user_id')
    .gte('periodo_fecha', `${anio}-01-01`)
    .lte('periodo_fecha', `${anio}-12-31`);
  const cargados=new Set((entries||[]).map(e=>e.indicador_id+'_'+e.periodo_fecha));

  // Agrupar por mes
  const porMes={};
  for(let m=0;m<12;m++) porMes[m]=[];
  vencimientos.forEach(v=>{
    const mes=v.fecha_venc.getMonth();
    if(porMes[mes]) porMes[mes].push(v);
  });

  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // Próximos vencimientos (30 días)
  const en30dias=new Date(hoy); en30dias.setDate(en30dias.getDate()+30);
  const proximos=vencimientos.filter(v=>v.fecha_venc>=hoy&&v.fecha_venc<=en30dias)
    .sort((a,b)=>a.fecha_venc-b.fecha_venc);

  // Vencidos sin cargar
  const vencidosSinCargar=vencimientos.filter(v=>{
    if(v.fecha_venc>hoy) return false;
    const periodoKey=v.id+'_'+v.fecha_venc.toISOString().split('T')[0];
    return !cargados.has(periodoKey);
  });

  main.innerHTML=`
    <div class="section-heading">Calendario de vencimientos</div>
    <div class="section-sub">${anio} · ${indicadores?.length||0} indicadores configurados</div>

    ${vencidosSinCargar.length>0?`
    <div class="alert alert-danger" style="margin-bottom:1rem">
      ⚠ <strong>${vencidosSinCargar.length} indicador${vencidosSinCargar.length>1?'es':''}</strong> vencido${vencidosSinCargar.length>1?'s':''} sin cargar
    </div>`:''}

    ${proximos.length>0?`
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-title">⏰ Próximos 30 días (${proximos.length} vencimientos)</div>
      ${proximos.slice(0,10).map(v=>{
        const diasRestantes=Math.ceil((v.fecha_venc-hoy)/(1000*60*60*24));
        const urgente=diasRestantes<=7;
        return`<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.83rem">
          <span style="min-width:90px;font-weight:500;color:${urgente?'var(--danger)':'var(--warning)'}">
            ${v.fecha_venc.toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}
          </span>
          <span style="flex:1;color:var(--text);cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px" onclick="irACarga('${v.categoria}','${v.id}')" title="Ir a cargar">${v.nombre}</span>
          <span class="badge badge-na">${CAT_LABELS[v.categoria]||v.categoria}</span>
          <span style="font-size:.75rem;color:${urgente?'var(--danger)':'var(--muted)'}">
            ${diasRestantes===0?'Hoy':diasRestantes===1?'Mañana':`En ${diasRestantes} días`}
          </span>
        </div>`;
      }).join('')}
      ${proximos.length>10?`<div style="font-size:.78rem;color:var(--muted);margin-top:.5rem">Y ${proximos.length-10} más...</div>`:''}
    </div>`:''}

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">
      ${MESES.map((mes,idx)=>{
        const esMesActual=idx===mesActual;
        const esPasado=idx<mesActual;
        const venc=porMes[idx]||[];
        const cargadosDelMes=venc.filter(v=>cargados.has(v.id+'_'+v.fecha_venc.toISOString().split('T')[0])).length;
        const pendientes=venc.length-cargadosDelMes;

        return`<div class="card" style="${esMesActual?'border-color:var(--accent);':esPasado?'opacity:0.7':''}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
            <div style="font-weight:500;font-size:.95rem;color:${esMesActual?'var(--accent)':'var(--text)'}">${mes} ${anio}</div>
            <div style="display:flex;gap:.4rem">
              ${venc.length>0?`<span class="badge badge-na">${venc.length} venc.</span>`:''}
              ${pendientes>0&&!esPasado?`<span class="badge badge-pend">${pendientes} pend.</span>`:''}
              ${cargadosDelMes>0?`<span class="badge badge-ok">${cargadosDelMes} ✓</span>`:''}
            </div>
          </div>
          ${venc.length===0?`<div style="font-size:.78rem;color:var(--muted);text-align:center;padding:.5rem 0">Sin vencimientos</div>`:
            venc.sort((a,b)=>a.fecha_venc-b.fecha_venc).map(v=>{
              const key=v.id+'_'+v.fecha_venc.toISOString().split('T')[0];
              const cargado=cargados.has(key);
              const vencido=v.fecha_venc<hoy&&!cargado;
              return`<div style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid var(--border);font-size:.78rem">
                <span style="min-width:28px;color:var(--muted);font-weight:500">${v.fecha_venc.getDate()}</span>
                <span style="flex:1;color:${vencido?'var(--danger)':cargado?'var(--muted)':'var(--text)'};${cargado?'text-decoration:line-through':''}"
                  ${!cargado?`onclick="irACarga('${v.categoria}','${v.id}')" style="cursor:pointer;${vencido?'color:var(--danger)':'color:var(--text)'};text-decoration:underline dotted;text-underline-offset:2px" title="Ir a cargar este indicador"`:''}
                >${v.nombre}</span>
                ${cargado?'<span style="color:var(--success);font-size:.75rem">✓</span>':
                  vencido?'<span style="color:var(--danger);font-size:.75rem">●</span>':'<span style="color:var(--muted);font-size:.75rem;cursor:pointer" onclick="irACarga(\''+v.categoria+'\',\''+v.id+'\')">→</span>'}
              </div>`;
            }).join('')}
        </div>`;
      }).join('')}
    </div>`;
}

function getVencimientosAnio(ind, anio){
  const fechas=[];
  const dia=ind.vencimiento_dia||15;

  if(ind.periodicidad==='mensual'||ind.periodicidad==='semanal'){
    // Mensual: vence día 5 de cada mes
    for(let m=0;m<12;m++){
      fechas.push(new Date(anio,m,dia));
    }
  } else if(ind.periodicidad==='trimestral'){
    // Vence el 15 de abril, julio, octubre, enero
    [[0,15],[3,15],[6,15],[9,15]].forEach(([m,d])=>{
      const f=new Date(anio,m+3===12?0:m+3, d);
      if(m+3===12) f.setFullYear(anio+1);
      fechas.push(new Date(anio, m===9?0:m+3, d));
    });
    // Simplificado: 15 de cada mes que cierra trimestre
    fechas.length=0;
    [3,6,9].forEach(m=>fechas.push(new Date(anio,m,15)));
    fechas.push(new Date(anio+1,0,15));
  } else if(ind.periodicidad==='semestral'){
    const tipo=ind.periodo_inicio||'semestral_ene_dic';
    if(tipo==='semestral_ago_feb'){
      fechas.push(new Date(anio,1,15));  // 15 febrero
      fechas.push(new Date(anio,7,15));  // 15 agosto
    } else {
      fechas.push(new Date(anio,2,15));  // 15 marzo
      fechas.push(new Date(anio,8,15));  // 15 septiembre
    }
  } else if(ind.periodicidad==='anual'){
    const mes=(ind.vencimiento_mes||3)-1; // 0-based
    fechas.push(new Date(anio,mes,dia));
    // Si el período es julio-junio, vence en septiembre
    if(ind.periodo_inicio==='julio') fechas.push(new Date(anio,8,15));
  }

  return fechas.filter(f=>!isNaN(f.getTime()));
}

// El encargado usa la tabla de objetivos según su zona de evaluación:
// Prov. Bs As -> A_sur, Norte -> A_norte, Mendoza -> A_mendoza (todavía sin tabla).
// Cualquier otro puesto usa su propio código como clave.
function claveObjetivos(emp){
  if(emp.puesto_codigo==='encargado'){
    const Z={'Prov. Bs As':'A_sur','Norte':'A_norte','Mendoza':'A_mendoza'};
    return Z[emp.zona_evaluacion]||null;
  }
  return emp.puesto_codigo;
}

// Nadie se evalúa a sí mismo: detecta si un empleado es el propio usuario.
// Prioriza el vínculo directo (empleados.user_id); si ese empleado no está vinculado, cae al nombre.
function esMiPropioEmpleado(emp){
  if(!emp||!currentProfile)return false;
  if(emp.user_id)return emp.user_id===currentUser.id;
  return normalizarTexto(emp.nombre)===normalizarTexto(currentProfile.nombre)
      && normalizarTexto(emp.apellido||'')===normalizarTexto(currentProfile.apellido||'');
}
// Devuelve el registro de empleado del usuario actual (por vínculo directo, o por nombre como respaldo)
function miEmpleadoRecord(empleados){
  if(!empleados||!currentProfile)return null;
  return empleados.find(e=>e.user_id&&e.user_id===currentUser.id)
      || empleados.find(e=>normalizarTexto(e.nombre)===normalizarTexto(currentProfile.nombre)&&normalizarTexto(e.apellido||'')===normalizarTexto(currentProfile.apellido||''))
      || null;
}

// Calcular porcentaje actitudinal según tabla
function calcPorcentajeActitudinal(puntaje, esLider){
  if(esLider){
    if(puntaje<22) return 50;
    if(puntaje<=33) return 40;
    if(puntaje<=40) return 30;
    return 0;
  } else {
    if(puntaje<17) return 50;
    if(puntaje<=22) return 40;
    if(puntaje<=37) return 30;
    return 0;
  }
}

// Calcular porcentaje por objetivos según tabla
function calcPorcentajeObjetivos(puntaje, esLider){
  if(esLider){
    if(puntaje<=7) return 0;
    if(puntaje<=11) return 20;
    if(puntaje<=16) return 30;
    if(puntaje<=23) return 40;
    return 50;
  } else {
    if(puntaje<=4) return 0;
    if(puntaje<=8) return 20;
    if(puntaje<=14) return 30;
    if(puntaje<=17) return 40;
    return 50;
  }
}

function calcBono(sueldo, pctActitudinal, pctObjetivos, esLider){
  const bonMax=esLider?3:1.5;
  return sueldo * bonMax * (pctActitudinal/100 + pctObjetivos/100);
}

function getPeriodoActual(){
  const hoy=new Date();
  const mes=hoy.getMonth()+1;
  const anio=hoy.getFullYear();
  if(mes>=5&&mes<=7) return{periodo:`junio_${anio}`,anio,semestre:1,label:`Junio ${anio}`};
  return{periodo:`diciembre_${anio}`,anio,semestre:2,label:`Diciembre ${anio}`};
}

function renderRRHHEvaluar(empleados,evalsPorEmpleado,periodo,idsQueEvaluo){
  idsQueEvaluo=idsQueEvaluo||new Set();
  if(empleados.length===0) return`<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No tenés empleados asignados para evaluar.</div></div>`;
  return`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem">
    ${empleados.map(emp=>{
      const evs=evalsPorEmpleado[emp.id]||[];
      const miEval=evs.find(e=>e.evaluador_user_id===currentUser.id);
      const estado=miEval?.estado||'pendiente';
      const yoEvaluo=idsQueEvaluo.has(emp.id);
      let badgeClass='badge-pend',badgeLabel='Pendiente';
      if(estado==='aprobado'){badgeClass='badge-ok';badgeLabel='Aprobado';}
      else if(estado==='enviado'){badgeClass='badge-info';badgeLabel='Enviado';}
      else if(estado==='borrador'){badgeClass='badge-na';badgeLabel='Borrador';}
      // Estado general (para las tarjetas que el directivo solo mira): el más avanzado entre los evaluadores reales
      const rank={pendiente:0,borrador:1,enviado:2,aprobado:3};
      let genEstado='pendiente';
      evs.forEach(e=>{ if((rank[e.estado]??0)>(rank[genEstado]??0)) genEstado=e.estado; });
      let genCls='badge-pend',genLabel='Pendiente';
      if(genEstado==='aprobado'){genCls='badge-ok';genLabel='Aprobada';}
      else if(genEstado==='enviado'){genCls='badge-info';genLabel='Enviada';}
      else if(genEstado==='borrador'){genCls='badge-na';genLabel='En borrador';}
      const esLider=PUESTOS_LIDERAZGO.includes(emp.puesto_codigo);
      return`<div class="puesto-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem">
          <div>
            <div style="font-size:.9rem;font-weight:500;color:var(--text)">${emp.nombre} ${emp.apellido||''}</div>
            <div style="font-size:.75rem;color:var(--muted)">${emp.puesto_descripcion||''} · ${emp.area||''}</div>
            ${esLider?`<span class="badge badge-info" style="margin-top:4px;font-size:.68rem">Encargado/Responsable</span>`:''}
          </div>
          ${yoEvaluo?`<span class="badge ${badgeClass}">${badgeLabel}</span>`:`<div style="text-align:right"><span class="badge ${genCls}">${genLabel}</span><div style="font-size:.62rem;color:var(--muted);margin-top:3px">solo lectura${evs.length>1?` · ${evs.length} evaluadores`:''}</div></div>`}
        </div>
        ${yoEvaluo&&miEval&&miEval.bono_calculado?`
          <div style="font-size:.78rem;margin-bottom:.5rem">
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Puntaje actitudinal</span><span>${miEval.puntaje_actitudinal} pts → ${miEval.porcentaje_actitudinal}%</span></div>
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Puntaje objetivos</span><span>${miEval.puntaje_objetivos} pts → ${miEval.porcentaje_objetivos}%</span></div>
            <div style="display:flex;justify-content:space-between;font-weight:500;margin-top:4px"><span style="color:var(--muted)">Bono calculado</span><span style="color:var(--accent)">$${miEval.bono_calculado.toLocaleString('es-AR')}</span></div>
          </div>`:''}
        ${yoEvaluo
          ? `<button class="btn btn-accent btn-sm" style="width:100%" onclick="abrirEvaluacion('${emp.id}')">
              ${estado==='pendiente'?'Iniciar evaluación':estado==='borrador'?'Continuar evaluación':estado==='enviado'?'Ver evaluación enviada':'Ver evaluación aprobada'}
            </button>`
          : `<button class="btn btn-sm" style="width:100%;color:var(--muted)" onclick="abrirEvaluacion('${emp.id}')">
              Ver evaluación
            </button>`}
      </div>`;
    }).join('')}
  </div>`;
}

const PUESTOS_ENCARGADO_CAMPO=['encargado'];
const PUESTOS_CAMPO_AUTOMATICOS=['capataz','peon','puestero','tractorista'];

// Dado un empleado y la lista completa, determina si tiene evaluador FIJO
// (evaluadores_empleado), AUTOMÁTICO (por rol de campo), o NINGUNO.
function resolverTipoEvaluador(emp, todosEmpleados, evaluadoresFijosMap){
  const fijos=evaluadoresFijosMap[emp.id]||[];
  if(fijos.length>0)return{tipo:'fijo',nombres:fijos.map(f=>f.nombre).join(' y ')};
  if(PUESTOS_CAMPO_AUTOMATICOS.includes(emp.puesto_codigo)){
    const encargado=todosEmpleados.find(e=>PUESTOS_ENCARGADO_CAMPO.includes(e.puesto_codigo)&&e.unidad_negocio===emp.unidad_negocio);
    if(encargado)return{tipo:'automatico',nombres:`${encargado.nombre} ${encargado.apellido||''}`.trim()};
  }
  return{tipo:'ninguno',nombres:null};
}

async function renderPrepararRonda(panel,todosEmpleados,periodo){
  panel.innerHTML='<div class="loading">Cargando...</div>';

  const[{data:evaluadoresFijos},{data:profilesData},{data:asignacionesPeriodo},{data:participantes}]=await Promise.all([
    sb.from('evaluadores_empleado').select('empleado_id,evaluador_user_id,profiles(nombre,apellido)').eq('activo',true),
    sb.from('profiles').select('id,nombre,apellido').order('apellido'),
    sb.from('evaluadores_periodo').select('*').eq('periodo',periodo.periodo),
    sb.from('participantes_ronda').select('*').eq('periodo',periodo.periodo)
  ]);

  const evaluadoresFijosMap={};
  (evaluadoresFijos||[]).forEach(r=>{
    if(!evaluadoresFijosMap[r.empleado_id])evaluadoresFijosMap[r.empleado_id]=[];
    evaluadoresFijosMap[r.empleado_id].push({id:r.evaluador_user_id,nombre:`${r.profiles?.nombre||''} ${r.profiles?.apellido||''}`.trim()});
  });
  const asignacionPeriodoMap={};
  (asignacionesPeriodo||[]).forEach(a=>{asignacionPeriodoMap[a.empleado_id]=a.evaluador_user_id;});
  const participaMap={};
  (participantes||[]).forEach(p=>{participaMap[p.empleado_id]=p.participa;});

  const filas=(todosEmpleados||[]).map(emp=>{
    const resuelto=resolverTipoEvaluador(emp,todosEmpleados,evaluadoresFijosMap);
    const asignacionManual=asignacionPeriodoMap[emp.id]||'';
    const participa=participaMap[emp.id]!==undefined?participaMap[emp.id]:true; // default abierto
    return{emp,resuelto,asignacionManual,participa};
  });

  const sinAsignar=filas.filter(f=>f.resuelto.tipo==='ninguno'&&!f.asignacionManual).length;

  panel.innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Preparar ronda — ${periodo.label}</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:1rem">
        Asigná evaluador a quienes no tienen uno fijo o automático, y elegí quién entra a esta ronda.
        Esto se define de nuevo cada período — no afecta rondas anteriores ni futuras.
      </div>
      <div style="display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap">
        <input type="text" class="form-input" id="prep-busqueda" placeholder="Buscar empleado..." style="flex:1;min-width:160px" oninput="prepFiltrar()"/>
        <select class="form-select" id="prep-filtro-area" style="width:auto" onchange="prepFiltrar()">
          <option value="">Todas las áreas</option>
          ${[...new Set((todosEmpleados||[]).map(e=>e.area).filter(Boolean))].sort().map(a=>`<option value="${a}">${a}</option>`).join('')}
        </select>
        <select class="form-select" id="prep-filtro-sin-asignar" style="width:auto" onchange="prepFiltrar()">
          <option value="">Todos</option>
          <option value="sin">Sin evaluador asignado</option>
        </select>
      </div>
      <div class="table-wrap" style="overflow-x:auto">
        <table style="font-size:.8rem" id="prep-tabla">
          <thead><tr>
            <th>Empleado</th><th>Puesto</th><th>Evaluador este período</th><th style="text-align:center">Entra a la ronda</th>
          </tr></thead>
          <tbody>
            ${filas.map(f=>`
              <tr data-area="${f.emp.area||''}" data-sin-asignar="${f.resuelto.tipo==='ninguno'&&!f.asignacionManual?'1':'0'}" data-nombre="${(f.emp.nombre+' '+(f.emp.apellido||'')).toLowerCase()}">
                <td><strong>${f.emp.nombre} ${f.emp.apellido||''}</strong></td>
                <td style="color:var(--muted)">${f.emp.puesto_descripcion||'—'}</td>
                <td>${prepCeldaEvaluador(f)}</td>
                <td style="text-align:center"><input type="checkbox" ${f.participa?'checked':''} onchange="prepGuardarParticipacion('${f.emp.id}','${periodo.periodo}',this.checked)"/></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);margin-top:1rem">
        <span style="color:#1A4A6B">↻ auto = por rol de campo</span>
        <span style="color:#1A4A2A">✓ fijo = asignación permanente</span>
        <span style="color:${sinAsignar>0?'#D4890A':'var(--muted)'}">${sinAsignar>0?`⚠ ${sinAsignar} sin asignar todavía`:'✓ todos tienen evaluador'}</span>
      </div>
    </div>`;
  prepPoblarSelectsEvaluador(profilesData||[],asignacionPeriodoMap);
}

function prepCeldaEvaluador(f){
  if(f.resuelto.tipo==='fijo')return`<span class="badge badge-ok">✓ ${f.resuelto.nombres} (fijo)</span>`;
  if(f.resuelto.tipo==='automatico')return`<span class="badge badge-pend">↻ ${f.resuelto.nombres} (auto)</span>`;
  return`<select class="form-select prep-select-evaluador" data-emp="${f.emp.id}" style="height:30px;font-size:.78rem;${!f.asignacionManual?'border-color:#D4890A;background:#FEF3CD':''}" onchange="prepGuardarAsignacion(this)">
    <option value="">— Sin asignar —</option>
  </select>`;
}

// Las opciones del select de evaluadores se completan después de renderizar
// (para no repetir el HTML de <option> 91 veces innecesariamente en cada fila)
function prepPoblarSelectsEvaluador(profilesData,asignacionPeriodoMap){
  document.querySelectorAll('.prep-select-evaluador').forEach(sel=>{
    const empId=sel.dataset.emp;
    const actual=asignacionPeriodoMap[empId]||'';
    profilesData.forEach(p=>{
      const opt=document.createElement('option');
      opt.value=p.id;
      opt.textContent=`${p.nombre} ${p.apellido||''}`.trim();
      if(p.id===actual)opt.selected=true;
      sel.appendChild(opt);
    });
  });
}

async function prepGuardarAsignacion(select){
  const empId=select.dataset.emp;
  const evaluadorId=select.value;
  const periodo=window._rrhhData.periodo.periodo;
  if(!evaluadorId){
    await sb.from('evaluadores_periodo').delete().eq('empleado_id',empId).eq('periodo',periodo);
  }else{
    await sb.from('evaluadores_periodo').upsert({empleado_id:empId,evaluador_user_id:evaluadorId,periodo},{onConflict:'empleado_id,periodo'});
  }
  select.style.borderColor=evaluadorId?'':'var(--warning)';
  select.style.background=evaluadorId?'':'var(--warning-bg)';
}

async function prepGuardarParticipacion(empId,periodo,participa){
  await sb.from('participantes_ronda').upsert({empleado_id:empId,periodo,participa},{onConflict:'empleado_id,periodo'});
}

function prepFiltrar(){
  const texto=document.getElementById('prep-busqueda').value.toLowerCase();
  const area=document.getElementById('prep-filtro-area').value;
  const soloSinAsignar=document.getElementById('prep-filtro-sin-asignar').value==='sin';
  document.querySelectorAll('#prep-tabla tbody tr').forEach(tr=>{
    const matchTexto=!texto||tr.dataset.nombre.includes(texto);
    const matchArea=!area||tr.dataset.area===area;
    const matchSinAsignar=!soloSinAsignar||tr.dataset.sinAsignar==='1';
    tr.style.display=(matchTexto&&matchArea&&matchSinAsignar)?'':'none';
  });
}

async function guardarEmpleado(){
  const msgEl=document.getElementById('msg-modal-emp');
  const id=document.getElementById('emp-edit-id').value;
  const nombre=document.getElementById('emp-nombre').value.trim();
  const apellido=document.getElementById('emp-apellido').value.trim();
  const unidad=document.getElementById('emp-unidad').value;
  const puesto=document.getElementById('emp-puesto').value;
  const puestoDesc=document.getElementById('emp-puesto-desc').value.trim();
  const ingreso=document.getElementById('emp-ingreso').value||null;
  if(!nombre){msgEl.textContent='El nombre es obligatorio.';msgEl.style.color='var(--danger)';return;}
  if(!unidad){msgEl.textContent='Elegí la Unidad de Negocio.';msgEl.style.color='var(--danger)';return;}
  // La zona de evaluación se deriva de la unidad (Administración/Personal GQ no tienen)
  const ZONA_POR_UNIDAD={'Corrientes':'Norte','Oeste':'Prov. Bs As','Tandil':'Prov. Bs As','Mar del Plata':'Prov. Bs As','Mendoza':'Mendoza'};
  const zona=ZONA_POR_UNIDAD[unidad]||null;
  msgEl.textContent='Guardando...';msgEl.style.color='var(--muted)';
  let error;
  if(id){
    ({error}=await sb.from('empleados').update({nombre,apellido,unidad_negocio:unidad,zona_evaluacion:zona,puesto_codigo:puesto,puesto_descripcion:puestoDesc,fecha_ingreso:ingreso}).eq('id',id));
  }else{
    ({error}=await sb.from('empleados').insert({nombre,apellido,area:unidad,unidad_negocio:unidad,zona_evaluacion:zona,puesto_codigo:puesto,puesto_descripcion:puestoDesc,fecha_ingreso:ingreso,activo:true}));
  }
  if(error){msgEl.textContent='Error: '+error.message;msgEl.style.color='var(--danger)';}
  else{document.getElementById('modal-empleado').style.display='none';renderRRHH();}
}

function confirmarBajaEmpleado(id,nombre){

  document.getElementById('confirm-emp-msg').textContent=`"${nombre}" quedará inactivo. No se borrará su historial de evaluaciones.`;

}

    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Total empleados</div><div class="metric-value">${total}</div></div>
      <div class="metric-card"><div class="metric-label">Evaluados</div><div class="metric-value" style="color:var(--success)">${evaluados}</div></div>

        return`<tr>
          <td><strong>${e.nombre} ${e.apellido||''}</strong></td>
          <td style="color:var(--muted);font-size:.82rem">${e.puesto_descripcion||'—'}</td>
          <td style="color:var(--muted)">${e.area||'—'}</td>

}
