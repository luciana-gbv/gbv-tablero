<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBV · Tablero de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:        #F5F3EE;
  --surface:   #FFFFFF;
  --border:    #E2DDD6;
  --text:      #1A1916;
  --muted:     #7A7570;
  --accent:    #2D5A3D;
  --accent2:   #8B4513;
  --danger:    #C0392B;
  --warning:   #D4890A;
  --success:   #2D5A3D;
  --info:      #1A4A6B;
  --font-disp: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius:    10px;
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 2.5rem; width: 100%; max-width: 380px;
  box-shadow: var(--shadow);
}
.login-logo { font-family: var(--font-disp); font-size: 2rem; color: var(--accent); margin-bottom: 0.25rem; }
.login-sub  { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: 0.08em; text-transform: uppercase; }
.login-card label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.04em; }
.login-card input {
  width: 100%; padding: 0.65rem 0.9rem; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: var(--font-body); font-size: 0.9rem;
  background: var(--bg); color: var(--text); outline: none; margin-bottom: 1rem;
  transition: border-color 0.15s;
}
.login-card input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 0.7rem; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius); font-family: var(--font-body);
  font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }
.login-error { font-size: 0.8rem; color: var(--danger); margin-top: 0.75rem; text-align: center; }

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* TOPBAR */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; height: 56px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 100;
}
.topbar-brand { font-family: var(--font-disp); font-size: 1.25rem; color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.topbar-user { font-size: 0.8rem; color: var(--muted); }
.badge-role {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; font-weight: 500;
  background: #E8F0EB; color: var(--accent);
}
.btn-logout {
  font-size: 0.8rem; padding: 4px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: transparent; cursor: pointer;
  color: var(--muted); font-family: var(--font-body); transition: all 0.15s;
}
.btn-logout:hover { background: var(--bg); color: var(--text); }

/* NAV */
.nav-tabs {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; display: flex; gap: 0; overflow-x: auto;
}
.nav-tab {
  padding: 0.85rem 1.1rem; font-size: 0.85rem; font-weight: 500; color: var(--muted);
  border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; font-family: var(--font-body); transition: all 0.15s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* MAIN CONTENT */
.main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }

/* SECTION TITLE */
.section-heading {
  font-family: var(--font-disp); font-size: 1.5rem; color: var(--text);
  margin-bottom: 0.25rem;
}
.section-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem;
  box-shadow: var(--shadow);
}
.card-title { font-size: 0.8rem; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1rem; }

/* METRIC CARDS */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
.metric-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
.metric-value { font-family: var(--font-disp); font-size: 1.8rem; color: var(--text); line-height: 1; }
.metric-sub { font-size: 0.75rem; margin-top: 0.3rem; }
.up   { color: var(--success); }
.down { color: var(--danger); }
.neutral { color: var(--muted); }

/* ALERT BANNER */
.alert {
  padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.85rem;
  margin-bottom: 1rem; display: flex; align-items: flex-start; gap: 0.6rem;
}
.alert-warning { background: #FEF3CD; color: #7A5A00; border: 1px solid #F5D97E; }
.alert-danger  { background: #FDECEA; color: #8B1C1C; border: 1px solid #F5B7B1; }
.alert-success { background: #E8F5EC; color: #1A4A2A; border: 1px solid #A8D5B5; }
.alert-info    { background: #E8F0F8; color: #1A3A5C; border: 1px solid #A8C4DE; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { text-align: left; padding: 0.6rem 0.9rem; font-size: 0.72rem; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
td { padding: 0.75rem 0.9rem; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* BADGES */
.badge {
  display: inline-block; font-size: 0.7rem; padding: 2px 8px;
  border-radius: 20px; font-weight: 500; white-space: nowrap;
}
.badge-ok      { background: #E8F5EC; color: #1A4A2A; }
.badge-pend    { background: #FEF3CD; color: #7A5A00; }
.badge-late    { background: #FDECEA; color: #8B1C1C; }
.badge-na      { background: var(--bg); color: var(--muted); }

/* FORMS */
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 0.35rem; letter-spacing: 0.03em; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 0.6rem 0.85rem; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: var(--font-body); font-size: 0.88rem;
  background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); background: #fff; }
.form-textarea { min-height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
.auto-result {
  font-size: 0.85rem; font-weight: 500; color: var(--accent);
  background: #E8F0EB; padding: 0.4rem 0.75rem; border-radius: var(--radius);
  display: inline-block; margin-top: 0.4rem;
}

/* BUTTONS */
.btn {
  padding: 0.6rem 1.1rem; border-radius: var(--radius); font-family: var(--font-body);
  font-size: 0.85rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); transition: all 0.15s;
}
.btn:hover { background: var(--bg); }
.btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-accent:hover { opacity: 0.88; background: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.78rem; }

/* SIDEBAR LAYOUT */
.two-col { display: grid; grid-template-columns: 220px 1fr; gap: 1.5rem; }
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
.sidebar-item {
  padding: 0.6rem 0.85rem; border-radius: var(--radius); font-size: 0.85rem;
  color: var(--muted); cursor: pointer; border: none; background: transparent;
  text-align: left; font-family: var(--font-body); transition: all 0.12s; display: flex;
  align-items: center; justify-content: space-between;
}
.sidebar-item:hover { background: var(--bg); color: var(--text); }
.sidebar-item.active { background: #E8F0EB; color: var(--accent); font-weight: 500; }
.sidebar-section { font-size: 0.7rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0.75rem 0.85rem 0.3rem; }
.pending-count { font-size: 0.68rem; padding: 1px 6px; border-radius: 10px; background: #FEF3CD; color: #7A5A00; }

/* INDICATOR FORM CARD */
.ind-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.1rem 1.25rem; margin-bottom: 0.75rem;
}
.ind-card.done { border-color: #A8D5B5; background: #F4FAF6; }
.ind-name { font-size: 0.9rem; font-weight: 500; color: var(--text); margin-bottom: 0.25rem; }
.ind-meta { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
.pill { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--bg); color: var(--muted); }
.pill-alert { background: #FDECEA; color: #8B1C1C; }
.ind-formula { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; font-style: italic; }
.upload-zone {
  border: 1px dashed var(--border); border-radius: var(--radius); padding: 0.75rem 1rem;
  text-align: center; font-size: 0.82rem; color: var(--muted); cursor: pointer;
  transition: all 0.15s;
}
.upload-zone:hover { border-color: var(--accent); color: var(--accent); background: #F4FAF6; }
.thumbs-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
.btn-visto {
  display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem;
  padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; cursor: pointer; color: var(--muted); font-family: var(--font-body); transition: all 0.15s;
}
.btn-visto.active { background: #E8F5EC; color: var(--success); border-color: #A8D5B5; }
.visto-count { font-size: 0.75rem; color: var(--muted); }

/* LOCKED SECTION */
.locked { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.locked-icon { font-size: 2rem; margin-bottom: 0.75rem; }

/* PROGRESS */
.progress-wrap { margin-bottom: 1.25rem; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
.progress-bg { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; border: 1px solid var(--border); }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

/* BAR CHART SIMPLE */
.bar-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; font-size: 0.83rem; }
.bar-label { min-width: 130px; color: var(--text); }
.bar-bg { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
.bar-fill { height: 100%; border-radius: 4px; }
.bar-val { min-width: 50px; text-align: right; font-weight: 500; color: var(--text); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* STATUS DOTS */
.dot-green  { background: var(--success); }
.dot-amber  { background: var(--warning); }
.dot-red    { background: var(--danger); }

/* CHIPS */
.chip-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.chip {
  font-size: 0.78rem; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent; cursor: pointer;
  color: var(--muted); transition: all 0.12s; font-family: var(--font-body);
}
.chip.active { background: #E8F0EB; color: var(--accent); border-color: #A8D5B5; }

/* LOADING */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

/* TABS */
.tab-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.tab-btn {
  font-size: 0.82rem; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent; cursor: pointer;
  color: var(--muted); font-family: var(--font-body); transition: all 0.12s;
}
.tab-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* RESPONSIVE */
@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GBV</div>
    <div class="login-sub">Tablero de Comando</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">GBV</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-name"></span>
      <span class="badge-role" id="topbar-role"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="nav-tabs" id="nav-tabs"></div>

  <div class="main" id="main-content">
    <div class="loading">Cargando...</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIG SUPABASE
// ══════════════════════════════════════════════
const SUPA_URL = 'https://qwnlwpvpmlthshtofkzr.supabase.co';
const SUPA_KEY = 'sb_publishable_Wcf8KQPElBsMKmRF3kaD8Q_o7k5dXGT';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ══════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════
let currentUser = null;
let currentProfile = null;
let currentTab = 'resumen';
let allCampos = [];
let allUnidades = [];
let selectedCampo = null;
let selectedCat = 'gestion';

const ROL_LABELS = {
  programador: 'Programador',
  directorio: 'Directorio',
  coo: 'COO',
  operativo: 'Operativo',
  encargado_campo: 'Encargado de campo'
};

const CAT_LABELS = {
  gestion: 'Gestión',
  financiero: 'Financiero',
  comercial: 'Comercial',
  productivo_global: 'Productivo · Global',
  productivo_cria: 'Productivo · Cría',
  productivo_recria: 'Productivo · Recría',
  productivo_feedlot: 'Productivo · Feedlot',
  alimenticio: 'Alimenticio',
  sanitario: 'Sanitario',
  mejoramiento_genetico: 'Mejoramiento genético',
  ecologia: 'Ecología',
  rrhh: 'RRHH'
};

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Completá email y contraseña.'; return; }

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { errEl.textContent = 'Email o contraseña incorrectos.'; return; }
  await initApp(data.user);
}

async function doLogout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  currentUser = null; currentProfile = null;
}

async function initApp(user) {
  currentUser = user;
  const { data: profile } = await sb.data.from('profiles').select('*').eq('id', user.id).single().catch(() =>
    sb.from('profiles').select('*').eq('id', user.id).single()
  );

  // workaround — use sb directly
  const res = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = res.data;

  if (!currentProfile) {
    document.getElementById('login-error').textContent = 'No se encontró tu perfil. Contactá al administrador.';
    return;
  }

  // Cargar datos maestros
  const { data: campos } = await sb.from('campos').select('*, unidades_negocio(nombre)');
  const { data: unidades } = await sb.from('unidades_negocio').select('*');
  allCampos = campos || [];
  allUnidades = unidades || [];

  // UI
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('topbar-name').textContent =
    (currentProfile.nombre || '') + ' ' + (currentProfile.apellido || '');
  document.getElementById('topbar-role').textContent = ROL_LABELS[currentProfile.rol] || currentProfile.rol;

  buildNav();
  renderTab('resumen');
}

// ══════════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════════
function buildNav() {
  const rol = currentProfile.rol;
  const tabs = [
    { id: 'resumen',  label: 'Resumen', roles: ['programador','directorio','coo','operativo','encargado_campo'] },
    { id: 'carga',    label: 'Carga de datos', roles: ['programador','operativo','encargado_campo'] },
    { id: 'historico',label: 'Históricos', roles: ['programador','directorio','coo','operativo'] },
    { id: 'admin',    label: 'Administración', roles: ['programador','coo'] },
  ];

  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = '';
  tabs.filter(t => t.roles.includes(rol)).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (t.id === currentTab ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => renderTab(t.id);
    nav.appendChild(btn);
  });
}

function renderTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase().includes(tab.substring(0,4)))
  );
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">Cargando...</div>';
  if (tab === 'resumen')   renderResumen();
  if (tab === 'carga')     renderCarga();
  if (tab === 'historico') renderHistorico();
  if (tab === 'admin')     renderAdmin();
}

// ══════════════════════════════════════════════
//  TAB: RESUMEN
// ══════════════════════════════════════════════
async function renderResumen() {
  const rol = currentProfile.rol;
  const main = document.getElementById('main-content');

  // Cargar entries recientes
  let query = sb.from('entries').select('*, indicadores(nombre,categoria,periodicidad,alerta_min,alerta_max), profiles(nombre,apellido), campos(nombre)').order('created_at', { ascending: false }).limit(50);
  const { data: entries } = await query;

  // Indicadores pendientes (sin entry en el período actual)
  const { data: indicadores } = await sb.from('indicadores').select('*').eq('activo', true);

  main.innerHTML = `
    <div class="section-heading">Resumen</div>
    <div class="section-sub">Vista general · ${new Date().toLocaleDateString('es-AR', {month:'long', year:'numeric'})}</div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Unidades activas</div>
        <div class="metric-value">${allUnidades.length}</div>
        <div class="metric-sub neutral">unidades de negocio</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Campos totales</div>
        <div class="metric-value">${allCampos.length}</div>
        <div class="metric-sub neutral">campos en el sistema</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Indicadores activos</div>
        <div class="metric-value">${indicadores ? indicadores.length : '—'}</div>
        <div class="metric-sub neutral">configurados</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Cargas este mes</div>
        <div class="metric-value">${entries ? entries.filter(e => new Date(e.created_at) > new Date(new Date().setDate(1))).length : '—'}</div>
        <div class="metric-sub up">registros cargados</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Últimas cargas registradas</div>
      ${entries && entries.length > 0 ? `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Indicador</th><th>Categoría</th><th>Valor</th><th>Campo</th><th>Cargado por</th><th>Período</th>
          </tr></thead>
          <tbody>
            ${entries.slice(0,15).map(e => `
            <tr>
              <td>${e.indicadores?.nombre || '—'}</td>
              <td><span class="badge badge-na">${CAT_LABELS[e.indicadores?.categoria] || e.indicadores?.categoria || '—'}</span></td>
              <td><strong>${e.valor !== null ? e.valor : (e.valor_texto ? '📎 archivo' : '—')}</strong></td>
              <td>${e.campos?.nombre || '—'}</td>
              <td>${(e.profiles?.nombre || '') + ' ' + (e.profiles?.apellido || '')}</td>
              <td>${e.periodo_fecha ? new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR') : '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : '<div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem">Todavía no hay cargas registradas.</div>'}
    </div>

    ${(rol === 'directorio' || rol === 'coo' || rol === 'programador') ? `
    <div class="card">
      <div class="card-title">Unidades de negocio</div>
      ${allUnidades.map(u => {
        const campos = allCampos.filter(c => c.unidad_negocio_id === u.id);
        return `<div class="bar-row">
          <span class="dot dot-green"></span>
          <span class="bar-label">${u.nombre}</span>
          <span style="font-size:0.78rem;color:var(--muted)">${campos.length} campo${campos.length !== 1 ? 's' : ''}: ${campos.map(c=>c.nombre).join(', ')}</span>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

// ══════════════════════════════════════════════
//  TAB: CARGA DE DATOS
// ══════════════════════════════════════════════
async function renderCarga() {
  const main = document.getElementById('main-content');
  const rol = currentProfile.rol;

  // Cargar indicadores
  const { data: indicadores } = await sb.from('indicadores').select('*').eq('activo', true).order('orden');
  // Cargar mis campos (si soy encargado)
  let misCampos = allCampos;
  if (rol === 'encargado_campo') {
    const { data: asignados } = await sb.from('encargados_campo').select('campo_id').eq('user_id', currentUser.id).eq('activo', true);
    const ids = (asignados || []).map(a => a.campo_id);
    misCampos = allCampos.filter(c => ids.includes(c.id));
  }

  if (!selectedCampo && misCampos.length > 0) selectedCampo = misCampos[0].id;

  const cats = [...new Set((indicadores || []).map(i => i.categoria))];

  main.innerHTML = `
    <div class="section-heading">Carga de datos</div>
    <div class="section-sub">Completá los indicadores que te corresponden</div>

    <div class="two-col">
      <div>
        <div class="card" style="margin-bottom:0.75rem">
          <div class="card-title">Categorías</div>
          <div class="sidebar-nav" id="cat-nav">
            ${cats.map(c => `
              <button class="sidebar-item ${c === selectedCat ? 'active' : ''}" onclick="selectCat('${c}')">
                ${CAT_LABELS[c] || c}
              </button>`).join('')}
          </div>
        </div>
        ${misCampos.length > 0 ? `
        <div class="card">
          <div class="card-title">Mi campo</div>
          <div class="sidebar-nav">
            ${misCampos.map(c => `
              <button class="sidebar-item ${c.id === selectedCampo ? 'active' : ''}" onclick="selectCampoNav('${c.id}')">
                ${c.nombre}
              </button>`).join('')}
          </div>
        </div>` : ''}
      </div>

      <div id="indicators-panel">
        ${renderIndicadorPanel(indicadores || [], misCampos)}
      </div>
    </div>
  `;
}

function selectCat(cat) {
  selectedCat = cat;
  document.querySelectorAll('.sidebar-item').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (CAT_LABELS[cat] || cat));
  });
  refreshIndicadorPanel();
}

function selectCampoNav(id) {
  selectedCampo = id;
  document.querySelectorAll('.sidebar-item').forEach(b => {
    // re-mark campos
  });
  refreshIndicadorPanel();
}

async function refreshIndicadorPanel() {
  const { data: indicadores } = await sb.from('indicadores').select('*').eq('activo', true).order('orden');
  const rol = currentProfile.rol;
  let misCampos = allCampos;
  if (rol === 'encargado_campo') {
    const { data: asignados } = await sb.from('encargados_campo').select('campo_id').eq('user_id', currentUser.id).eq('activo', true);
    const ids = (asignados || []).map(a => a.campo_id);
    misCampos = allCampos.filter(c => ids.includes(c.id));
  }
  document.getElementById('indicators-panel').innerHTML = renderIndicadorPanel(indicadores || [], misCampos);
}

function renderIndicadorPanel(indicadores, misCampos) {
  const filtered = indicadores.filter(i => i.categoria === selectedCat);
  if (filtered.length === 0) return '<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem">No hay indicadores en esta categoría.</div></div>';

  const campo = misCampos.find(c => c.id === selectedCampo);

  return filtered.map(ind => {
    const locked = (currentProfile.rol === 'encargado_campo') &&
      ['financiero','comercial','rrhh'].includes(ind.categoria);
    if (locked) return '';

    const hasAlert = ind.alerta_min !== null || ind.alerta_max !== null;
    const alertText = ind.alerta_min !== null ? `Alerta si < ${ind.alerta_min}` :
                      ind.alerta_max !== null ? `Alerta si > ${ind.alerta_max}` : '';

    return `
    <div class="ind-card" id="ind-${ind.id}">
      <div class="ind-name">${ind.nombre || 'Sin nombre'}</div>
      <div class="ind-meta">
        <span class="pill">${ind.periodicidad}</span>
        <span class="pill">${ind.unidad_medida}</span>
        ${hasAlert ? `<span class="pill pill-alert">${alertText}</span>` : ''}
      </div>
      ${ind.formula ? `<div class="ind-formula">${ind.formula}</div>` : ''}

      ${renderIndInput(ind, campo)}

      <div style="display:flex;gap:0.5rem;margin-top:0.75rem;align-items:center">
        <div class="form-group" style="margin:0;flex:1">
          <label class="form-label">Período (fecha que corresponde)</label>
          <input type="date" class="form-input" id="fecha-${ind.id}" value="${new Date().toISOString().split('T')[0]}" style="width:auto"/>
        </div>
        <button class="btn btn-accent btn-sm" onclick="guardarEntry('${ind.id}','${campo?.id || ''}')">Guardar</button>
      </div>
      <div id="msg-${ind.id}" style="font-size:0.78rem;margin-top:0.4rem"></div>
    </div>`;
  }).join('');
}

function renderIndInput(ind, campo) {
  const id = ind.id;
  if (ind.requiere_adjunto) {
    return `
      <div class="upload-zone" onclick="document.getElementById('file-${id}').click()">
        &#8679; Adjuntar archivo (PDF, Excel, imagen)
        <input type="file" id="file-${id}" style="display:none" onchange="handleFile('${id}',this)"/>
      </div>
      <div id="file-name-${id}" style="font-size:0.78rem;color:var(--muted);margin-top:0.3rem"></div>`;
  }

  // Indicadores con dos componentes (para cálculo automático)
  const bicomp = ['Cabezas por hectárea','Preñez','Parición','Destete','Reposición','Toros servicio',
    'Carga','Destete precoz','ROE','ROA','Solvencia/Liquidez corriente','Apalancamiento','Endeudamiento Patrimonial'];

  if (bicomp.some(b => ind.nombre && ind.nombre.toLowerCase().includes(b.toLowerCase()))) {
    return `
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor A (numerador)</label>
          <input type="number" class="form-input" id="val-a-${id}" placeholder="0" oninput="calcAuto('${id}')"/>
        </div>
        <div class="form-group">
          <label class="form-label">Valor B (denominador)</label>
          <input type="number" class="form-input" id="val-b-${id}" placeholder="0" oninput="calcAuto('${id}')"/>
          ${ind.nombre.toLowerCase().includes('cabezas por') && campo?.hectareas ?
            `<div class="form-hint">Superficie pre-cargada: <strong>${campo.hectareas} ha</strong></div>` : ''}
        </div>
      </div>
      <div id="auto-${id}"></div>`;
  }

  return `
    <div class="form-group">
      <label class="form-label">Valor</label>
      <input type="number" class="form-input" id="val-${id}" placeholder="Ingresá el valor" step="any"/>
    </div>`;
}

function calcAuto(id) {
  const a = parseFloat(document.getElementById('val-a-'+id)?.value) || 0;
  const b = parseFloat(document.getElementById('val-b-'+id)?.value) || 0;
  const el = document.getElementById('auto-'+id);
  if (el && a && b) {
    const res = (a / b * 100).toFixed(2);
    el.innerHTML = `<span class="auto-result">= ${res}%</span>`;
  } else if (el) { el.innerHTML = ''; }
}

function handleFile(id, input) {
  const f = input.files[0];
  if (f) document.getElementById('file-name-'+id).textContent = '✓ ' + f.name;
}

async function guardarEntry(indicadorId, campoId) {
  const msgEl = document.getElementById('msg-'+indicadorId);
  msgEl.textContent = 'Guardando...';
  msgEl.style.color = 'var(--muted)';

  const fecha = document.getElementById('fecha-'+indicadorId)?.value;
  if (!fecha) { msgEl.textContent = 'Seleccioná una fecha.'; msgEl.style.color = 'var(--danger)'; return; }

  let valor = null, valorA = null, valorB = null;

  const valEl  = document.getElementById('val-'+indicadorId);
  const valAEl = document.getElementById('val-a-'+indicadorId);
  const valBEl = document.getElementById('val-b-'+indicadorId);

  if (valEl)  valor  = parseFloat(valEl.value) || null;
  if (valAEl) valorA = parseFloat(valAEl.value) || null;
  if (valBEl) valorB = parseFloat(valBEl.value) || null;
  if (valorA && valorB) valor = parseFloat((valorA / valorB * 100).toFixed(4));

  const entry = {
    indicador_id:  indicadorId,
    campo_id:      campoId || null,
    user_id:       currentUser.id,
    valor,
    valor_a:       valorA,
    valor_b:       valorB,
    periodo_fecha: fecha,
  };

  const { error } = await sb.from('entries').insert(entry);
  if (error) {
    msgEl.textContent = 'Error al guardar: ' + error.message;
    msgEl.style.color = 'var(--danger)';
  } else {
    msgEl.textContent = '✓ Guardado correctamente';
    msgEl.style.color = 'var(--success)';
    document.getElementById('ind-'+indicadorId)?.classList.add('done');
    setTimeout(() => { msgEl.textContent = ''; }, 3000);
  }
}

// ══════════════════════════════════════════════
//  TAB: HISTÓRICOS
// ══════════════════════════════════════════════
async function renderHistorico() {
  const main = document.getElementById('main-content');
  const { data: indicadores } = await sb.from('indicadores').select('*').eq('activo', true).order('nombre');

  main.innerHTML = `
    <div class="section-heading">Históricos</div>
    <div class="section-sub">Buscá un indicador para ver su evolución</div>
    <div class="card" style="margin-bottom:1rem">
      <div class="form-group">
        <label class="form-label">Indicador</label>
        <select class="form-select" id="hist-ind" onchange="loadHistorico()">
          <option value="">— Seleccioná un indicador —</option>
          ${(indicadores||[]).map(i => `<option value="${i.id}">${i.nombre}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Campo (opcional)</label>
          <select class="form-select" id="hist-campo">
            <option value="">Todos</option>
            ${allCampos.map(c => `<option value="${c.id}">${c.nombre} (${c.unidades_negocio?.nombre || ''})</option>`).join('')}
          </select>
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end">
          <button class="btn btn-accent" onclick="loadHistorico()">Buscar</button>
        </div>
      </div>
    </div>
    <div id="hist-result"></div>
  `;
}

async function loadHistorico() {
  const indId   = document.getElementById('hist-ind').value;
  const campoId = document.getElementById('hist-campo').value;
  const resEl   = document.getElementById('hist-result');
  if (!indId) return;

  resEl.innerHTML = '<div class="loading">Cargando...</div>';

  let query = sb.from('entries')
    .select('*, indicadores(nombre,unidad_medida,alerta_min,alerta_max), campos(nombre), profiles(nombre,apellido)')
    .eq('indicador_id', indId)
    .order('periodo_fecha', { ascending: false });
  if (campoId) query = query.eq('campo_id', campoId);

  const { data: entries, error } = await query;
  if (error || !entries || entries.length === 0) {
    resEl.innerHTML = '<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem">No hay datos registrados para este indicador.</div></div>';
    return;
  }

  const ind = entries[0].indicadores;
  const vals = entries.filter(e => e.valor !== null).map(e => e.valor);
  const media = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : null;
  const max   = vals.length ? Math.max(...vals).toFixed(2) : null;
  const min   = vals.length ? Math.min(...vals).toFixed(2) : null;

  resEl.innerHTML = `
    <div class="metrics-grid" style="margin-bottom:1rem">
      <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${entries.length}</div></div>
      <div class="metric-card"><div class="metric-label">Promedio</div><div class="metric-value">${media ?? '—'}</div><div class="metric-sub neutral">${ind?.unidad_medida||''}</div></div>
      <div class="metric-card"><div class="metric-label">Máximo</div><div class="metric-value">${max ?? '—'}</div></div>
      <div class="metric-card"><div class="metric-label">Mínimo</div><div class="metric-value">${min ?? '—'}</div></div>
    </div>
    <div class="card">
      <div class="card-title">${ind?.nombre || 'Indicador'} — todos los registros</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Período</th><th>Valor</th><th>Campo</th><th>Cargado por</th><th>Estado</th></tr></thead>
          <tbody>
            ${entries.map(e => {
              let estado = '';
              if (e.valor !== null && ind?.alerta_min !== null && e.valor < ind.alerta_min) estado = '<span class="badge badge-late">Bajo mínimo</span>';
              else if (e.valor !== null && ind?.alerta_max !== null && e.valor > ind.alerta_max) estado = '<span class="badge badge-late">Sobre máximo</span>';
              else if (e.valor !== null) estado = '<span class="badge badge-ok">Normal</span>';
              return `<tr>
                <td>${e.periodo_fecha ? new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR') : '—'}</td>
                <td><strong>${e.valor ?? (e.valor_texto ? '📎' : '—')}</strong> ${ind?.unidad_medida||''}</td>
                <td>${e.campos?.nombre || '—'}</td>
                <td>${(e.profiles?.nombre||'')+' '+(e.profiles?.apellido||'')}</td>
                <td>${estado}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  TAB: ADMINISTRACIÓN
// ══════════════════════════════════════════════
async function renderAdmin() {
  const main = document.getElementById('main-content');
  const { data: profiles } = await sb.from('profiles').select('*').order('apellido');
  const { data: indicadores } = await sb.from('indicadores').select('*').eq('activo', true).order('categoria');

  main.innerHTML = `
    <div class="section-heading">Administración</div>
    <div class="section-sub">Usuarios, campos e indicadores del sistema</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="adminTab('usuarios',this)">Usuarios</button>
      <button class="tab-btn" onclick="adminTab('campos',this)">Campos</button>
      <button class="tab-btn" onclick="adminTab('indicadores',this)">Indicadores</button>
    </div>

    <div id="admin-panel">
      ${renderAdminUsuarios(profiles||[])}
    </div>
  `;

  window._adminProfiles = profiles || [];
  window._adminIndicadores = indicadores || [];
}

function adminTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('admin-panel');
  if (tab === 'usuarios')    panel.innerHTML = renderAdminUsuarios(window._adminProfiles);
  if (tab === 'campos')      panel.innerHTML = renderAdminCampos();
  if (tab === 'indicadores') panel.innerHTML = renderAdminIndicadores(window._adminIndicadores);
}

function renderAdminUsuarios(profiles) {
  return `
    <div class="card">
      <div class="card-title">Usuarios del sistema</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th></tr></thead>
          <tbody>
            ${profiles.map(p => `<tr>
              <td>${p.nombre||''} ${p.apellido||''} ${p.iniciales?`<span class="badge badge-na">${p.iniciales}</span>`:''}</td>
              <td style="color:var(--muted)">${p.email}</td>
              <td><span class="badge badge-ok">${ROL_LABELS[p.rol]||p.rol}</span></td>
              <td>${p.activo ? '<span class="badge badge-ok">Activo</span>' : '<span class="badge badge-late">Inactivo</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:1rem;font-size:0.8rem;color:var(--muted)">Para modificar roles o agregar usuarios, usá el SQL Editor de Supabase o avisá al programador.</div>
    </div>`;
}

function renderAdminCampos() {
  return `
    <div class="card">
      <div class="card-title">Campos por unidad de negocio</div>
      ${allUnidades.map(u => {
        const campos = allCampos.filter(c => c.unidad_negocio_id === u.id);
        return `
          <div style="margin-bottom:1rem">
            <div style="font-weight:500;font-size:0.88rem;margin-bottom:0.5rem">${u.nombre}</div>
            ${campos.map(c => `
              <div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem">
                <span style="flex:1">${c.nombre}</span>
                <span style="color:var(--muted)">${c.hectareas ? c.hectareas+' ha' : 'sin ha'}</span>
              </div>`).join('')}
          </div>`;
      }).join('')}
      <div style="margin-top:1rem;font-size:0.8rem;color:var(--muted)">Para cargar ha, rodados, medidores y puestos de cada campo, ejecutá el script de parametrización en Supabase.</div>
    </div>`;
}

function renderAdminIndicadores(indicadores) {
  const cats = [...new Set(indicadores.map(i => i.categoria))];
  return `
    <div class="card">
      <div class="card-title">Indicadores configurados (${indicadores.length})</div>
      ${cats.map(cat => `
        <div style="margin-bottom:1rem">
          <div style="font-weight:500;font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem">${CAT_LABELS[cat]||cat}</div>
          ${indicadores.filter(i=>i.categoria===cat).map(i => `
            <div style="display:flex;align-items:center;gap:0.75rem;padding:0.45rem 0;border-bottom:1px solid var(--border);font-size:0.83rem">
              <span style="flex:1">${i.nombre||'Sin nombre'}</span>
              <span class="pill">${i.periodicidad}</span>
              <span class="pill">${i.unidad_medida}</span>
              ${i.alerta_min!==null?`<span class="pill pill-alert">min: ${i.alerta_min}</span>`:''}
              ${i.alerta_max!==null?`<span class="pill pill-alert">max: ${i.alerta_max}</span>`:''}
            </div>`).join('')}
        </div>`).join('')}
    </div>`;
}
