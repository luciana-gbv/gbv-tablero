async function aprobarBono(empleadoId, periodo, monto){
  const{error}=await sb.from('evaluaciones').update({
    estado:'aprobado', bono_aprobado:monto, bono_rectificado:false,
    aprobado_por:currentUser.id, aprobado_at:new Date().toISOString()
  }).eq('empleado_id',empleadoId).eq('periodo',periodo);
  const el=document.getElementById('msg-aprobar-'+empleadoId);
  if(error){if(el){el.textContent='Error: '+error.message;el.className='msg-err';}}
  else{if(el){el.textContent='✓ Bono aprobado';el.className='msg-ok';}setTimeout(()=>renderRRHH(),1500);}
}

async function rectificarBono(empleadoId, periodo, montoOriginal){
  const nuevo=prompt(`Bono calculado: $${montoOriginal.toLocaleString('es-AR')}\nIngresá el monto rectificado:`);
  if(!nuevo) return;
  const motivo=prompt('Motivo de la rectificación (obligatorio):');
  if(!motivo) return;
  const{error}=await sb.from('evaluaciones').update({
    estado:'aprobado', bono_aprobado:parseFloat(nuevo), bono_rectificado:true,
    motivo_rectificacion:motivo, aprobado_por:currentUser.id, aprobado_at:new Date().toISOString()
  }).eq('empleado_id',empleadoId).eq('periodo',periodo);
  const el=document.getElementById('msg-aprobar-'+empleadoId);
  if(error){if(el){el.textContent='Error: '+error.message;el.className='msg-err';}}
  else{if(el){el.textContent='✓ Bono rectificado y aprobado';el.className='msg-ok';}setTimeout(()=>renderRRHH(),1500);}
}

async function abrirEvaluacion(empleadoId){
  const{misEmpleados,todosEmpleados,evalsPorEmpleado,periodo}=window._rrhhData;
  // Buscar en todos los empleados (directorio puede ver todos)
  const emp=(todosEmpleados||misEmpleados).find(e=>e.id===empleadoId);
  if(!emp) return;

  // Nadie puede hacer su propia evaluación de desempeño
  if(esMiPropioEmpleado(emp)){
    const panel=document.getElementById('rrhh-panel');
    panel.innerHTML=`
      <button class="btn btn-sm" onclick="renderRRHH()" style="margin-bottom:1rem">← Volver</button>
      <div class="card"><div class="locked">
        <div style="font-size:2rem;margin-bottom:.75rem">🔒</div>
        <div style="font-size:.85rem">No podés hacer tu propia evaluación de desempeño.</div>
      </div></div>`;
    return;
  }

  // Verificar que el usuario actual sea evaluador de este empleado (o programador)
  const esProgramador=currentProfile.rol==='programador';
  if(!esProgramador){
    const{data:rel}=await sb.from('evaluadores_empleado')
      .select('id').eq('empleado_id',empleadoId).eq('evaluador_user_id',currentUser.id).eq('activo',true);
    let tieneAcceso=!!(rel&&rel.length>0);

    // Evaluador automático por rol de campo (ver renderRRHH para la explicación completa)
    if(!tieneAcceso){
      const PUESTOS_ENCARGADO=['encargado'];
      const PUESTOS_CAMPO_AUTOMATICOS=['capataz','peon','puestero','tractorista'];
      if(PUESTOS_CAMPO_AUTOMATICOS.includes(emp.puesto_codigo)){
        const todos=todosEmpleados||misEmpleados||[];
        const miEmp=miEmpleadoRecord(todos);
        const miEmpleadoComoEncargado=(miEmp&&PUESTOS_ENCARGADO.includes(miEmp.puesto_codigo))?miEmp:null;
        if(miEmpleadoComoEncargado&&miEmpleadoComoEncargado.unidad_negocio===emp.unidad_negocio){
          tieneAcceso=true;
        }
      }
    }

    if(!tieneAcceso){
      const panel=document.getElementById('rrhh-panel');
      panel.innerHTML=`
        <button class="btn btn-sm" onclick="renderRRHH()" style="margin-bottom:1rem">← Volver</button>
        <div class="card"><div class="locked">
          <div style="font-size:2rem;margin-bottom:.75rem">🔒</div>
          <div style="font-size:.85rem">No estás asignado como evaluador de <strong>${emp.nombre} ${emp.apellido||''}</strong>.<br>Solo podés ver el estado de esta evaluación.</div>
        </div></div>`;
      return;
    }
  }
  const esLider=PUESTOS_LIDERAZGO.includes(emp.puesto_codigo);
  const condiciones=[...CONDICIONES_BASE,...(esLider?CONDICIONES_LIDERAZGO:[])];
  const claveObj=claveObjetivos(emp);
  const objetivos=OBJETIVOS_PUESTO[claveObj]||[];
  const evalExistente=(evalsPorEmpleado[empleadoId]||[]).find(e=>e.evaluador_user_id===currentUser.id);
  const actPrev=evalExistente?.actitudinal||{};
  const objPrev=evalExistente?.objetivos||{};
  const sueldoPrev=evalExistente?.sueldo_al_momento||'';

  const panel=document.getElementById('rrhh-panel');
  panel.innerHTML=`
    <button class="btn btn-sm" onclick="renderRRHH()" style="margin-bottom:1rem">← Volver</button>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <div>
          <div class="section-heading" style="font-size:1.25rem;margin-bottom:2px">${emp.nombre} ${emp.apellido||''}</div>
          <div style="font-size:.8rem;color:var(--muted)">${emp.puesto_descripcion||''} · ${emp.area||''} · ${periodo.label}</div>
        </div>
        ${esLider?`<span class="badge badge-info">Encargado / Responsable</span>`:''}
      </div>

      <div class="form-group">
        <label class="form-label">Sueldo al momento de la evaluación ($)</label>
        <input type="number" class="form-input" id="eval-sueldo" value="${sueldoPrev}" placeholder="Ingresá el sueldo bruto" style="max-width:220px" oninput="recalcularBono()"/>
      </div>

function setActitudinal(idx, val){
  window._evalState.actitudinal['c'+idx]=val;
  const esLider=window._evalState.esLider;
  const condiciones=[...CONDICIONES_BASE,...(esLider?CONDICIONES_LIDERAZGO:[])];
  [1,2,3,4,5].forEach(v=>{
    const b=document.getElementById(`act-${idx}-${v}`);
    if(b) b.className=`btn btn-sm ${v===val?'btn-accent':''}`;
  });
  recalcularBono();
}

function setObjetivo(idx, pts, btnIdx, puesto){
  window._evalState.objetivos['o'+idx]=pts;
  const obj=OBJETIVOS_PUESTO[puesto]||[];
  if(obj[idx]){
    obj[idx].pts.forEach((p,j)=>{
      const b=document.getElementById(`obj-${idx}-${j}`);
      if(b) b.className=`btn btn-sm ${j===btnIdx?'btn-accent':''}`;
    });
  }
  recalcularBono();
}

function recalcularBono(){
  const{actitudinal,objetivos,esLider}=window._evalState||{};
  const sueldo=parseFloat(document.getElementById('eval-sueldo')?.value)||0;
  const condiciones=[...CONDICIONES_BASE,...(esLider?CONDICIONES_LIDERAZGO:[])];
  const pAct=Object.values(actitudinal||{}).reduce((a,b)=>a+b,0);
  const completoAct=Object.keys(actitudinal||{}).length===condiciones.length;
  const pObj=Object.values(objetivos||{}).reduce((a,b)=>a+b,0);
  // Puestos sin tabla de objetivos: la actitudinal pasa a valer el 100% del bono (×2)
  const sinObjetivos=!(OBJETIVOS_PUESTO[window._evalState?.puesto]||[]).length;
  let pctAct=calcPorcentajeActitudinal(pAct,esLider);
  let pctObj=calcPorcentajeObjetivos(pObj,esLider);
  if(sinObjetivos){ pctAct=pctAct*2; pctObj=0; }
  const elPA=document.getElementById('puntaje-actitudinal');
  const elPctA=document.getElementById('pct-actitudinal');
  const elPO=document.getElementById('puntaje-objetivos');
  const elPctO=document.getElementById('pct-objetivos');
  const elBono=document.getElementById('bono-preview');
  if(elPA) elPA.textContent=completoAct?pAct:'(incompleto)';
  if(elPctA) elPctA.textContent=completoAct?pctAct:'—';
  if(elPO) elPO.textContent=Object.keys(objetivos||{}).length>0?pObj:'(incompleto)';
  if(elPctO) elPctO.textContent=Object.keys(objetivos||{}).length>0?pctObj:'—';
  if(elBono){
    const objOk = sinObjetivos || Object.keys(objetivos||{}).length>0;
    if(sueldo&&completoAct&&objOk){
      const bono=calcBono(sueldo,pctAct,pctObj,esLider);
      elBono.textContent='$'+bono.toLocaleString('es-AR',{minimumFractionDigits:2});
      elBono.style.fontSize='1.4rem';
      elBono.style.color='var(--accent)';
    } else {
      elBono.textContent='Complete todos los campos para calcular';
      elBono.style.fontSize='.85rem';
      elBono.style.color='var(--muted)';
    }
  }
}

async function guardarEvaluacion(empleadoId, puesto, esLider, estado){
  const msgEl=document.getElementById('msg-eval');
  if(msgEl){msgEl.textContent='Guardando...';msgEl.className='form-hint';}
  // Defensa: nadie guarda su propia evaluación
  const empEval=(window._rrhhData?.todosEmpleados||[]).find(e=>e.id===empleadoId);
  if(empEval&&esMiPropioEmpleado(empEval)){ if(msgEl){msgEl.textContent='No podés hacer tu propia evaluación de desempeño.';msgEl.className='msg-err';} return; }
  const{actitudinal,objetivos}=window._evalState||{};
  const sueldo=parseFloat(document.getElementById('eval-sueldo')?.value)||null;
  const notas=document.getElementById('eval-notas')?.value||'';
  const condiciones=[...CONDICIONES_BASE,...(esLider?CONDICIONES_LIDERAZGO:[])];
  const pAct=Object.values(actitudinal||{}).reduce((a,b)=>a+b,0);
  const pObj=Object.values(objetivos||{}).reduce((a,b)=>a+b,0);
  const sinObjetivos=!(OBJETIVOS_PUESTO[window._evalState?.puesto]||[]).length;
  let pctAct=calcPorcentajeActitudinal(pAct,esLider);
  let pctObj=calcPorcentajeObjetivos(pObj,esLider);
  if(sinObjetivos){ pctAct=pctAct*2; pctObj=0; } // sin objetivos: actitudinal = 100% del bono
  const bono=sueldo?calcBono(sueldo,pctAct,pctObj,esLider):null;
  const periodo=window._rrhhData.periodo;

  // Verificar si existe evaluación previa
  const{data:existing}=await sb.from('evaluaciones')
    .select('id').eq('empleado_id',empleadoId).eq('evaluador_user_id',currentUser.id).eq('periodo',periodo.periodo);

  const payload={
    empleado_id:empleadoId, evaluador_user_id:currentUser.id,
    periodo:periodo.periodo, anio:periodo.anio, semestre:periodo.semestre,
    sueldo_al_momento:sueldo, actitudinal, objetivos,
    puntaje_actitudinal:pAct, porcentaje_actitudinal:pctAct,
    puntaje_objetivos:pObj, porcentaje_objetivos:pctObj,
    bono_calculado:bono, estado, notas
  };

  let error;
  if(existing&&existing.length>0){
    ({error}=await sb.from('evaluaciones').update(payload).eq('id',existing[0].id));
  } else {
    ({error}=await sb.from('evaluaciones').insert(payload));
  }

  if(error){if(msgEl){msgEl.textContent='Error: '+error.message;msgEl.className='msg-err';}}
  else{
    if(msgEl){msgEl.textContent=estado==='enviado'?'✓ Evaluación enviada al Directorio':'✓ Borrador guardado';msgEl.className='msg-ok';}
    setTimeout(()=>renderRRHH(),1500);
  }
}

          <button class="btn" onclick="document.getElementById('modal-contrato').style.display='none'">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Modal confirmación -->
    <div id="modal-confirm-inm" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:1001;align-items:center;justify-content:center;padding:1rem">
      <div style="background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:380px">
        <div style="font-size:1rem;font-weight:500;color:var(--text);margin-bottom:.5rem" id="confirm-inm-titulo"></div>
        <div style="font-size:.85rem;color:var(--muted);margin-bottom:1.25rem" id="confirm-inm-msg"></div>
        <div style="display:flex;gap:.75rem">
          <button class="btn btn-accent" id="confirm-inm-btn" style="background:var(--danger);border-color:var(--danger)">Confirmar</button>
          <button class="btn" onclick="document.getElementById('modal-confirm-inm').style.display='none'">Cancelar</button>
        </div>
      </div>
    </div>
  `;
  window._inmData={inm,contratosPorInmueble,alrt,cont,esGestor,cocheras};

  // Gráfico torta con SVG puro
  setTimeout(()=>{
    const metrosOcupados=inm.filter(i=>contratosPorInmueble[i.id]&&i.metros).reduce((a,i)=>a+(i.metros||0),0);
    const metrosVacios=inm.filter(i=>!contratosPorInmueble[i.id]&&i.metros).reduce((a,i)=>a+(i.metros||0),0);
    const sinDatos=inm.filter(i=>!i.metros).length;
    const total=metrosOcupados+metrosVacios;
    const pctOcupado=total?metrosOcupados/total:0;

    const ctx=document.getElementById('chart-inmuebles-torta');
    if(!ctx) return;

    // Dibujar donut SVG
    const r=80,cx=100,cy=100,stroke=32;
    const circ=2*Math.PI*r;
    const dashOcupado=pctOcupado*circ;
    const dashVacio=circ-dashOcupado;
    ctx.innerHTML=`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#E2DDD6" stroke-width="${stroke}"/>
      ${dashOcupado>0?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2D5A3D" stroke-width="${stroke}"
        stroke-dasharray="${dashOcupado} ${dashVacio}"
        stroke-dashoffset="${circ/4}"
        transform="rotate(-90 ${cx} ${cy})"/>`:''}
      <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="14" font-weight="500" fill="#1A1916">${total?Math.round(pctOcupado*100):0}%</text>
      <text x="${cx}" y="${cy+10}" text-anchor="middle" font-size="9" fill="#7A7570">alquilado</text>
    </svg>`;

    const leyEl=document.getElementById('torta-leyenda');
    if(leyEl){
      leyEl.innerHTML=`
        <div style="display:flex;align-items:center;gap:.6rem"><span style="width:12px;height:12px;background:#2D5A3D;border-radius:3px;flex-shrink:0;display:inline-block"></span><div><div style="font-size:.85rem;font-weight:500;color:var(--text)">Alquilados</div><div style="font-size:.78rem;color:var(--muted)">${metrosOcupados.toLocaleString('es-AR')} m² · ${total?Math.round(pctOcupado*100):0}%</div></div></div>
        <div style="display:flex;align-items:center;gap:.6rem"><span style="width:12px;height:12px;background:#E2DDD6;border:0.5px solid #B4B2A9;border-radius:3px;flex-shrink:0;display:inline-block"></span><div><div style="font-size:.85rem;font-weight:500;color:var(--text)">Desocupados</div><div style="font-size:.78rem;color:var(--muted)">${metrosVacios.toLocaleString('es-AR')} m² · ${total?Math.round((1-pctOcupado)*100):0}%</div></div></div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:.25rem;padding-top:.5rem;border-top:0.5px solid var(--border)">Total: ${total.toLocaleString('es-AR')} m² · Sin datos de superficie: ${sinDatos} inmuebles</div>`;
    }
  },300);
}

function renderInmActual(inm,contratosPorInmueble,alrt,esGestor){
  return`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem">
    ${inm.map(i=>{
      const c=contratosPorInmueble[i.id];
      const a=alrt.find(al=>al.inmueble_id===i.id);
      const ocupado=!!c;
      const tieneAlerta=!!a;
      let badgeClass=ocupado?'badge-ok':'badge-pend';
      let badgeLabel=ocupado?'Ocupado':'Desocupado';
      if(tieneAlerta&&a.tipo==='impago'){badgeClass='badge-late';badgeLabel='Incumplimiento';}
      return`<div class="puesto-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem">
          <div style="flex:1;min-width:0">
            <div style="font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.direccion}</div>
            <div style="font-size:.75rem;color:var(--muted)">${i.localidad||''}${i.metros?` · ${i.metros} m²`:''}</div>
          </div>
          <span class="badge ${badgeClass}" style="margin-left:.5rem;flex-shrink:0">${badgeLabel}</span>
        </div>
        ${c?`
          <div style="font-size:.78rem;display:flex;flex-direction:column;gap:3px">
            <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Inquilino</span><span style="font-weight:500">${c.inquilino||'—'}</span></div>
            ${c.precio_mensual?`<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Alquiler</span><span style="font-weight:500">$${c.precio_mensual.toLocaleString('es-AR')}</span></div>`:''}
            ${c.fecha_fin?`<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Vence</span><span style="font-weight:500;${new Date(c.fecha_fin)<new Date(new Date().setDate(new Date().getDate()+60))?'color:var(--warning)':''}">${new Date(c.fecha_fin).toLocaleDateString('es-AR')}</span></div>`:''}
            ${c.notas?`<div style="color:var(--muted);font-size:.72rem;margin-top:2px">${c.notas}</div>`:''}
          </div>`:`<div style="font-size:.78rem;color:var(--muted)">Sin contrato activo</div>`}
        ${a?`<div class="alert alert-danger" style="margin-top:.65rem;padding:.5rem .75rem;font-size:.75rem">${a.descripcion}</div>`:''}
        <div style="margin-top:.75rem;display:flex;gap:.4rem;flex-wrap:wrap">
          ${esGestor?`
            <button class="btn btn-sm" onclick="editarInmueble('${i.id}','${i.direccion.replace(/'/g,"\\'")}','${i.localidad||''}',${i.metros||0},'${(i.descripcion||'').replace(/'/g,"\\'")}')">✏️ Editar</button>
            ${!c?`<button class="btn btn-sm" onclick="abrirModalContrato('${i.id}','${i.direccion.replace(/'/g,"\\'")}')">+ Contrato</button>`:''}
            <button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger)" onclick="confirmarBajaInmueble('${i.id}','${i.direccion.replace(/'/g,"\\'")}')">Dar de baja</button>
          `:`<button class="btn btn-sm" onclick="abrirReportarAlerta('${i.id}','${i.direccion.replace(/'/g,"\\'")}')">Reportar alerta</button>`}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

  document.getElementById('modal-inm-titulo').textContent='Agregar inmueble';

  document.getElementById('msg-modal-inm').textContent='';
  document.getElementById('modal-inmueble').style.display='flex';
}

function editarInmueble(id,direccion,localidad,metros,descripcion){
  document.getElementById('modal-inm-titulo').textContent='Editar inmueble';
  document.getElementById('inm-edit-id').value=id;
  document.getElementById('inm-direccion').value=direccion;
  document.getElementById('inm-localidad').value=localidad;
  document.getElementById('inm-metros').value=metros||'';
  document.getElementById('inm-descripcion').value=descripcion;
  document.getElementById('msg-modal-inm').textContent='';
  document.getElementById('modal-inmueble').style.display='flex';
}

function cerrarModalInmueble(){
  document.getElementById('modal-inmueble').style.display='none';
}

async function guardarInmueble(){
  const msgEl=document.getElementById('msg-modal-inm');
  const id=document.getElementById('inm-edit-id').value;
  const direccion=document.getElementById('inm-direccion').value.trim();
  const localidad=document.getElementById('inm-localidad').value.trim();
  const metros=parseFloat(document.getElementById('inm-metros').value)||null;
  const descripcion=document.getElementById('inm-descripcion').value.trim();
  if(!direccion){msgEl.textContent='La dirección es obligatoria.';msgEl.style.color='var(--danger)';return;}
  msgEl.textContent='Guardando...';msgEl.style.color='var(--muted)';
  let error;
  if(id){
    ({error}=await sb.from('inmuebles_urbanos').update({direccion,localidad,metros,descripcion}).eq('id',id));
  }else{
    ({error}=await sb.from('inmuebles_urbanos').insert({direccion,localidad,metros,descripcion,activo:true}));
  }
  if(error){msgEl.textContent='Error: '+error.message;msgEl.style.color='var(--danger)';}
  else{cerrarModalInmueble();renderInmuebles();}
}

function confirmarBajaInmueble(id,direccion){
  document.getElementById('confirm-inm-titulo').textContent='¿Dar de baja este inmueble?';
  document.getElementById('confirm-inm-msg').textContent=`"${direccion}" quedará inactivo. No se borrarán sus contratos ni historial.`;
  const btn=document.getElementById('confirm-inm-btn');
  btn.onclick=async()=>{
    await sb.from('inmuebles_urbanos').update({activo:false}).eq('id',id);
    document.getElementById('modal-confirm-inm').style.display='none';
    renderInmuebles();
  };
  document.getElementById('modal-confirm-inm').style.display='flex';
}

function abrirModalContrato(inmId,direccion){
  document.getElementById('cont-inmueble-id').value=inmId;
  document.getElementById('modal-cont-titulo').textContent='Agregar contrato';
  document.getElementById('modal-cont-inmueble').textContent=direccion;
  document.getElementById('cont-inquilino').value='';
  document.getElementById('cont-inicio').value='';
  document.getElementById('cont-fin').value='';
  document.getElementById('cont-precio').value='';
  document.getElementById('cont-notas').value='';
  document.getElementById('msg-modal-cont').textContent='';

}

async function guardarContrato(){
  const msgEl=document.getElementById('msg-modal-cont');
  const inmId=document.getElementById('cont-inmueble-id').value;
  const inquilino=document.getElementById('cont-inquilino').value.trim();
  const inicio=document.getElementById('cont-inicio').value;
  const fin=document.getElementById('cont-fin').value;
  const precio=parseFloat(document.getElementById('cont-precio').value)||null;
  const notas=document.getElementById('cont-notas').value.trim();
  if(!inquilino||!inicio){msgEl.textContent='Inquilino y fecha de inicio son obligatorios.';msgEl.style.color='var(--danger)';return;}
  msgEl.textContent='Guardando...';msgEl.style.color='var(--muted)';
  const{error}=await sb.from('contratos_inmuebles').insert({
    inmueble_id:inmId,inquilino,fecha_inicio:inicio,

  });
  if(error){msgEl.textContent='Error: '+error.message;msgEl.style.color='var(--danger)';}
  else{document.getElementById('modal-contrato').style.display='none';renderInmuebles();}
}

function inmTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const{inm,contratosPorInmueble,alrt,cont}=window._inmData;
  const panel=document.getElementById('inm-panel');
  if(tab==='actual') panel.innerHTML=renderInmActual(inm,contratosPorInmueble,alrt,esGestor);
  if(tab==='todos') panel.innerHTML=renderInmTodos(inm,cont,alrt);
  if(tab==='nueva') panel.innerHTML=renderFormAlerta(inm);
  if(tab==='archivados') renderInmArchivados(panel);
}

// Eliminar una alerta de inmueble (solo programador). Borrado definitivo, con confirmación.
async function eliminarAlertaInm(id){

}

// ── PUESTOS ──
// Deduce estado (habitado/desocupado/abandonado) a partir del texto de habitantes
function puestoEstado(hab){
  const h=(hab||'').toLowerCase();
  if(h.includes('abandon'))return{cls:'badge-late',label:'Abandonado',tipo:'abandonado'};
  if(h.includes('desocup'))return{cls:'badge-pend',label:'Desocupado',tipo:'desocupado'};
  if(hab&&hab.trim())return{cls:'badge-ok',label:'Habitado',tipo:'habitado'};
  return{cls:'badge-na',label:'Sin dato',tipo:'sindato'};
}

async function renderPuestos(){
  const main=document.getElementById('main-content');
  const puedeEd=['programador','coo'].includes(currentProfile.rol);
  const[{data:puestos},{data:hist}]=await Promise.all([
    sb.from('puestos').select('*,campos(nombre,unidades_negocio(nombre))').eq('activo',true).order('nombre'),
    sb.from('puestos_historico').select('*').order('anio',{ascending:false})
  ]);
  window._puestos=puestos||[];
  // Histórico agrupado por instalación, de más nuevo a más viejo
  const histPorPuesto={};
  (hist||[]).forEach(h=>{(histPorPuesto[h.puesto_id]=histPorPuesto[h.puesto_id]||[]).push(h);});
  Object.values(histPorPuesto).forEach(a=>a.sort((x,y)=>y.anio-x.anio));
  window._histPorPuesto=histPorPuesto;
  // Estado actual de cada instalación = el del año más reciente
  const estadoActual=p=>{const h=histPorPuesto[p.id]?.[0];return puestoEstado(h?.habitantes);};
  const porCampo={};
  (puestos||[]).forEach(p=>{
    const key=p.campos?.nombre||'Sin campo';
    if(!porCampo[key]){porCampo[key]={unidad:p.campos?.unidades_negocio?.nombre||'',items:[]};}
    porCampo[key].items.push(p);
  });
  const total=(puestos||[]).length;
  const cuenta=t=>(puestos||[]).filter(p=>estadoActual(p).tipo===t).length;
  const habitados=cuenta('habitado'), desocupados=cuenta('desocupado'), abandonados=cuenta('abandonado');
  const anioActual=new Date().getFullYear();
  const anios=[];for(let a=anioActual;a>=anioActual-10;a--)anios.push(a);
  main.innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
      <div>
        <div class="section-heading">Instalaciones</div>
        <div class="section-sub">Estado de las viviendas y construcciones por campo</div>
      </div>
      ${puedeEd?`<button class="btn btn-accent" onclick="abrirModalPuesto()">+ Agregar instalación</button>`:''}
    </div>
    <div class="metrics-grid" style="margin:1.25rem 0 1.5rem">
      <div class="metric-card"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
      <div class="metric-card"><div class="metric-label">Habitados</div><div class="metric-value" style="color:var(--success)">${habitados}</div></div>
      <div class="metric-card"><div class="metric-label">Desocupados</div><div class="metric-value" style="color:var(--warning)">${desocupados}</div></div>
      <div class="metric-card"><div class="metric-label">Abandonados</div><div class="metric-value" style="color:var(--danger)">${abandonados}</div></div>
    </div>
    ${Object.entries(porCampo).map(([campo,data])=>`
      <div class="card" style="margin-bottom:1rem">
        <div class="card-title">${campo} <span class="badge badge-na" style="margin-left:.5rem;font-weight:400">${data.unidad}</span></div>
        ${data.items.map(p=>{
          const h=histPorPuesto[p.id]||[];
          const est=estadoActual(p);
          const ultimos=h.slice(0,5);

function abrirHistPuesto(id){
  const p=(window._puestos||[]).find(x=>x.id===id);
  const h=(window._histPorPuesto?.[id]||[]);
  document.getElementById('mhp-title').textContent='Histórico — '+(p?.nombre||'');
  document.getElementById('mhp-body').innerHTML=h.length?h.map(r=>{
    const e=puestoEstado(r.habitantes);
    const det=e.tipo==='habitado'&&r.habitantes?` — ${r.habitantes}`:'';
    return`<div style="padding:.5rem 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;gap:.6rem;align-items:center"><strong style="min-width:42px">${r.anio}</strong><span class="badge ${e.cls}">${e.label}</span><span style="font-size:.82rem">${det.replace(' — ','')}</span></div>
      ${r.notas?`<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem;padding-left:42px">${r.notas}</div>`:''}
    </div>`;
  }).join(''):'<div style="color:var(--muted);font-size:.85rem">Sin registros.</div>';
  document.getElementById('modal-hist-puesto').style.display='flex';
}

function mpToggleOcupante(){
  const estado=document.getElementById('mp-estado').value;
  document.getElementById('mp-ocupante-wrap').style.display=estado==='habitado'?'':'none';
}
// Carga en el formulario el relevamiento del año elegido (o lo deja en blanco si no existe)
function mpCargarAnio(){
  const id=document.getElementById('mp-id').value;
  const anio=parseInt(document.getElementById('mp-anio').value,10);
  const r=(window._histPorPuesto?.[id]||[]).find(x=>x.anio===anio);
  const hab=r?.habitantes||'';
  const e=puestoEstado(hab);
  document.getElementById('mp-estado').value=e.tipo==='sindato'?'habitado':e.tipo;
  document.getElementById('mp-ocupante').value=e.tipo==='habitado'?hab:'';
  document.getElementById('mp-notas').value=r?.notas||'';
  mpToggleOcupante();
}
function abrirModalPuesto(id){
  document.getElementById('mp-error').textContent='';
  const anioSel=document.getElementById('mp-anio');
  if(id){
    const p=(window._puestos||[]).find(x=>x.id===id);
    if(!p)return;
    document.getElementById('mp-title').textContent='Editar instalación';
    document.getElementById('mp-id').value=p.id;
    document.getElementById('mp-nombre').value=p.nombre||'';
    document.getElementById('mp-campo').value=p.campo_id||'';
    document.getElementById('mp-desc').value=p.descripcion||'';
    // arranca mostrando el año más reciente cargado
    const ultimo=(window._histPorPuesto?.[id]||[])[0];
    anioSel.value=String(ultimo?.anio||new Date().getFullYear());
    mpCargarAnio();
  }else{
    document.getElementById('mp-title').textContent='Nueva instalación';
    document.getElementById('mp-id').value='';
    document.getElementById('mp-nombre').value='';
    document.getElementById('mp-campo').selectedIndex=0;
    document.getElementById('mp-desc').value='';
    anioSel.value=String(new Date().getFullYear());
    document.getElementById('mp-estado').value='habitado';
    document.getElementById('mp-ocupante').value='';
    document.getElementById('mp-notas').value='';
    mpToggleOcupante();
  }
  document.getElementById('modal-puesto').style.display='flex';
}
async function guardarPuesto(){
  const err=document.getElementById('mp-error');
  const nombre=document.getElementById('mp-nombre').value.trim();
  const campo_id=document.getElementById('mp-campo').value;
  const anio=parseInt(document.getElementById('mp-anio').value,10);
  const estado=document.getElementById('mp-estado').value;
  const ocupante=document.getElementById('mp-ocupante').value.trim();
  const descripcion=document.getElementById('mp-desc').value.trim()||null;
  const notas=document.getElementById('mp-notas').value.trim()||null;
  if(!nombre){err.textContent='Poné un nombre.';return;}
  if(!campo_id){err.textContent='Elegí un campo.';return;}
  if(!anio){err.textContent='Elegí un año.';return;}
  let habitantes=null;
  if(estado==='desocupado')habitantes='Desocupado';
  else if(estado==='abandonado')habitantes='Abandonado';
  else habitantes=ocupante||null;
  let id=document.getElementById('mp-id').value;
  if(id){
    const{error}=await sb.from('puestos').update({nombre,campo_id,descripcion}).eq('id',id);
    if(error){err.textContent='Error al guardar: '+error.message;return;}
  }else{
    const{data,error}=await sb.from('puestos').insert({nombre,campo_id,descripcion,activo:true}).select('id').single();
    if(error){err.textContent='Error al guardar: '+error.message;return;}
    id=data.id;
  }
  const{error:eh}=await sb.from('puestos_historico').upsert({puesto_id:id,anio,habitantes,notas},{onConflict:'puesto_id,anio'});
  if(eh){err.textContent='Se guardó la instalación pero falló el relevamiento: '+eh.message;return;}
  document.getElementById('modal-puesto').style.display='none';
  renderPuestos();
}
let _bajaPuestoId=null;
function pedirBajaPuesto(id){
  const p=(window._puestos||[]).find(x=>x.id===id);
  _bajaPuestoId=id;
  document.getElementById('mcp-text').textContent=`¿Seguro que querés dar de baja "${p?.nombre||''}"? No se borra: queda inactivo y se puede recuperar más adelante.`;
  document.getElementById('modal-confirm-puesto').style.display='flex';
}
async function confirmarBajaPuesto(){
  if(!_bajaPuestoId)return;
  const{error}=await sb.from('puestos').update({activo:false}).eq('id',_bajaPuestoId);
  document.getElementById('modal-confirm-puesto').style.display='none';
  _bajaPuestoId=null;
  if(error){alert('Error al dar de baja: '+error.message);return;}
  renderPuestos();
}

async function loadHistorico(){
  const indId=document.getElementById('hist-ind').value;
  const resEl=document.getElementById('hist-result');
  if(!indId) return;
  resEl.innerHTML='<div class="loading">Cargando...</div>';

  // Obtener campos seleccionados
  const todosMarcado=document.getElementById('hist-campo-todos')?.checked;
  const camposSeleccionados=[...document.querySelectorAll('.hist-campo-check:checked')].map(c=>c.value);

  let query=sb.from('entries').select('*,indicadores(nombre,unidad_medida,alerta_min,alerta_max,por_campo),campos(nombre,hectareas,unidades_negocio(nombre)),unidades_negocio(nombre),profiles(nombre,apellido)').eq('indicador_id',indId).order('periodo_fecha',{ascending:true});
  if(!todosMarcado&&camposSeleccionados.length>0) query=query.in('campo_id',camposSeleccionados);
  const{data:entries}=await query;

  if(!entries||entries.length===0){resEl.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No hay datos registrados.</div></div>';return;}

  const indData=entries[0].indicadores;
  const entriesConValor=entries.filter(e=>e.valor!==null);
  const vals=entriesConValor.map(e=>e.valor);
  const media=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):null;
  const alertMin=indData?.alerta_min;
  const alertMax=indData?.alerta_max;

  let consolidadoHtml='';
  if(indData?.por_campo&&!campoId){
    const porCampo={};
    entries.forEach(e=>{
      const cn=e.campos?.nombre||'Sin campo';
      if(!porCampo[cn]){porCampo[cn]={campo:e.campos,entries:[]};}
      porCampo[cn].entries.push(e);
    });
    consolidadoHtml=`<div class="card" style="margin-bottom:1rem">
      <div class="card-title">Vista consolidada por campo</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Campo</th><th>Unidad</th><th>Ha totales</th><th>Último valor</th><th>Período</th></tr></thead>
        <tbody>${Object.entries(porCampo).map(([nombre,data])=>{
          const ultimo=data.entries[data.entries.length-1];
          return`<tr><td><strong>${nombre}</strong></td><td>${data.campo?.unidades_negocio?.nombre||'—'}</td>
            <td style="color:var(--muted)">${data.campo?.hectareas?data.campo.hectareas.toLocaleString('es-AR')+' ha':'—'}</td>
            <td><strong>${ultimo.valor??'—'}</strong> <span style="color:var(--muted);font-size:.78rem">${indData?.unidad_medida||''}</span></td>
            <td>${ultimo.periodo_fecha?new Date(ultimo.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
      <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border);font-size:.82rem;color:var(--muted)">
        Total campos: ${Object.keys(porCampo).length} · Total valor: ${Object.values(porCampo).reduce((a,d)=>a+(d.entries[d.entries.length-1]?.valor||0),0).toLocaleString('es-AR')} ${indData?.unidad_medida||''}
      </div>
    </div>`;
  }

  // Tabla comparativa entre años
  const anios=[...new Set(entries.map(e=>e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').getFullYear():null).filter(Boolean))].sort();
  let tablaComparativaHtml='';
  if(anios.length>1){
    // Agrupar por mes/período dentro de cada año
    const porAnio={};
    anios.forEach(a=>porAnio[a]={});
    entries.forEach(e=>{
      if(!e.periodo_fecha||e.valor===null) return;
      const d=new Date(e.periodo_fecha+'T12:00:00');
      const anio=d.getFullYear();
      const mesKey=d.toLocaleDateString('es-AR',{month:'short'});
      if(!porAnio[anio]) porAnio[anio]={};
      porAnio[anio][mesKey]=e.valor;
    });
    const todosLosMeses=[...new Set(entries.filter(e=>e.periodo_fecha).map(e=>new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR',{month:'short'})))];

    tablaComparativaHtml=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Comparativa entre años · ${indData?.nombre||'Indicador'}</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Período</th>${anios.map(a=>`<th style="text-align:right">${a}</th>`).join('')}<th style="text-align:right;color:var(--muted)">Variación</th></tr></thead>
        <tbody>${todosLosMeses.map(mes=>{
          const vals=anios.map(a=>porAnio[a]?.[mes]??null);
          const tieneValores=vals.some(v=>v!==null);
          if(!tieneValores) return'';
          // Calcular variación entre primer y último año con dato
          const valsConDato=vals.filter(v=>v!==null);
          const variacion=valsConDato.length>1?((valsConDato[valsConDato.length-1]-valsConDato[0])/Math.abs(valsConDato[0])*100).toFixed(1):null;

            <td style="font-weight:500">${mes}</td>

    </div>`;

      </div>

            let estado='';
            if(e.valor!==null&&alertMin!==null&&e.valor<alertMin)estado='<span class="badge badge-late">Bajo mínimo</span>';
            else if(e.valor!==null&&alertMax!==null&&e.valor>alertMax)estado='<span class="badge badge-late">Sobre máximo</span>';
            else if(e.valor!==null)estado='<span class="badge badge-ok">Normal</span>';
            return`<tr>
              <td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
              <td><strong>${e.valor??'—'}</strong> <span style="color:var(--muted);font-size:.78rem">${indData?.unidad_medida||''}</span></td>
              <td>${e.unidades_negocio?.nombre||e.campos?.nombre||'—'}</td>
              <td>${(e.profiles?.nombre||'')+' '+(e.profiles?.apellido||'')}</td>
              <td>${estado}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>
      <div id="hist-variables" style="display:none">
        <div id="hist-vars-content" style="text-align:center;padding:1.5rem;color:var(--muted);font-size:.85rem">Cargando variables...</div>
      </div>
    </div>`;

  // Renderizar gráfico
  if(entriesConValor.length>1){
    setTimeout(()=>{
      const ctx=document.getElementById('chart-historico');
      if(!ctx||typeof Chart==='undefined') return;
      const datasets=[
        {label:'Valor real',data:dataVals,borderColor:'#2D5A3D',backgroundColor:'rgba(45,90,61,0.08)',tension:0.3,fill:true,borderWidth:2,pointRadius:4,pointBackgroundColor:'#2D5A3D',pointBorderColor:'#fff',pointBorderWidth:2},
        {label:'Promedio',data:dataVals.map(()=>mediaNum),borderColor:'#7A7570',borderDash:[6,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0}
      ];
      if(alertMin!==null) datasets.push({label:'Mínimo',data:dataVals.map(()=>alertMin),borderColor:'#C0392B',borderDash:[4,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0});
      if(alertMax!==null) datasets.push({label:'Máximo',data:dataVals.map(()=>alertMax),borderColor:'#D4890A',borderDash:[4,4],tension:0,fill:false,borderWidth:1.5,pointRadius:0});
      new Chart(ctx,{
        type:'line',data:{labels,datasets},
        options:{
          responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(2)||'—'} ${indData?.unidad_medida||''}`}}},
          scales:{
            y:{ticks:{font:{size:11},callback:v=>`${v} ${indData?.unidad_medida||''}`},grid:{color:'rgba(120,120,120,0.08)'}},
            x:{ticks:{font:{size:11},maxRotation:45},grid:{display:false}}
          }
        }
      });
    },100);
  }

  loadHistVariables(indId,entries);
}

async function loadHistVariables(indId,entries){
  const vars=await getVariables(indId);
  const el=document.getElementById('hist-vars-content');
  if(!el) return;
  if(!vars.length){el.innerHTML='<div style="color:var(--muted)">Este indicador no tiene variables detalladas.</div>';return;}
  const entryIds=entries.map(e=>e.id);
  const{data:evs}=await sb.from('entry_variables').select('*').in('entry_id',entryIds);
  const evPorEntry={};
  (evs||[]).forEach(ev=>{if(!evPorEntry[ev.entry_id])evPorEntry[ev.entry_id]={};evPorEntry[ev.entry_id][ev.clave]=ev.valor;});
  const inputVars=vars.filter(v=>!v.es_calculado);
  const calcVar=vars.find(v=>v.es_calculado);
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Período</th>${inputVars.map(v=>`<th>${v.nombre} (${v.unidad||''})</th>`).join('')}${calcVar?`<th style="color:var(--accent)">${calcVar.nombre}</th>`:''}</tr></thead>
    <tbody>${entries.slice().reverse().map(e=>{
      const ev=evPorEntry[e.id]||{};
      return`<tr><td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
        ${inputVars.map(v=>`<td>${ev[v.clave]!==undefined?ev[v.clave].toLocaleString('es-AR'):'—'}</td>`).join('')}
        ${calcVar?`<td style="font-weight:500;color:var(--accent)">${e.valor!==null?e.valor.toFixed(4):'—'}</td>`:''}
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

async function getEntriesAnio(anio){
  const{data}=await sb.from('entries')
    .select('*,indicadores(nombre,categoria,unidad_medida,alerta_min,alerta_max),unidades_negocio(nombre),campos(nombre),profiles(nombre,apellido)')
    .gte('periodo_fecha',`${anio}-01-01`)
    .lte('periodo_fecha',`${anio}-12-31`)
    .order('periodo_fecha',{ascending:false});
  return data||[];
}

async function descargarInformeExcel(){
  const anio=document.getElementById('informe-anio').value;
  const btn=event.target;
  btn.textContent='Generando...';btn.disabled=true;

  const entries=await getEntriesAnio(anio);

  // Construir CSV (compatible con Excel y Google Sheets)
  const BOM='\uFEFF';
  const sep=',';
  const filas=[
    ['GBV · Informe Anual '+anio],
    ['Generado el '+new Date().toLocaleDateString('es-AR')],
    [],
    ['Categoría','Indicador','Período','Valor','Unidad de medida','Unidad/Campo','Cargado por','Estado','Alerta mín','Alerta máx']
  ];

  entries.forEach(e=>{
    const amin=e.indicadores?.alerta_min;
    const amax=e.indicadores?.alerta_max;
    let estado='Normal';
    if(e.valor!==null&&amin!==null&&e.valor<amin) estado='Bajo mínimo';
    else if(e.valor!==null&&amax!==null&&e.valor>amax) estado='Sobre máximo';
    filas.push([
      CAT_LABELS[e.indicadores?.categoria]||e.indicadores?.categoria||'—',
      e.indicadores?.nombre||'—',
      e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—',
      e.valor!==null?e.valor:'',
      e.indicadores?.unidad_medida||'',
      e.unidades_negocio?.nombre||e.campos?.nombre||'—',
      (e.profiles?.nombre||'')+' '+(e.profiles?.apellido||''),
      estado,
      amin!==null?amin:'',
      amax!==null?amax:''
    ]);
  });

  const csv=BOM+filas.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(sep)).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`GBV_Informe_${anio}.csv`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);

  btn.textContent='⬇ Descargar Excel';btn.disabled=false;
}

let _haTotal=0;
function abrirModalHa(campoId,nombre,haTotal,histId,haGan,haAgr,haImp,notas){
  _haTotal=haTotal;
  document.getElementById('modal-ha-titulo').textContent=(histId?'Editar':'Cargar')+' hectáreas · '+nombre;
  document.getElementById('modal-ha-sub').textContent='Año '+new Date().getFullYear()+' · '+haTotal.toLocaleString('es-AR')+' ha totales';
  document.getElementById('ha-campo-id').value=campoId;
  document.getElementById('ha-hist-id').value=histId;
  document.getElementById('ha-ganaderas').value=haGan||'';
  document.getElementById('ha-agricolas').value=haAgr||'';
  document.getElementById('ha-improductivas').value=haImp||'';
  document.getElementById('ha-notas').value=notas||'';
  document.getElementById('msg-modal-ha').textContent='';
  calcHaResto();
  document.getElementById('modal-ha').style.display='flex';
}

function calcHaResto(){
  const gan=parseFloat(document.getElementById('ha-ganaderas').value)||0;
  const agr=parseFloat(document.getElementById('ha-agricolas').value)||0;
  const imp=parseFloat(document.getElementById('ha-improductivas').value)||0;
  const suma=gan+agr+imp;
  const resto=_haTotal-suma;
  const el=document.getElementById('ha-resto');
  if(!el) return;
  const ok=Math.abs(resto)<0.1;
  el.innerHTML='Suma: <strong>'+suma.toLocaleString('es-AR')+' ha</strong> de '+_haTotal.toLocaleString('es-AR')+' ha totales · <span style="color:'+(ok?'var(--success)':resto<0?'var(--danger)':'var(--warning)')+'">'+( ok?'✓ Cuadra perfecto':resto>0?'Faltan '+resto.toLocaleString('es-AR')+' ha':'Excede por '+Math.abs(resto).toLocaleString('es-AR')+' ha')+'</span>';
}

async function guardarHa(){
  const msgEl=document.getElementById('msg-modal-ha');
  const campoId=document.getElementById('ha-campo-id').value;
  const histId=document.getElementById('ha-hist-id').value;
  const haGan=parseFloat(document.getElementById('ha-ganaderas').value)||null;
  const haAgr=parseFloat(document.getElementById('ha-agricolas').value)||null;
  const haImp=parseFloat(document.getElementById('ha-improductivas').value)||null;
  const notas=document.getElementById('ha-notas').value.trim();
  const anio=new Date().getFullYear();
  msgEl.textContent='Guardando...';msgEl.style.color='var(--muted)';
  let error;
  if(histId){

async function hacProcesarArchivo(input){
  const file=input.files[0];
  if(!file)return;
  const statusEl=document.getElementById('hac-file-status');
  statusEl.textContent='Leyendo archivo...';
  statusEl.style.color='var(--muted)';
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const consolidadoSheetName=wb.SheetNames.find(n=>n.toLowerCase().startsWith('consolidado'));
    if(!consolidadoSheetName){
      statusEl.textContent='⚠ No se encontró una hoja "Consolidado" en este archivo. Revisá que sea el archivo correcto.';
      statusEl.style.color='var(--danger)';
      return;
    }
    const ws=wb.Sheets[consolidadoSheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    const parsed=hacParsearConsolidado(rows);
    if(parsed.filas.length===0){
      statusEl.textContent='⚠ No se pudieron detectar filas de campo/rodeo en la hoja Consolidado. Revisá el archivo o avisá a Claude para ajustar el lector.';
      statusEl.style.color='var(--danger)';
      return;
    }
    statusEl.textContent=`✓ Archivo leído correctamente · hoja "${consolidadoSheetName}" · ${parsed.filas.length} filas detectadas`;
    statusEl.style.color='var(--success)';
    hacCampoActual={archivo:file.name,sheetName:consolidadoSheetName,filas:parsed.filas};
    await hacMostrarPreview();
  }catch(err){
    statusEl.textContent='⚠ Error al leer el archivo: '+err.message;
    statusEl.style.color='var(--danger)';
  }
}

// Parsea la hoja Consolidado del esquema estable (campo | rodeo | 17 categorías | total)
function hacParsearConsolidado(rows){
  const filas=[];
  for(const row of rows){
    if(!row||!row[0])continue;
    const campoRaw=String(row[0]).trim();
    const rodeoRaw=row[1]?String(row[1]).trim():null;
    if(rodeoRaw!=='General'&&rodeoRaw!=='Plantel')continue; // saltea totales y filas de texto
    let campoNorm=campoRaw.replace(/\s+/g,' ').trim();
    if(/^rincon\s*ch/i.test(campoNorm))campoNorm='Rincon del Chañar';
    if(/^san\s*juan/i.test(campoNorm))campoNorm='San Juan';
    if(/^tandil/i.test(campoNorm))campoNorm='Tandil';
    if(/^pto\.?\s*flores/i.test(campoNorm))campoNorm='Pto. Flores';
    if(/^aguara/i.test(campoNorm))campoNorm='Aguara';
    const valores=row.slice(2,19).map(v=>Number(v)||0); // 17 columnas de categorías
    while(valores.length<17)valores.push(0);
    filas.push({campo:campoNorm,rodeo:rodeoRaw,valores});
  }
  return{filas};
}

async function hacMostrarPreview(){
  const previewEl=document.getElementById('hac-preview');
  if(!hacCampoActual){previewEl.innerHTML='';return;}
  previewEl.innerHTML='<div class="loading">Preparando vista previa...</div>';

  // Traer histórico para calcular el total del período anterior, por campo+rodeo
  const{data:historicoTodo}=await sb.from('hacienda_historico')
    .select('periodo,campo,rodeo,cantidad').range(0,19999);
  const totalesPorClave={};
  (historicoTodo||[]).forEach(r=>{
    const clave=r.campo+'|'+r.rodeo;
    if(!totalesPorClave[clave])totalesPorClave[clave]={};
    if(!totalesPorClave[clave][r.periodo])totalesPorClave[clave][r.periodo]=0;
    totalesPorClave[clave][r.periodo]+=r.cantidad;
  });
  const totalAnteriorPorClave={};
  Object.entries(totalesPorClave).forEach(([clave,porPeriodo])=>{
    const periodos=Object.keys(porPeriodo).sort();
    if(periodos.length>0)totalAnteriorPorClave[clave]=porPeriodo[periodos[periodos.length-1]];
  });

  const hoy=new Date();
  const periodoDefault=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}`;

  let filasHtml='';
  hacCampoActual.filas.forEach((fila,idx)=>{
    const clave=fila.campo+'|'+fila.rodeo;
    const totalNuevo=fila.valores.reduce((a,b)=>a+b,0);
    const totalAnterior=totalAnteriorPorClave[clave];
    let variacionHtml='<span style="color:var(--muted);font-size:.75rem">— sin dato previo</span>';
    if(totalAnterior!==undefined&&totalAnterior>0){
      const diff=totalNuevo-totalAnterior;
      const pct=(diff/totalAnterior*100);
      const subio=diff>0,igual=diff===0;
      const alerta=Math.abs(pct)>=30;
      const color=igual?'var(--muted)':(subio?'var(--success)':'var(--danger)');
      const flecha=igual?'─':(subio?'↑':'↓');
      variacionHtml=`<span style="color:${alerta?'var(--danger)':color};font-size:.75rem;font-weight:${alerta?600:400}">${flecha} ${Math.abs(pct).toFixed(1)}%</span>`;
    }
    filasHtml+=`<tr data-fila-idx="${idx}">
      <td><strong>${fila.campo}</strong> · ${fila.rodeo}</td>
      ${fila.valores.map((v,catIdx)=>`<td><input type="number" class="hac-input-cat" data-fila="${idx}" data-cat="${catIdx}" value="${v}" style="width:62px;padding:3px 5px;font-size:.78rem;text-align:right;border:1px solid var(--border);border-radius:6px"/></td>`).join('')}
      <td style="text-align:right"><strong id="hac-total-${idx}">${totalNuevo.toLocaleString('es-AR')}</strong><br/>${variacionHtml}</td>
    </tr>`;
  });

  const alertas=hacCampoActual.filas.map(fila=>{
    const clave=fila.campo+'|'+fila.rodeo;
    const totalNuevo=fila.valores.reduce((a,b)=>a+b,0);
    const totalAnterior=totalAnteriorPorClave[clave];
    if(totalAnterior!==undefined&&totalAnterior>0){
      const pct=((totalNuevo-totalAnterior)/totalAnterior*100);
      if(Math.abs(pct)>=30)return`${fila.campo} · ${fila.rodeo} ${pct>0?'subió':'bajó'} ${Math.abs(pct).toFixed(0)}% respecto al mes anterior (${totalAnterior.toLocaleString('es-AR')} → ${totalNuevo.toLocaleString('es-AR')})`;
    }
    return null;
  }).filter(Boolean);

  const camposPresentes=[...new Set(hacCampoActual.filas.map(f=>f.campo))];

  previewEl.innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Verificar datos antes de guardar</div>
      <div class="form-row" style="margin-bottom:1rem">
        <div class="form-group"><label class="form-label">Período de esta carga</label>
          <input type="month" class="form-input" id="hac-periodo" value="${periodoDefault}" style="width:auto"/>
        </div>
      </div>
      <div class="table-wrap" style="overflow-x:auto">
        <table style="font-size:.78rem">
          <thead><tr>
            <th>Campo / rodeo</th>
            ${HAC_CATEGORIAS.map(c=>`<th style="text-align:right;white-space:nowrap">${c.label}</th>`).join('')}
            <th style="text-align:right">Total vs. mes ant.</th>
          </tr></thead>
          <tbody>${filasHtml}</tbody>
        </table>
      </div>
      ${alertas.length>0?`<div class="alert alert-warning" style="margin-top:1rem">⚠ <strong>Revisá estos valores antes de confirmar:</strong><ul style="margin:.4rem 0 0 1.2rem">${alertas.map(a=>`<li>${a}</li>`).join('')}</ul></div>`:''}
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Comentarios por campo</div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        ${camposPresentes.map(campo=>`
          <div style="background:var(--bg);border-radius:var(--radius);padding:.9rem">

      </div>

      <button class="btn btn-accent" onclick="hacConfirmarCarga()">✓ Confirmar y guardar</button>

  // recalcular total en vivo si edita un input
  document.querySelectorAll('.hac-input-cat').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const filaIdx=inp.dataset.fila;
      const inputsFila=document.querySelectorAll(`.hac-input-cat[data-fila="${filaIdx}"]`);

    });
  });
}

async function hacConfirmarCarga(){
  const periodo=document.getElementById('hac-periodo').value; // formato YYYY-MM
  const statusEl=document.getElementById('hac-confirmar-status');
  if(!periodo){if(statusEl){statusEl.textContent='Elegí el período de esta carga.';statusEl.style.color='var(--danger)';}return;}

  const registros=[];
  hacCampoActual.filas.forEach((fila,idx)=>{
    const inputsFila=document.querySelectorAll(`.hac-input-cat[data-fila="${idx}"]`);
    inputsFila.forEach(inp=>{
      const catIdx=Number(inp.dataset.cat);
      const cat=HAC_CATEGORIAS[catIdx];
      registros.push({
        periodo,campo:fila.campo,rodeo:fila.rodeo,

  });
  document.querySelectorAll('.hac-comentario-consumo').forEach(ta=>{
    if(ta.value.trim())comentarios.push({periodo,campo:ta.dataset.campo,tipo:'consumo',comentario:ta.value.trim()});

  document.getElementById('confirm-hac-msg').textContent=`¿Confirmás la carga de ${hacFormatPeriodo(periodo)}? Se van a guardar ${registros.length} registros de existencia${comentarios.length>0?` y ${comentarios.length} comentario(s)`:''}.`;

    document.getElementById('modal-confirm-hac').style.display='none';

async function hacGuardarEnSupabase(periodo,registros,comentarios){
  const previewEl=document.getElementById('hac-preview');
  previewEl.insertAdjacentHTML('beforeend','<div class="loading" id="hac-guardando">Guardando...</div>');

  // Borrar carga previa del mismo período (por si se está corrigiendo una carga anterior) y volver a insertar
  await sb.from('hacienda_historico').delete().eq('periodo',periodo);
  await sb.from('hacienda_comentarios').delete().eq('periodo',periodo);

  const{error:errHist}=await sb.from('hacienda_historico').insert(registros);
  if(errHist){
    document.getElementById('hac-guardando').outerHTML=`<div class="alert alert-danger">Error al guardar existencia: ${errHist.message}</div>`;
    return;
  }

  if(comentarios.length>0){
    const{error:errCom}=await sb.from('hacienda_comentarios').insert(comentarios);
    if(errCom){
      document.getElementById('hac-guardando').outerHTML=`<div class="alert alert-warning">Existencia guardada, pero hubo un error con los comentarios: ${errCom.message}</div>`;
      return;
    }
  }

  hacCampoActual=null;
  document.getElementById('hac-content').innerHTML=`<div class="card"><div style="text-align:center;padding:2rem">
    <div style="font-size:2rem;margin-bottom:.5rem">✓</div>
    <div style="font-weight:500;margin-bottom:.5rem">Planilla de ${hacFormatPeriodo(periodo)} guardada correctamente</div>
    <button class="btn btn-accent" onclick="hacSwitchTab('cargar')">Cargar otra planilla</button>
    <button class="btn" onclick="hacSwitchTab('consultar')" style="margin-left:.5rem">Ver histórico →</button>
  </div></div>`;
}

let _hacPeriodos=[];

async function hacVerConsolidado(){ await hacMostrarMes(0); }

// Muestra la planilla consolidada completa de un mes (todos los campos), con navegación.
// _hacPeriodos está ordenado del más nuevo (idx 0) al más viejo, así que:
// "Mes anterior" = idx+1 (más viejo), "Mes siguiente" = idx-1 (más nuevo).
async function hacMostrarMes(idx){
  const resEl=document.getElementById('hac-result');
  if(!_hacPeriodos.length){resEl.innerHTML='<div class="card"><div style="padding:1rem;color:var(--muted)">No hay períodos cargados.</div></div>';return;}
  idx=Math.max(0,Math.min(_hacPeriodos.length-1,idx));
  const periodo=_hacPeriodos[idx];
  resEl.innerHTML='<div class="loading">Cargando planilla...</div>';
  const[{data:regs},{data:comentarios}]=await Promise.all([
    sb.from('hacienda_historico').select('*').eq('periodo',periodo).range(0,19999),
    sb.from('hacienda_comentarios').select('*').eq('periodo',periodo).range(0,19999)
  ]);
  const campos=[...new Set((regs||[]).map(r=>r.campo))].sort();
  const hayAnterior=idx<_hacPeriodos.length-1;
  const haySiguiente=idx>0;
  const nav=`<div style="display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin:0 0 1rem">
    <button class="btn btn-sm" ${hayAnterior?`onclick="hacMostrarMes(${idx+1})"`:'disabled style="opacity:.4;cursor:not-allowed"'}>← Mes anterior</button>
    <span style="font-weight:600">${hacFormatPeriodo(periodo)}</span>
    <button class="btn btn-sm" ${haySiguiente?`onclick="hacMostrarMes(${idx-1})"`:'disabled style="opacity:.4;cursor:not-allowed"'}>Mes siguiente →</button>
  </div>`;
  const tabla=(regs&&regs.length)?hacPlanillaTabla(regs,campos):'<div style="padding:1rem;color:var(--muted)">No hay datos para este mes.</div>';
  resEl.innerHTML=`<div class="card" style="margin-bottom:1rem"><div class="card-title">Planilla consolidada — ${hacFormatPeriodo(periodo)}</div>${nav}<div class="table-wrap">${tabla}</div></div>${hacComentariosHtml(comentarios||[])}`;
}

// Trae TODAS las filas en tandas, sorteando el tope de filas del servidor de Supabase
// (que recorta los resultados aunque se pida un range grande).
async function hacFetchPaginado(buildQuery){
  let from=0;const size=1000;const todo=[];
  while(true){
    const{data}=await buildQuery(from,from+size-1);
    if(!data||!data.length)break;
    todo.push(...data);
    if(data.length<size)break;
    from+=size;
  }
  return todo;
}

async function renderHacConsultar(){
  const el=document.getElementById('hac-content');
  el.innerHTML='<div class="loading">Cargando histórico…</div>';
  let periodos, campos;
  // Camino rápido: vistas de valores distintos (si existen en la base)
  const [rp, rc] = await Promise.all([
    sb.from('hacienda_periodos').select('periodo'),
    sb.from('hacienda_campos').select('campo')
  ]);
  if(!rp.error && !rc.error && rp.data && rc.data){
    periodos=[...new Set(rp.data.map(p=>p.periodo))].sort().reverse();
    campos=[...new Set(rc.data.map(c=>c.campo))].sort();
  }else{
    // Fallback: escaneo paginado de toda la historia (más lento, pero seguro)
    const historicoTodo=await hacFetchPaginado((f,t)=>sb.from('hacienda_historico').select('periodo,campo').range(f,t));
    periodos=[...new Set((historicoTodo||[]).map(p=>p.periodo))].sort().reverse();
    campos=[...new Set((historicoTodo||[]).map(c=>c.campo))].sort();
  }
  _hacPeriodos=periodos;

  el.innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Filtros</div>
      <div class="form-group">
        <label class="form-label">Campos (dejá todo sin marcar para incluir todos)</label>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem .75rem;margin-top:.25rem">
          ${campos.map(c=>`<label style="display:flex;align-items:center;gap:.35rem;font-size:.82rem;cursor:pointer">
            <input type="checkbox" class="hac-filtro-campo" value="${c}"/> ${c}
          </label>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categorías (dejá todo sin marcar para incluir todas)</label>
        <div style="display:flex;flex-wrap:wrap;gap:.4rem .75rem;margin-top:.25rem">
          ${HAC_CATEGORIAS.map(c=>`<label style="display:flex;align-items:center;gap:.35rem;font-size:.82rem;cursor:pointer">
            <input type="checkbox" class="hac-filtro-cat" value="${c.grupo}|${c.label}"/> ${c.grupo} · ${c.label}
          </label>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Períodos a comparar (seleccioná uno o varios meses)</label>
        <select multiple id="hac-filtro-periodos" class="form-select" style="height:140px">
          ${periodos.map(p=>`<option value="${p}">${hacFormatPeriodo(p)}</option>`).join('')}
        </select>
        <div class="form-hint">Mantené Ctrl (o Cmd en Mac) apretado para elegir varios meses de distintos años.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Cómo querés ver el resultado</label>
        <div style="display:flex;flex-direction:column;gap:.35rem;margin-top:.25rem">
          <label style="display:flex;align-items:center;gap:.4rem;font-size:.82rem;cursor:pointer"><input type="radio" name="hac-vista" value="total" checked onchange="hacSyncBtnBuscar()"/> Total por campo (resumen)</label>
          <label style="display:flex;align-items:center;gap:.4rem;font-size:.82rem;cursor:pointer"><input type="radio" name="hac-vista" value="planilla" onchange="hacSyncBtnBuscar()"/> Planilla completa (desglose por categoría)</label>
          <label style="display:flex;align-items:center;gap:.4rem;font-size:.82rem;cursor:pointer"><input type="radio" name="hac-vista" value="comparar" onchange="hacSyncBtnBuscar()"/> Comparar períodos por categoría (lado a lado)</label>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:.5rem">
        <input type="checkbox" id="hac-modo-suma"/>
        <label for="hac-modo-suma" style="font-size:.82rem;cursor:pointer">Sumar los períodos seleccionados en un solo total (en vez de mostrarlos separados)</label>
      </div>
      <button class="btn btn-accent" id="hac-btn-buscar" onclick="hacBuscar()">Buscar</button>
      <button class="btn" onclick="hacVerConsolidado()" style="margin-left:.5rem">📋 Ver planilla del último mes</button>
    </div>
    <div id="hac-result"></div>`;
}

// Cambia el texto del botón según la vista elegida, para que la acción sea obvia
function hacSyncBtnBuscar(){
  const v=document.querySelector('input[name="hac-vista"]:checked')?.value;
  const btn=document.getElementById('hac-btn-buscar');
  if(btn)btn.textContent=v==='comparar'?'Comparar períodos':v==='planilla'?'Ver planilla':'Buscar';
}

function hacFormatPeriodo(p){
  const[y,m]=p.split('-');
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return`${meses[Number(m)-1]} ${y}`;
}

async function hacBuscar(){
  const resEl=document.getElementById('hac-result');
  resEl.innerHTML='<div class="loading">Buscando...</div>';

  const camposSel=[...document.querySelectorAll('.hac-filtro-campo:checked')].map(c=>c.value);
  const catsSel=[...document.querySelectorAll('.hac-filtro-cat:checked')].map(c=>c.value); // formato "Grupo|Categoria"
  const periodosSel=[...document.getElementById('hac-filtro-periodos').selectedOptions].map(o=>o.value);
  const modoSuma=document.getElementById('hac-modo-suma').checked;
  const vista=document.querySelector('input[name="hac-vista"]:checked')?.value||'total';

  if(periodosSel.length===0){resEl.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">Elegí al menos un período.</div></div>';return;}

  const regsCrudos=await hacFetchPaginado((f,t)=>{
    let q=sb.from('hacienda_historico').select('*').in('periodo',periodosSel).range(f,t);
    if(camposSel.length>0)q=q.in('campo',camposSel);
    return q;
  });

  // Filtrar por categoría usando clave compuesta grupo+categoria (evita confundir categorías con el mismo nombre en distinto grupo, ej. "Invernada" de Vaca vs de Novillos)
  const catsSelSet=new Set(catsSel);
  const regs=(regsCrudos||[]).filter(r=>catsSel.length===0||catsSelSet.has(r.grupo+'|'+r.categoria));

  if(regs.length===0){resEl.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No hay datos para esa combinación de filtros.</div></div>';return;}

  // Traer comentarios de esos períodos/campos
  let queryCom=sb.from('hacienda_comentarios').select('*').in('periodo',periodosSel).range(0,19999);
  if(camposSel.length>0)queryCom=queryCom.in('campo',camposSel);
  const{data:comentarios}=await queryCom;

  if(vista==='comparar'){
    hacRenderComparar(regs,comentarios||[],periodosSel);
  }else if(vista==='planilla'){
    hacRenderPlanilla(regs,comentarios||[],periodosSel,modoSuma);
  }else if(modoSuma){
    hacRenderSuma(regs,comentarios||[],periodosSel);
  }else{
    hacRenderComparativa(regs,comentarios||[],periodosSel);
  }
}

function hacRenderSuma(regs,comentarios,periodosSel){
  const resEl=document.getElementById('hac-result');
  const totalPorCampo={};
  const totalPorCategoria={};
  let totalGeneral=0;
  regs.forEach(r=>{
    const claveCat=r.grupo+' · '+r.categoria;
    totalPorCampo[r.campo]=(totalPorCampo[r.campo]||0)+r.cantidad;
    totalPorCategoria[claveCat]=(totalPorCategoria[claveCat]||0)+r.cantidad;
    totalGeneral+=r.cantidad;
  });

  resEl.innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Suma de ${periodosSel.length} período(s): ${periodosSel.map(hacFormatPeriodo).join(', ')}</div>
      <div class="metrics-grid" style="margin-bottom:1rem">
        <div class="metric-card"><div class="metric-label">Total cabezas (suma)</div><div class="metric-value">${totalGeneral.toLocaleString('es-AR')}</div></div>
      </div>
      <div class="table-wrap" style="margin-bottom:1rem">
        <table><thead><tr><th>Campo</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${Object.entries(totalPorCampo).map(([c,v])=>`<tr><td>${c}</td><td style="text-align:right"><strong>${v.toLocaleString('es-AR')}</strong></td></tr>`).join('')}</tbody></table>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>Categoría</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${Object.entries(totalPorCategoria).map(([c,v])=>`<tr><td>${c}</td><td style="text-align:right"><strong>${v.toLocaleString('es-AR')}</strong></td></tr>`).join('')}</tbody></table>
      </div>
    </div>
    ${hacComentariosHtml(comentarios)}`;
}

function hacRenderComparativa(regs,comentarios,periodosSel){
  const resEl=document.getElementById('hac-result');
  const periodosOrdenados=[...periodosSel].sort();
  const totalPorPeriodoCampo={};
  periodosOrdenados.forEach(p=>totalPorPeriodoCampo[p]={});
  regs.forEach(r=>{
    if(!totalPorPeriodoCampo[r.periodo][r.campo])totalPorPeriodoCampo[r.periodo][r.campo]=0;
    totalPorPeriodoCampo[r.periodo][r.campo]+=r.cantidad;
  });
  const camposPresentes=[...new Set(regs.map(r=>r.campo))].sort();

  let tablaHtml=`<table><thead><tr><th>Campo</th>${periodosOrdenados.map(p=>`<th style="text-align:right">${hacFormatPeriodo(p)}</th>`).join('')}</tr></thead><tbody>`;
  camposPresentes.forEach(campo=>{
    tablaHtml+=`<tr><td><strong>${campo}</strong></td>${periodosOrdenados.map(p=>`<td style="text-align:right">${(totalPorPeriodoCampo[p][campo]||0).toLocaleString('es-AR')}</td>`).join('')}</tr>`;
  });
  tablaHtml+=`<tr style="border-top:2px solid var(--border)"><td><strong>TOTAL</strong></td>${periodosOrdenados.map(p=>{
    const t=Object.values(totalPorPeriodoCampo[p]).reduce((a,b)=>a+b,0);
    return`<td style="text-align:right"><strong>${t.toLocaleString('es-AR')}</strong></td>`;
  }).join('')}</tr>`;
  tablaHtml+='</tbody></table>';

  resEl.innerHTML=`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Comparativa por período</div>
      <div class="table-wrap">${tablaHtml}</div>
    </div>
    ${hacComentariosHtml(comentarios)}`;
}

// Planilla completa: filas = categorías (agrupadas por grupo, con subtotales), columnas = campos
function hacPlanillaTabla(regsSub,campos){
  const m={};campos.forEach(c=>m[c]={});
  regsSub.forEach(r=>{const k=r.grupo+'|'+r.categoria;m[r.campo][k]=(m[r.campo][k]||0)+r.cantidad;});
  const grupos=[...new Set(HAC_CATEGORIAS.map(c=>c.grupo))];
  const totalCampo={};campos.forEach(c=>totalCampo[c]=0);let granTotal=0;
  let html=`<table><thead><tr><th>Categoría</th>${campos.map(c=>`<th style="text-align:right">${c}</th>`).join('')}<th style="text-align:right">Total</th></tr></thead><tbody>`;
  grupos.forEach(g=>{
    const catsG=HAC_CATEGORIAS.filter(c=>c.grupo===g);
    const subtot={};campos.forEach(c=>subtot[c]=0);
    html+=`<tr style="background:var(--bg)"><td colspan="${campos.length+2}" style="font-weight:600;font-size:.78rem">${g}</td></tr>`;
    catsG.forEach(cat=>{
      const k=g+'|'+cat.label;let rowTot=0;
      const celdas=campos.map(c=>{const v=m[c][k]||0;subtot[c]+=v;totalCampo[c]+=v;rowTot+=v;return`<td style="text-align:right">${v?v.toLocaleString('es-AR'):'—'}</td>`;}).join('');
      granTotal+=rowTot;
      html+=`<tr><td style="padding-left:1rem">${cat.label}</td>${celdas}<td style="text-align:right">${rowTot?rowTot.toLocaleString('es-AR'):'—'}</td></tr>`;
    });
    const subTotG=campos.reduce((a,c)=>a+subtot[c],0);
    html+=`<tr style="color:var(--muted);font-weight:500"><td style="padding-left:1rem">Subtotal ${g}</td>${campos.map(c=>`<td style="text-align:right">${subtot[c].toLocaleString('es-AR')}</td>`).join('')}<td style="text-align:right">${subTotG.toLocaleString('es-AR')}</td></tr>`;
  });
  html+=`<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL</td>${campos.map(c=>`<td style="text-align:right">${totalCampo[c].toLocaleString('es-AR')}</td>`).join('')}<td style="text-align:right">${granTotal.toLocaleString('es-AR')}</td></tr>`;
  return html+'</tbody></table>';
}

function hacRenderPlanilla(regs,comentarios,periodosSel,modoSuma){
  const resEl=document.getElementById('hac-result');
  let bloques='';
  if(modoSuma||periodosSel.length===1){
    const campos=[...new Set(regs.map(r=>r.campo))].sort();
    const titulo=periodosSel.length===1?hacFormatPeriodo(periodosSel[0]):`Suma de ${periodosSel.length} períodos: ${periodosSel.map(hacFormatPeriodo).join(', ')}`;
    bloques=`<div class="card" style="margin-bottom:1rem"><div class="card-title">Planilla completa — ${titulo}</div><div class="table-wrap">${hacPlanillaTabla(regs,campos)}</div></div>`;
  }else{
    bloques=[...periodosSel].sort().map(p=>{
      const sub=regs.filter(r=>r.periodo===p);
      const campos=[...new Set(sub.map(r=>r.campo))].sort();
      return`<div class="card" style="margin-bottom:1rem"><div class="card-title">Planilla completa — ${hacFormatPeriodo(p)}</div><div class="table-wrap">${hacPlanillaTabla(sub,campos)}</div></div>`;
    }).join('');
  }
  resEl.innerHTML=bloques+hacComentariosHtml(comentarios);
}

// Comparar períodos lado a lado: columnas = períodos, filas = categorías (desglosada) o grupos (resumen).
// Campos: consolida los campos que pasaron el filtro. Variación: cada columna vs la anterior.
let _hacCmp=null;
function hacRenderComparar(regs,comentarios,periodosSel){
  const periodsAsc=[...periodosSel].sort();
  const agg={};periodsAsc.forEach(p=>agg[p]={});
  const presentes=new Set();
  regs.forEach(r=>{const k=r.grupo+'|'+r.categoria;agg[r.periodo][k]=(agg[r.periodo][k]||0)+r.cantidad;presentes.add(k);});
  _hacCmp={periodsAsc,agg,presentes,comentarios:comentarios||[],modo:'des'};
  hacPintarComparar();
}
function hacDeltaHtml(prev,cur){
  if(prev===undefined||prev===null||prev===0)return'';
  const pc=Math.round((cur-prev)/prev*100);
  const up=pc>=0;
  return`<div style="font-size:.66rem;color:${up?'var(--success)':'var(--danger)'};margin-top:1px">${up?'▲ +':'▼ '}${pc}%</div>`;
}
function hacPintarComparar(){
  const resEl=document.getElementById('hac-result');
  const{periodsAsc,agg,presentes,comentarios,modo}=_hacCmp;
  const grupos=[...new Set(HAC_CATEGORIAS.map(c=>c.grupo))];
  const catsDe=g=>HAC_CATEGORIAS.filter(c=>c.grupo===g&&presentes.has(g+'|'+c.label));
  const gruposPresentes=grupos.filter(g=>catsDe(g).length>0);
  const valsKey=k=>periodsAsc.map(p=>agg[p][k]||0);
  const valsGrupo=g=>periodsAsc.map(p=>catsDe(g).reduce((a,c)=>a+(agg[p][g+'|'+c.label]||0),0));
  const valsTotal=()=>periodsAsc.map(p=>Object.values(agg[p]).reduce((a,b)=>a+b,0));
  const celdas=vals=>vals.map((v,i)=>`<td style="text-align:right">${v.toLocaleString('es-AR')}${i>0?hacDeltaHtml(vals[i-1],v):''}</td>`).join('');
  let body='';
  gruposPresentes.forEach(g=>{
    if(modo==='des'){
      body+=`<tr style="background:var(--bg)"><td colspan="${periodsAsc.length+1}" style="font-weight:600;font-size:.78rem">${g}</td></tr>`;
      catsDe(g).forEach(c=>{body+=`<tr><td style="padding-left:1.2rem">${c.label}</td>${celdas(valsKey(g+'|'+c.label))}</tr>`;});
      body+=`<tr style="color:var(--muted);font-weight:500"><td style="padding-left:1.2rem">Subtotal ${g}</td>${celdas(valsGrupo(g))}</tr>`;
    }else{
      body+=`<tr><td>${g}</td>${celdas(valsGrupo(g))}</tr>`;
    }
  });
  body+=`<tr style="border-top:2px solid var(--border);font-weight:700"><td>TOTAL cabezas</td>${celdas(valsTotal())}</tr>`;
  const head=`<thead><tr><th style="text-align:left">Categoría</th>${periodsAsc.map(p=>`<th style="text-align:right">${hacFormatPeriodo(p)}</th>`).join('')}</tr></thead>`;
  const toggle=`<div style="display:flex;gap:.5rem;margin-bottom:.75rem">
    <button class="btn btn-sm ${modo==='res'?'btn-accent':''}" onclick="_hacCmp.modo='res';hacPintarComparar()">Resumen</button>
    <button class="btn btn-sm ${modo==='des'?'btn-accent':''}" onclick="_hacCmp.modo='des';hacPintarComparar()">Desglosada</button>
  </div>`;
  resEl.innerHTML=`<div class="card" style="margin-bottom:1rem"><div class="card-title">Comparar períodos — variación vs. columna anterior</div>${toggle}<div class="table-wrap"><table>${head}<tbody>${body}</tbody></table></div></div>${hacComentariosHtml(comentarios)}`;
}

function hacComentariosHtml(comentarios){
  if(!comentarios||comentarios.length===0)return'';
  const porTipo={mortandad:comentarios.filter(c=>c.tipo==='mortandad'),consumo:comentarios.filter(c=>c.tipo==='consumo')};
  return`<div class="card">
    <div class="card-title">Comentarios del período</div>
    ${porTipo.mortandad.length>0?`<div style="margin-bottom:1rem"><div style="font-weight:500;font-size:.82rem;margin-bottom:.4rem">💀 Mortandad</div>
      ${porTipo.mortandad.map(c=>`<div style="font-size:.8rem;color:var(--muted);margin-bottom:.3rem"><strong>${c.campo}</strong> (${hacFormatPeriodo(c.periodo)}): ${c.comentario}</div>`).join('')}</div>`:''}
    ${porTipo.consumo.length>0?`<div><div style="font-weight:500;font-size:.82rem;margin-bottom:.4rem">🥩 Consumo</div>
      ${porTipo.consumo.map(c=>`<div style="font-size:.8rem;color:var(--muted);margin-bottom:.3rem"><strong>${c.campo}</strong> (${hacFormatPeriodo(c.periodo)}): ${c.comentario}</div>`).join('')}</div>`:''}
  </div>`;
}
