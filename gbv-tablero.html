<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBV · Tablero de Comando</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F5F3EE;--surface:#FFFFFF;--border:#E2DDD6;--text:#1A1916;--muted:#7A7570;--accent:#2D5A3D;--danger:#C0392B;--warning:#D4890A;--success:#2D5A3D;--info:#1A4A6B;--font-disp:'DM Serif Display',serif;--font-body:'DM Sans',sans-serif;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.login-logo{font-family:var(--font-disp);font-size:2rem;color:var(--accent);margin-bottom:.25rem}
.login-sub{font-size:.8rem;color:var(--muted);margin-bottom:2rem;letter-spacing:.08em;text-transform:uppercase}
.login-card label{display:block;font-size:.8rem;font-weight:500;color:var(--muted);margin-bottom:.4rem}
.login-card input{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;background:var(--bg);color:var(--text);outline:none;margin-bottom:1rem;transition:border-color .15s}
.login-card input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:.9rem;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.login-error{font-size:.8rem;color:var(--danger);margin-top:.75rem;text-align:center}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-family:var(--font-disp);font-size:1.25rem;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-user{font-size:.8rem;color:var(--muted)}
.badge-role{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;background:#E8F0EB;color:var(--accent)}
.btn-logout{font-size:.8rem;padding:4px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body)}
.btn-logout:hover{background:var(--bg);color:var(--text)}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto}
.nav-tab{padding:.85rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:var(--font-body);transition:all .15s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:1.5rem;max-width:1100px;margin:0 auto;width:100%}
.section-heading{font-family:var(--font-disp);font-size:1.5rem;color:var(--text);margin-bottom:.25rem}
.section-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.5rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.card-title{font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.metric-label{font-size:.75rem;color:var(--muted);margin-bottom:.4rem}
.metric-value{font-family:var(--font-disp);font-size:1.8rem;color:var(--text);line-height:1}
.metric-sub{font-size:.75rem;margin-top:.3rem}
.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--muted)}
.alert{padding:.75rem 1rem;border-radius:var(--radius);font-size:.85rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.6rem}
.alert-warning{background:#FEF3CD;color:#7A5A00;border:1px solid #F5D97E}
.alert-danger{background:#FDECEA;color:#8B1C1C;border:1px solid #F5B7B1}
.alert-success{background:#E8F5EC;color:#1A4A2A;border:1px solid #A8D5B5}
.alert-info{background:#E8F0F8;color:#1A3A5C;border:1px solid #A8C4DE}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.6rem .9rem;font-size:.72rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:.75rem .9rem;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-ok{background:#E8F5EC;color:#1A4A2A}
.badge-pend{background:#FEF3CD;color:#7A5A00}
.badge-late{background:#FDECEA;color:#8B1C1C}
.badge-na{background:var(--bg);color:var(--muted)}
.badge-info{background:#E8F0F8;color:#1A3A5C}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:.35rem}
.form-input,.form-select,.form-textarea{width:100%;padding:.6rem .85rem;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-body);font-size:.88rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#fff}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:.75rem;color:var(--muted);margin-top:.3rem}
.auto-result{font-size:.85rem;font-weight:500;color:var(--accent);background:#E8F0EB;padding:.4rem .75rem;border-radius:var(--radius);display:inline-block;margin-top:.4rem}
.btn{padding:.6rem 1.1rem;border-radius:var(--radius);font-family:var(--font-body);font-size:.85rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{opacity:.88;background:var(--accent)}
.btn-sm{padding:.35rem .75rem;font-size:.78rem}
.two-col{display:grid;grid-template-columns:210px 1fr;gap:1.5rem}
.sidebar-nav{display:flex;flex-direction:column;gap:2px}
.sidebar-item{padding:.6rem .85rem;border-radius:var(--radius);font-size:.84rem;color:var(--muted);cursor:pointer;border:none;background:transparent;text-align:left;font-family:var(--font-body);transition:all .12s}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{background:#E8F0EB;color:var(--accent);font-weight:500}
.sidebar-section{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:.75rem .85rem .3rem}
.ind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.75rem}
.ind-card.done{border-color:#A8D5B5;background:#F4FAF6}
.ind-name{font-size:.9rem;font-weight:500;color:var(--text);margin-bottom:.25rem}
.ind-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.pill{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
.pill-alert{background:#FDECEA;color:#8B1C1C}
.ind-formula{font-size:.78rem;color:var(--muted);margin-bottom:.75rem;font-style:italic;line-height:1.5}
.upload-zone{border:1px dashed var(--border);border-radius:var(--radius);padding:.75rem 1rem;text-align:center;font-size:.82rem;color:var(--muted);cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);background:#F4FAF6}
.sub-entry-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1rem;margin-bottom:.5rem}
.sub-entry-title{font-size:.82rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.sub-entry-meta{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.inline-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.puesto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:.65rem}
.puesto-nombre{font-size:.88rem;font-weight:500;color:var(--text)}
.puesto-hab{font-size:.78rem;color:var(--muted);margin:.2rem 0}
.puesto-estado{font-size:.78rem;color:var(--text);margin-top:.4rem;line-height:1.5;padding:.5rem .75rem;background:var(--bg);border-radius:var(--radius)}
.tab-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{font-size:.82rem;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);font-family:var(--font-body);transition:all .12s}
.tab-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.bar-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0;font-size:.83rem}
.bar-label{min-width:140px;color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--success)}
.msg-ok{font-size:.78rem;color:var(--success);margin-top:.4rem}
.msg-err{font-size:.78rem;color:var(--danger);margin-top:.4rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}
.locked{text-align:center;padding:3rem 1rem;color:var(--muted)}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.metrics-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">GBV</div>
    <div class="login-sub">Tablero de Comando</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">GBV</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-name"></span>
      <span class="badge-role" id="topbar-role"></span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="main" id="main-content"><div class="loading">Cargando...</div></div>
</div>

<script>
const SUPA_URL='https://qwnlwpvpmlthshtofkzr.supabase.co';
const SUPA_KEY='sb_publishable_Wcf8KQPElBsMKmRF3kaD8Q_o7k5dXGT';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let currentUser=null,currentProfile=null,currentTab='resumen';
let allCampos=[],allUnidades=[],allIndicadores=[],misCampos=[];
let selectedCampo=null,selectedCat=null;
const ROL_LABELS={programador:'Programador',directorio:'Directorio',coo:'COO',operativo:'Operativo',encargado_campo:'Encargado de campo'};
const CAT_LABELS={gestion:'Gestión',financiero:'Financiero',comercial:'Comercial',productivo_global:'Productivo · Global',productivo_cria:'Productivo · Cría',productivo_recria:'Productivo · Recría',productivo_feedlot:'Productivo · Feedlot',alimenticio:'Alimenticio',sanitario:'Sanitario',mejoramiento_genetico:'Mejoramiento genético',ecologia:'Ecología',rrhh:'RRHH'};
const CAT_ICONS={gestion:'📋',financiero:'📊',comercial:'📈',productivo_global:'🐄',productivo_cria:'🐮',productivo_recria:'🐂',productivo_feedlot:'🌽',alimenticio:'🌾',sanitario:'💉',mejoramiento_genetico:'🧬',ecologia:'🌿',rrhh:'👥'};

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Completá email y contraseña.';return;}
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent='Email o contraseña incorrectos.';return;}
  await initApp(data.user);
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  currentUser=null;currentProfile=null;
}

async function initApp(user){
  currentUser=user;
  const{data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  currentProfile=profile;
  if(!currentProfile){document.getElementById('login-error').textContent='No se encontró tu perfil.';return;}
  const[{data:campos},{data:unidades},{data:indicadores}]=await Promise.all([
    sb.from('campos').select('*,unidades_negocio(nombre)'),
    sb.from('unidades_negocio').select('*').order('nombre'),
    sb.from('indicadores').select('*').eq('activo',true).order('orden')
  ]);
  allCampos=campos||[];allUnidades=unidades||[];allIndicadores=indicadores||[];
  if(currentProfile.rol==='encargado_campo'){
    const{data:asignados}=await sb.from('encargados_campo').select('campo_id').eq('user_id',user.id).eq('activo',true);
    const ids=(asignados||[]).map(a=>a.campo_id);
    misCampos=allCampos.filter(c=>ids.includes(c.id));
  }else{misCampos=allCampos;}
  if(misCampos.length>0)selectedCampo=misCampos[0].id;
  const cats=[...new Set(allIndicadores.map(i=>i.categoria))];
  if(cats.length>0)selectedCat=cats[0];
  document.getElementById('login-screen').style.display='none';
  const appEl=document.getElementById('app');
  appEl.style.display='flex';appEl.style.flexDirection='column';
  document.getElementById('topbar-name').textContent=(currentProfile.nombre||'')+' '+(currentProfile.apellido||'');
  document.getElementById('topbar-role').textContent=ROL_LABELS[currentProfile.rol]||currentProfile.rol;
  buildNav();renderTab('resumen');
}

const TAB_DEFS=[
  {id:'resumen',label:'Resumen',roles:['programador','directorio','coo','operativo','encargado_campo']},
  {id:'carga',label:'Carga de datos',roles:['programador','operativo','encargado_campo']},
  {id:'puestos',label:'Puestos',roles:['programador','directorio','coo']},
  {id:'historico',label:'Históricos',roles:['programador','directorio','coo','operativo']},
  {id:'admin',label:'Administración',roles:['programador','coo']},
];

function buildNav(){
  const nav=document.getElementById('nav-tabs');nav.innerHTML='';
  TAB_DEFS.filter(t=>t.roles.includes(currentProfile.rol)).forEach(t=>{
    const btn=document.createElement('button');
    btn.className='nav-tab'+(t.id===currentTab?' active':'');
    btn.textContent=t.label;btn.dataset.tab=t.id;
    btn.onclick=()=>renderTab(t.id);nav.appendChild(btn);
  });
}

function setActiveTab(id){
  currentTab=id;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
}

function renderTab(tab){
  setActiveTab(tab);
  document.getElementById('main-content').innerHTML='<div class="loading">Cargando...</div>';
  if(tab==='resumen')renderResumen();
  if(tab==='carga')renderCarga();
  if(tab==='puestos')renderPuestos();
  if(tab==='historico')renderHistorico();
  if(tab==='admin')renderAdmin();
}

// ── RESUMEN ──
async function renderResumen(){
  const{data:entries}=await sb.from('entries')
    .select('*,indicadores(nombre,categoria),profiles(nombre,apellido),campos(nombre)')
    .order('created_at',{ascending:false}).limit(20);
  const thisMonth=entries?entries.filter(e=>new Date(e.created_at)>new Date(new Date().setDate(1))).length:0;
  const main=document.getElementById('main-content');
  main.innerHTML=`
    <div class="section-heading">Resumen</div>
    <div class="section-sub">Vista general · ${new Date().toLocaleDateString('es-AR',{month:'long',year:'numeric'})}</div>
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Unidades de negocio</div><div class="metric-value">${allUnidades.length}</div></div>
      <div class="metric-card"><div class="metric-label">Campos</div><div class="metric-value">${allCampos.length}</div></div>
      <div class="metric-card"><div class="metric-label">Indicadores</div><div class="metric-value">${allIndicadores.length}</div></div>
      <div class="metric-card"><div class="metric-label">Cargas este mes</div><div class="metric-value">${thisMonth}</div><div class="metric-sub up">registros</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Últimas cargas</div>
      ${entries&&entries.length>0?`<div class="table-wrap"><table>
        <thead><tr><th>Indicador</th><th>Categoría</th><th>Valor</th><th>Campo</th><th>Cargado por</th><th>Período</th></tr></thead>
        <tbody>${entries.map(e=>`<tr>
          <td>${e.indicadores?.nombre||'—'}</td>
          <td><span class="badge badge-na">${CAT_LABELS[e.indicadores?.categoria]||'—'}</span></td>
          <td><strong>${e.valor!==null?e.valor:'—'}</strong></td>
          <td>${e.campos?.nombre||'—'}</td>
          <td>${(e.profiles?.nombre||'')+' '+(e.profiles?.apellido||'')}</td>
          <td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
        </tr>`).join('')}</tbody>
      </table></div>`:'<div style="text-align:center;padding:2rem;color:var(--muted);font-size:.85rem">Todavía no hay cargas registradas.</div>'}
    </div>
    <div class="card">
      <div class="card-title">Unidades de negocio</div>
      ${allUnidades.map(u=>{
        const uc=allCampos.filter(c=>c.unidad_negocio_id===u.id);
        const has=uc.reduce((a,c)=>a+(c.hectareas||0),0);
        return`<div class="bar-row">
          <span class="dot dot-green"></span>
          <span class="bar-label">${u.nombre}</span>
          <span style="flex:1;font-size:.78rem;color:var(--muted)">${uc.map(c=>c.nombre).join(', ')}</span>
          <span style="font-size:.78rem;font-weight:500;min-width:80px;text-align:right">${has>0?has.toLocaleString('es-AR')+' ha':'—'}</span>
        </div>`;
      }).join('')}
    </div>`;
}

// ── CARGA ──
async function renderCarga(){
  const main=document.getElementById('main-content');
  const cats=[...new Set(allIndicadores.map(i=>i.categoria))];
  if(!selectedCat||!cats.includes(selectedCat))selectedCat=cats[0];
  main.innerHTML=`
    <div class="section-heading">Carga de datos</div>
    <div class="section-sub">Completá los indicadores que te corresponden</div>
    <div class="two-col">
      <div>
        <div class="card" style="margin-bottom:.75rem">
          <div class="card-title">Categorías</div>
          <div class="sidebar-nav" id="cat-nav">
            ${cats.map(c=>`<button class="sidebar-item ${c===selectedCat?'active':''}" onclick="selectCat('${c}',this)">
              ${CAT_ICONS[c]||''} ${CAT_LABELS[c]||c}
            </button>`).join('')}
          </div>
        </div>
        ${misCampos.length>0?`<div class="card">
          <div class="card-title">Campo</div>
          <div class="sidebar-nav" id="campo-nav">
            ${misCampos.map(c=>`<button class="sidebar-item ${c.id===selectedCampo?'active':''}" onclick="selectCampoNav('${c.id}',this)">${c.nombre}</button>`).join('')}
          </div>
        </div>`:''}
      </div>
      <div id="indicators-panel"><div class="loading">Cargando...</div></div>
    </div>`;
  loadIndicatorsPanel();
}

function selectCat(cat,btn){
  selectedCat=cat;
  document.querySelectorAll('#cat-nav .sidebar-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');loadIndicatorsPanel();
}

function selectCampoNav(id,btn){
  selectedCampo=id;
  document.querySelectorAll('#campo-nav .sidebar-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');loadIndicatorsPanel();
}

async function loadIndicatorsPanel(){
  const panel=document.getElementById('indicators-panel');
  if(!panel)return;
  panel.innerHTML='<div class="loading">Cargando...</div>';
  const filtered=allIndicadores.filter(i=>i.categoria===selectedCat);
  const campo=allCampos.find(c=>c.id===selectedCampo);
  let medidores=[],rodados=[],rodadosBsAs=[];
  if(campo){
    const[{data:m},{data:r}]=await Promise.all([
      sb.from('medidores_luz').select('*').eq('campo_id',campo.id).eq('activo',true),
      sb.from('rodados').select('*').eq('campo_id',campo.id).eq('activo',true)
    ]);
    medidores=m||[];rodados=r||[];
  }
  if(['operativo','programador'].includes(currentProfile.rol)){
    const{data:rb}=await sb.from('rodados').select('*').is('campo_id',null).eq('activo',true);
    rodadosBsAs=rb||[];
  }
  if(filtered.length===0){panel.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No hay indicadores en esta categoría.</div></div>';return;}
  if(selectedCat==='rrhh'&&!['programador','directorio','coo'].includes(currentProfile.rol)){
    panel.innerHTML='<div class="card"><div class="locked"><div style="font-size:2rem;margin-bottom:.75rem">🔒</div><div style="font-size:.85rem">Esta sección es solo para el Directorio.</div></div></div>';return;
  }
  panel.innerHTML=filtered.map(ind=>renderIndCard(ind,campo,medidores,rodados,rodadosBsAs)).join('');
}

function renderIndCard(ind,campo,medidores,rodados,rodadosBsAs){
  const id=ind.id;
  const alertText=ind.alerta_min!==null?`Alerta si < ${ind.alerta_min}`:ind.alerta_max!==null?`Alerta si > ${ind.alerta_max}`:'';
  let inputHtml='';
  const isMulti=['Consumos de luz por medidor','Kilometraje por camioneta'].includes(ind.nombre);

  if(ind.nombre==='Planilla de hacienda'||ind.nombre==='Inventario stocks'||(ind.requiere_adjunto&&!isMulti)){
    inputHtml=`<div class="upload-zone" onclick="document.getElementById('file-${id}').click()">↑ Adjuntar archivo (PDF, Excel, imagen)<input type="file" id="file-${id}" style="display:none" onchange="handleFile('${id}',this)"/></div><div id="file-name-${id}" class="form-hint"></div>`;
  }else if(ind.nombre==='Consumos de luz por medidor'){
    if(medidores.length===0){inputHtml=`<div class="alert alert-info">No hay medidores cargados para este campo. Pedile al administrador que los configure.</div>`;}
    else{inputHtml=medidores.map(m=>`<div class="sub-entry-card">
      <div class="sub-entry-title">Medidor ${m.numero_medidor}</div>
      <div class="sub-entry-meta">${m.empresa||''}</div>
      <div class="inline-row">
        <input type="number" class="form-input" id="med-${id}-${m.id}" placeholder="kWh" style="width:140px" step="any"/>
        <span style="font-size:.78rem;color:var(--muted)">kWh</span>
        <button class="btn btn-accent btn-sm" onclick="guardarMedidor('${id}','${m.id}','${campo?.id||''}')">Guardar</button>
      </div>
      <div id="msg-med-${id}-${m.id}"></div>
    </div>`).join('');}
  }else if(ind.nombre==='Kilometraje por camioneta'){
    const lista=campo?rodados:rodadosBsAs;
    if(lista.length===0){inputHtml=`<div class="alert alert-info">No hay rodados cargados para este campo.</div>`;}
    else{inputHtml=lista.map(r=>`<div class="sub-entry-card">
      <div class="sub-entry-title">${r.patente}</div>
      <div class="sub-entry-meta">${r.descripcion||''}</div>
      <div class="inline-row">
        <input type="number" class="form-input" id="rod-km-${id}-${r.id}" placeholder="km actuales" style="width:150px"/>
        <div class="upload-zone" style="flex:1;padding:.4rem .75rem;font-size:.75rem" onclick="document.getElementById('odo-${r.id}').click()">📷 Foto odómetro<input type="file" id="odo-${r.id}" accept="image/*" style="display:none"/></div>
        <button class="btn btn-accent btn-sm" onclick="guardarKm('${id}','${r.id}','${campo?.id||''}')">Guardar</button>
      </div>
      <div id="msg-rod-${id}-${r.id}"></div>
    </div>`).join('');}
  }else if(ind.calculo_automatico&&ind.formula&&ind.formula.includes('/')){
    inputHtml=`<div class="form-row">
      <div class="form-group"><label class="form-label">Valor A (numerador)</label><input type="number" class="form-input" id="val-a-${id}" placeholder="0" oninput="calcAuto('${id}')" step="any"/></div>
      <div class="form-group"><label class="form-label">Valor B (denominador)</label><input type="number" class="form-input" id="val-b-${id}" placeholder="0" oninput="calcAuto('${id}')" step="any"/>
      ${campo?.hectareas&&ind.nombre.toLowerCase().includes('hectárea')?`<div class="form-hint">Superficie: <strong>${campo.hectareas.toLocaleString('es-AR')} ha</strong></div>`:''}</div>
    </div><div id="auto-${id}"></div>`;
  }else{
    inputHtml=`<div class="form-group"><label class="form-label">Valor</label><input type="number" class="form-input" id="val-${id}" placeholder="Ingresá el valor" step="any"/></div>`;
  }

  return`<div class="ind-card" id="ind-card-${id}">
    <div class="ind-name">${ind.nombre}</div>
    <div class="ind-meta">
      <span class="pill">${ind.periodicidad}</span>
      <span class="pill">${ind.unidad_medida}</span>
      ${alertText?`<span class="pill pill-alert">${alertText}</span>`:''}
    </div>
    ${ind.formula?`<div class="ind-formula">${ind.formula}</div>`:''}
    ${inputHtml}
    ${!isMulti?`<div style="display:flex;align-items:flex-end;gap:.75rem;margin-top:.75rem;flex-wrap:wrap">
      <div class="form-group" style="margin:0"><label class="form-label">Período</label><input type="date" class="form-input" id="fecha-${id}" value="${new Date().toISOString().split('T')[0]}" style="width:auto"/></div>
      ${campo?`<div style="font-size:.78rem;color:var(--muted);margin-bottom:.2rem">Campo: <strong>${campo.nombre}</strong></div>`:''}
      <button class="btn btn-accent" onclick="guardarEntry('${id}','${campo?.id||''}')">Guardar</button>
    </div>
    <div id="msg-${id}"></div>`:`<div class="form-group" style="margin-top:.75rem"><label class="form-label">Período (aplica a todos)</label><input type="date" class="form-input" id="fecha-${id}" value="${new Date().toISOString().split('T')[0]}" style="width:auto"/></div>`}
  </div>`;
}

function calcAuto(id){
  const a=parseFloat(document.getElementById('val-a-'+id)?.value)||0;
  const b=parseFloat(document.getElementById('val-b-'+id)?.value)||0;
  const el=document.getElementById('auto-'+id);
  if(el&&a&&b)el.innerHTML=`<span class="auto-result">= ${(a/b*100).toFixed(2)}%</span>`;
  else if(el)el.innerHTML='';
}
function handleFile(id,input){const f=input.files[0];if(f){const el=document.getElementById('file-name-'+id);if(el)el.textContent='✓ '+f.name;}}

async function guardarEntry(indId,campoId){
  const msgEl=document.getElementById('msg-'+indId);
  if(msgEl){msgEl.textContent='Guardando...';msgEl.className='form-hint';}
  const fecha=document.getElementById('fecha-'+indId)?.value;
  if(!fecha){if(msgEl){msgEl.textContent='Seleccioná una fecha.';msgEl.className='msg-err';}return;}
  let valor=null,valorA=null,valorB=null;
  const valEl=document.getElementById('val-'+indId);
  const valAEl=document.getElementById('val-a-'+indId);
  const valBEl=document.getElementById('val-b-'+indId);
  if(valEl)valor=parseFloat(valEl.value)||null;
  if(valAEl)valorA=parseFloat(valAEl.value)||null;
  if(valBEl)valorB=parseFloat(valBEl.value)||null;
  if(valorA&&valorB)valor=parseFloat((valorA/valorB*100).toFixed(4));
  const{error}=await sb.from('entries').insert({indicador_id:indId,campo_id:campoId||null,user_id:currentUser.id,valor,valor_a:valorA,valor_b:valorB,periodo_fecha:fecha});
  if(error){if(msgEl){msgEl.textContent='Error: '+error.message;msgEl.className='msg-err';}}
  else{if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}document.getElementById('ind-card-'+indId)?.classList.add('done');setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);}
}

async function guardarMedidor(indId,medidorId,campoId){
  const inp=document.getElementById(`med-${indId}-${medidorId}`);
  const msgEl=document.getElementById(`msg-med-${indId}-${medidorId}`);
  const fecha=document.getElementById('fecha-'+indId)?.value||new Date().toISOString().split('T')[0];
  const kwh=parseFloat(inp?.value);
  if(!kwh){if(msgEl){msgEl.textContent='Ingresá el valor kWh.';msgEl.className='msg-err';}return;}
  const{data:entry,error:e1}=await sb.from('entries').insert({indicador_id:indId,campo_id:campoId||null,user_id:currentUser.id,valor:kwh,periodo_fecha:fecha}).select().single();
  if(e1){if(msgEl){msgEl.textContent='Error: '+e1.message;msgEl.className='msg-err';}return;}
  await sb.from('consumo_medidores').insert({entry_id:entry.id,medidor_id:medidorId,kwh});
  if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}
  if(inp)inp.value='';setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);
}

async function guardarKm(indId,rodadoId,campoId){
  const inp=document.getElementById(`rod-km-${indId}-${rodadoId}`);
  const msgEl=document.getElementById(`msg-rod-${indId}-${rodadoId}`);
  const fecha=document.getElementById('fecha-'+indId)?.value||new Date().toISOString().split('T')[0];
  const km=parseFloat(inp?.value);
  if(!km){if(msgEl){msgEl.textContent='Ingresá los km.';msgEl.className='msg-err';}return;}
  const{data:entry,error:e1}=await sb.from('entries').insert({indicador_id:indId,campo_id:campoId||null,user_id:currentUser.id,valor:km,periodo_fecha:fecha}).select().single();
  if(e1){if(msgEl){msgEl.textContent='Error: '+e1.message;msgEl.className='msg-err';}return;}
  await sb.from('km_rodados').insert({entry_id:entry.id,rodado_id:rodadoId,km});
  if(msgEl){msgEl.textContent='✓ Guardado';msgEl.className='msg-ok';}
  if(inp)inp.value='';setTimeout(()=>{if(msgEl)msgEl.textContent='';},3000);
}

// ── PUESTOS ──
async function renderPuestos(){
  const main=document.getElementById('main-content');
  const{data:puestos}=await sb.from('puestos').select('*,campos(nombre,unidades_negocio(nombre))').eq('activo',true).order('nombre');
  const porCampo={};
  (puestos||[]).forEach(p=>{
    const key=p.campos?.nombre||'Sin campo';
    if(!porCampo[key]){porCampo[key]={unidad:p.campos?.unidades_negocio?.nombre||'',items:[]};}
    porCampo[key].items.push(p);
  });
  const total=(puestos||[]).length;
  const desocupados=(puestos||[]).filter(p=>p.habitantes&&p.habitantes.toLowerCase().includes('desocup')).length;
  const abandonados=(puestos||[]).filter(p=>p.habitantes&&(p.habitantes.toLowerCase().includes('abandon'))).length;
  main.innerHTML=`
    <div class="section-heading">Puestos y construcciones</div>
    <div class="section-sub">Estado de las viviendas por campo · datos 2025</div>
    <div class="metrics-grid" style="margin-bottom:1.5rem">
      <div class="metric-card"><div class="metric-label">Total</div><div class="metric-value">${total}</div></div>
      <div class="metric-card"><div class="metric-label">Habitados</div><div class="metric-value" style="color:var(--success)">${total-desocupados-abandonados}</div></div>
      <div class="metric-card"><div class="metric-label">Desocupados</div><div class="metric-value" style="color:var(--warning)">${desocupados}</div></div>
      <div class="metric-card"><div class="metric-label">Abandonados</div><div class="metric-value" style="color:var(--danger)">${abandonados}</div></div>
    </div>
    ${Object.entries(porCampo).map(([campo,data])=>`
      <div class="card" style="margin-bottom:1rem">
        <div class="card-title">${campo} <span class="badge badge-na" style="margin-left:.5rem;font-weight:400">${data.unidad}</span></div>
        ${data.items.map(p=>{
          const hab=p.habitantes||'';
          const esAbandonado=hab.toLowerCase().includes('abandon');
          const esDesocupado=hab.toLowerCase().includes('desocup');
          const bc=esAbandonado?'badge-late':esDesocupado?'badge-pend':'badge-ok';
          const bl=esAbandonado?'Abandonado':esDesocupado?'Desocupado':'Habitado';
          return`<div class="puesto-card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
              <div style="flex:1">
                <div class="puesto-nombre">${p.nombre}</div>
                ${hab?`<div class="puesto-hab">👤 ${hab}</div>`:''}
                ${p.estado_2025?`<div class="puesto-estado">📝 ${p.estado_2025}</div>`:''}
              </div>
              <span class="badge ${bc}">${bl}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('')}`;
}

    <div class="section-heading">Históricos</div>

async function loadHistorico(){
  const indId=document.getElementById('hist-ind').value;
  const campoId=document.getElementById('hist-campo').value;
  const resEl=document.getElementById('hist-result');
  if(!indId)return;
  resEl.innerHTML='<div class="loading">Cargando...</div>';
  let query=sb.from('entries').select('*,indicadores(nombre,unidad_medida,alerta_min,alerta_max),campos(nombre),profiles(nombre,apellido)').eq('indicador_id',indId).order('periodo_fecha',{ascending:false});
  if(campoId)query=query.eq('campo_id',campoId);
  const{data:entries}=await query;
  if(!entries||entries.length===0){resEl.innerHTML='<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">No hay datos registrados.</div></div>';return;}
  const ind=entries[0].indicadores;
  const vals=entries.filter(e=>e.valor!==null).map(e=>e.valor);
  const media=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):null;
  resEl.innerHTML=`
    <div class="metrics-grid" style="margin-bottom:1rem">
      <div class="metric-card"><div class="metric-label">Registros</div><div class="metric-value">${entries.length}</div></div>
      <div class="metric-card"><div class="metric-label">Promedio</div><div class="metric-value">${media??'—'}</div><div class="metric-sub neutral">${ind?.unidad_medida||''}</div></div>
      <div class="metric-card"><div class="metric-label">Máximo</div><div class="metric-value">${vals.length?Math.max(...vals).toFixed(2):'—'}</div></div>
      <div class="metric-card"><div class="metric-label">Mínimo</div><div class="metric-value">${vals.length?Math.min(...vals).toFixed(2):'—'}</div></div>
    </div>
    <div class="card"><div class="card-title">${ind?.nombre||'Indicador'} · todos los registros</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Período</th><th>Valor</th><th>Campo</th><th>Cargado por</th><th>Estado</th></tr></thead>
        <tbody>${entries.map(e=>{
          let estado='';
          if(e.valor!==null&&ind?.alerta_min!==null&&e.valor<ind.alerta_min)estado='<span class="badge badge-late">Bajo mínimo</span>';
          else if(e.valor!==null&&ind?.alerta_max!==null&&e.valor>ind.alerta_max)estado='<span class="badge badge-late">Sobre máximo</span>';
          else if(e.valor!==null)estado='<span class="badge badge-ok">Normal</span>';
          return`<tr>
            <td>${e.periodo_fecha?new Date(e.periodo_fecha+'T12:00:00').toLocaleDateString('es-AR'):'—'}</td>
            <td><strong>${e.valor??'—'}</strong> <span style="color:var(--muted);font-size:.78rem">${ind?.unidad_medida||''}</span></td>
            <td>${e.campos?.nombre||'—'}</td>
            <td>${(e.profiles?.nombre||'')+' '+(e.profiles?.apellido||'')}</td>
            <td>${estado}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
}

function adminTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const{profiles,rodados,medidores,puestos}=window._adminData;
  const panel=document.getElementById('admin-panel');
  if(tab==='usuarios')panel.innerHTML=renderAdminUsuarios(profiles||[]);
  if(tab==='campos')panel.innerHTML=renderAdminCampos();
  if(tab==='rodados')panel.innerHTML=renderAdminRodados(rodados||[]);
  if(tab==='medidores')panel.innerHTML=renderAdminMedidores(medidores||[]);
  if(tab==='puestos-admin')panel.innerHTML=renderAdminPuestosTable(puestos||[]);
}
